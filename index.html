                ctx.fillStyle='#88ddff';ctx.fillText('\u{1F465} Room: '+roomCode,14,mpY);mpY+=16;
                for(let id in otherPlayers){let op=otherPlayers[id];
                    ctx.fillStyle=op.alive?(op.color||'#fff'):'#666';
                    let opStatus=op.alive?Math.floor(op.hp)+'/'+op.maxHp:'\u{1F47B} 等待复活';
                    ctx.fillText((op.alive?'\u2764\uFE0F':'\u{1F480}')+' '+op.nick+' Lv'+(op.level||1)+' '+opStatus,14,mpY);mpY+=16;}
                // Resurrect status
                if(resChanneling){ctx.fillStyle='#44ff44';ctx.fillText('\u{1F4AB} 复活中 '+Math.ceil(RES_CHANNEL_TIME-resChannelProgress)+'s',14,mpY);}
                else if(resCooldown>0){ctx.fillStyle='#888';ctx.fillText('\u{1F4AB} 冷却 '+Math.ceil(resCooldown)+'s',14,mpY);}
                else{ctx.fillStyle='#44ff44';ctx.fillText('\u{1F4AB} 复活: 走近队友尸体',14,mpY);}
            }

            // Minimap (top-right)
            if(gameSettings.minimap){
            const mmW=150,mmH=100,mmX=W-mmW-15,mmY=15,mmRange=800;
            const mmScale=mmW/(mmRange*2);
            ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(mmX,mmY,mmW,mmH);ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;ctx.strokeRect(mmX,mmY,mmW,mmH);
            // Enemies on minimap
            for(let e of enemies){let mx=mmX+mmW/2+(e.x-player.x)*mmScale,my=mmY+mmH/2+(e.y-player.y)*mmScale;if(mx>=mmX&&mx<=mmX+mmW&&my>=mmY&&my<=mmY+mmH){ctx.fillStyle=ENEMY_COLORS[e.type]||'#ff4444';ctx.fillRect(mx-1,my-1,2,2);}}
            for(let e of elites){let mx=mmX+mmW/2+(e.x-player.x)*mmScale,my=mmY+mmH/2+(e.y-player.y)*mmScale;if(mx>=mmX&&mx<=mmX+mmW&&my>=mmY&&my<=mmY+mmH){ctx.fillStyle='#ff9933';ctx.fillRect(mx-2,my-2,4,4);}}
            for(let bs of bosses){let mx=mmX+mmW/2+(bs.x-player.x)*mmScale,my=mmY+mmH/2+(bs.y-player.y)*mmScale;if(mx>=mmX&&mx<=mmX+mmW&&my>=mmY&&my<=mmY+mmH){ctx.fillStyle=BOSS_TYPES[bs.bossType].color;ctx.beginPath();ctx.arc(mx,my,4,0,Math.PI*2);ctx.fill();}}
            for(let c of chests){if(c.isOpen)continue;let mx=mmX+mmW/2+(c.x-player.x)*mmScale,my=mmY+mmH/2+(c.y-player.y)*mmScale;if(mx>=mmX&&mx<=mmX+mmW&&my>=mmY&&my<=mmY+mmH){ctx.fillStyle='#00ccaa';ctx.fillRect(mx-2,my-2,4,4);}}
            // Environmental on minimap
            for(let s of healingShrines){if(!s.active)continue;let mx=mmX+mmW/2+(s.x-player.x)*mmScale,my=mmY+mmH/2+(s.y-player.y)*mmScale;if(mx>=mmX&&mx<=mmX+mmW&&my>=mmY&&my<=mmY+mmH){ctx.fillStyle='#44ff44';ctx.fillRect(mx-2,my-2,4,4);}}
            for(let lp of lavaPools){let mx=mmX+mmW/2+(lp.x-player.x)*mmScale,my=mmY+mmH/2+(lp.y-player.y)*mmScale;if(mx>=mmX&&mx<=mmX+mmW&&my>=mmY&&my<=mmY+mmH){ctx.fillStyle='#ff6600';ctx.fillRect(mx-2,my-2,4,4);}}
            for(let p of speedPortals){for(let pi=0;pi<2;pi++){let px=pi===0?p.x1:p.x2,py=pi===0?p.y1:p.y2;let mx=mmX+mmW/2+(px-player.x)*mmScale,my=mmY+mmH/2+(py-player.y)*mmScale;if(mx>=mmX&&mx<=mmX+mmW&&my>=mmY&&my<=mmY+mmH){ctx.fillStyle='#4488ff';ctx.beginPath();ctx.arc(mx,my,3,0,Math.PI*2);ctx.fill();}}}
            // Other players on minimap
            if(isMP){drawOtherPlayersOnMinimap(mmX,mmY,mmW,mmH,mmScale);}
            // Player dot on minimap
            ctx.fillStyle='#ffffff';ctx.fillRect(mmX+mmW/2-2,mmY+mmH/2-2,4,4);
            }

            // Live leaderboard (top-left, no shake)
            let lb=getLiveLeaderboard();
            ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(8,8,185,22+(lb.length>0?lb.length*18:18));
            ctx.font='12px monospace';ctx.fillStyle='#ffd966';ctx.fillText('🏆 排行榜 Top 3',14,23);
            if(lb.length>0){for(let i=0;i<lb.length;i++){let medal=i===0?'🥇':i===1?'🥈':'🥉';ctx.fillStyle='#cbad8e';ctx.fillText(`${medal} ${lb[i].nick.slice(0,8)} ${formatDuration(lb[i].duration)}`,14,41+i*18);}}
            else{ctx.fillStyle='#666';ctx.fillText('暂无记录',14,41);}

            // Touch mode HUD
            if(controlMode==='touch'&&gameState===STATE_PLAYING){
                // Pause button (no background)
                ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(W-90,5,80,50);ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='28px monospace';ctx.textAlign='center';ctx.fillText('⏸',W-50,38);ctx.textAlign='left';
                // Dash button
                let dbX=W/2,dbY=H-50,dbR=28;ctx.beginPath();ctx.arc(dbX,dbY,dbR,0,Math.PI*2);
                if(player.dashCooldown>0){ctx.fillStyle='rgba(100,100,100,0.35)';ctx.fill();let pct=1-player.dashCooldown/DASH_COOLDOWN;ctx.beginPath();ctx.moveTo(dbX,dbY);ctx.arc(dbX,dbY,dbR,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);ctx.closePath();ctx.fillStyle='rgba(100,200,255,0.3)';ctx.fill();}
                else{ctx.fillStyle='rgba(100,200,255,0.4)';ctx.fill();}
                ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(dbX,dbY,dbR,0,Math.PI*2);ctx.stroke();
                ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='13px monospace';ctx.textAlign='center';ctx.fillText('闪避',dbX,dbY+5);ctx.textAlign='left';
                // Skill button (right of dash)
                if(roleData.skill){
                    let sbX=W/2+75,sbY=H-50,sbR=28,skRole=ROLES[selectedRole];
                    ctx.beginPath();ctx.arc(sbX,sbY,sbR,0,Math.PI*2);
                    if(player.skillTimer>0){ctx.fillStyle='rgba(100,100,100,0.35)';ctx.fill();let pct=1-player.skillTimer/skRole.skillCD;ctx.beginPath();ctx.moveTo(sbX,sbY);ctx.arc(sbX,sbY,sbR,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);ctx.closePath();ctx.fillStyle='rgba(255,200,100,0.3)';ctx.fill();}
                    else{ctx.fillStyle='rgba(255,200,100,0.4)';ctx.fill();}
                    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sbX,sbY,sbR,0,Math.PI*2);ctx.stroke();
                    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText(skRole.skillName,sbX,sbY+5);ctx.textAlign='left';
                }
                // Resurrection is automatic - no button needed
                // Joystick hints
                if(!leftJoy.active){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='16px monospace';ctx.fillText('移动',40,H-30);}
                if(!rightJoy.active){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='16px monospace';ctx.textAlign='right';ctx.fillText('瞄准',W-40,H-30);ctx.textAlign='left';}
                // Joysticks
                if(leftJoy.active){ctx.beginPath();ctx.arc(leftJoy.bx,leftJoy.by,JOY_R,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.arc(leftJoy.kx,leftJoy.ky,JOY_KNOB,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();}
                if(rightJoy.active){ctx.beginPath();ctx.arc(rightJoy.bx,rightJoy.by,JOY_R,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.arc(rightJoy.kx,rightJoy.ky,JOY_KNOB,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();}
            }
            // Touch tutorial overlay (tap to dismiss)
            if(controlMode==='touch'&&showTouchTutorial){
                ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
                // Left joystick hint
                ctx.beginPath();ctx.arc(W*0.25,H*0.55,50,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=3;ctx.stroke();
                ctx.beginPath();ctx.arc(W*0.25,H*0.55,18,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
                ctx.font='bold 22px monospace';ctx.fillStyle='#fadf9e';ctx.textAlign='center';ctx.fillText('← 左: 移动 →',W*0.25,H*0.35);
                // Right joystick hint
                ctx.beginPath();ctx.arc(W*0.75,H*0.55,50,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=3;ctx.stroke();
                ctx.beginPath();ctx.arc(W*0.75,H*0.55,18,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
                ctx.font='bold 22px monospace';ctx.fillStyle='#fadf9e';ctx.fillText('← 右: 攻击方向 →',W*0.75,H*0.35);
                // Center tips
                ctx.font='18px monospace';ctx.fillStyle='#aaaaaa';ctx.fillText('自动射击 · 右摇杆改变方向',W*0.5,H*0.8);
                let blink=0.5+0.5*Math.sin(Date.now()/300);ctx.fillStyle=`rgba(255,223,158,${blink})`;ctx.font='bold 20px monospace';ctx.fillText('点击屏幕开始',W*0.5,H*0.92);
                ctx.textAlign='left';
            }
            ctx.shadowBlur=0;
        }

        // Animation loop
        function tick(now){
            if(!lastTimestamp){lastTimestamp=now;requestAnimationFrame(tick);return;}
            const dt=Math.min(0.05,(now-lastTimestamp)/1000);lastTimestamp=now;
            // Pause game while tutorial is showing
            if(stateInputCooldown>0)stateInputCooldown-=dt;
            if(hitPause>0){hitPause-=dt;}
            else if(gameState!==STATE_PAUSED&&!showTouchTutorial)updateGame(dt,now/1000);
            // Host keeps enemies running when dead/shopping — but NOT during upgrade (game pauses for upgrade)
            if(isHostMP()&&gameState!==STATE_PLAYING&&gameState!==STATE_PAUSED&&gameState!==STATE_UPGRADE){updateHostEntities(dt,now/1000);}
            // MP upgrade sync countdown
            if(isMP&&mpWaitingForUpgrade){mpUpgradeTimer-=dt;if(mpUpgradeTimer<=0){autoPickUpgrade();}}
            // MP ghost mode: move ghost, eat orbs, broadcast state
            if(isMP&&gameState===STATE_GAMEOVER&&mpIsDead){
                broadcastMyState();cleanupDisconnected();
                // Ghost movement (WASD or joystick)
                let gmx=0,gmy=0;
                if(controlMode==='touch'&&leftJoy.active){
                    let jdx=leftJoy.kx-leftJoy.bx,jdy=leftJoy.ky-leftJoy.by,jd=Math.hypot(jdx,jdy);
                    if(jd>JOY_DEAD){gmx=jdx/jd;gmy=jdy/jd;}
                }else{
                    if(keys[keyMap.up])gmy-=1;if(keys[keyMap.down])gmy+=1;if(keys[keyMap.left])gmx-=1;if(keys[keyMap.right])gmx+=1;
                }
                if(gmx||gmy){let gl=Math.hypot(gmx,gmy);mpGhostX+=gmx/gl*180*dt;mpGhostY+=gmy/gl*180*dt;}
                worldOffsetX=mpGhostX-W/2;worldOffsetY=mpGhostY-H/2;
                // Ghost eats XP orbs
                for(let i=xpOrbs.length-1;i>=0;i--){
                    let o=xpOrbs[i],d=Math.hypot(mpGhostX-o.x,mpGhostY-o.y);
                    if(d<30+o.radius){player.exp+=Math.floor(o.value*0.5);xpOrbs.splice(i,1);}
                    else if(d<80){let spd=150*dt;o.x+=(mpGhostX-o.x)/d*spd;o.y+=(mpGhostY-o.y)/d*spd;}
                }
                // Keep game time ticking for ghost
                gameTime+=dt;
            }
            updateAchievePopup(dt);
            // Decay screen shake even outside STATE_PLAYING (so death shake stops)
            if(gameState!==STATE_PLAYING&&screenShakeTimer>0)screenShakeTimer-=dt;
            // Sync leaderboard with Supabase
            syncLeaderboard();
            draw();requestAnimationFrame(tick);
        }

        // Events
        function initEvents(){
            canvas.addEventListener('mousemove',e=>{if(controlMode!=='keyboard')return;const r=canvas.getBoundingClientRect();mouseX=clamp((e.clientX-r.left)*canvas.width/r.width,0,canvas.width);mouseY=clamp((e.clientY-r.top)*canvas.height/r.height,0,canvas.height);});
            canvas.addEventListener('click',e=>{
                if(gameState!==STATE_GAMEOVER||!isMP||!mpIsDead)return;
                let anyAlive3=false;for(let oid in otherPlayers){if(otherPlayers[oid].alive){anyAlive3=true;break;}}
                if(anyAlive3||Object.keys(otherPlayers).length===0)return;
                const r=canvas.getBoundingClientRect();let cx=(e.clientX-r.left)*canvas.width/r.width,cy=(e.clientY-r.top)*canvas.height/r.height;
                if(cx>=W/2-120&&cx<=W/2+120&&cy>=280&&cy<=325){playAgainMP();}
                if(cx>=W/2-120&&cx<=W/2+120&&cy>=340&&cy<=385){backToMenu();}
            });
            window.addEventListener('keydown',e=>{
                if(controlMode!=='keyboard')return;const k=e.key.toLowerCase();if(remapAction)return;
                if(k===keyMap.pause){if(gameState===STATE_PLAYING)gameState=STATE_PAUSED;else if(gameState===STATE_PAUSED)gameState=STATE_PLAYING;e.preventDefault();}
                else if(k===' '&&gameState===STATE_PLAYING){triggerDash();e.preventDefault();}
                else if(k==='q'&&gameState===STATE_PLAYING){activateSkill();e.preventDefault();}
                // Resurrection is now automatic (stand in circle) - no R key needed
                else if(gameState===STATE_RELIC){if(k==='1')applyRelic(0);if(k==='2')applyRelic(1);if(k==='3')applyRelic(2);e.preventDefault();}
                else if(gameState===STATE_SKILL_UP){if(k==='1')applySkillUpgrade(0);if(k==='2')applySkillUpgrade(1);if(k==='3')applySkillUpgrade(2);e.preventDefault();}
                else if(gameState===STATE_UPGRADE){if(k==='1')applyUpgrade(0);if(k==='2')applyUpgrade(1);if(k==='3')applyUpgrade(2);e.preventDefault();}
                else if(gameState===STATE_SHOP){if(stateInputCooldown>0){e.preventDefault();}else{if(k==='1')buyShopItem(0);if(k==='2')buyShopItem(1);if(k==='3')buyShopItem(2);if(k==='r')refreshShop();if(k==='enter')gameState=STATE_PLAYING;e.preventDefault();}}
                else{keys[k]=true;e.preventDefault();}
            });
            window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
            restartBtn.addEventListener('click',backToMenu);
        }

        // Back to menu (keep nickname, refresh unlocks)
        function backToMenu(){
            checkUnlocks();buildRoleSelect();buildPermUpgrades();buildAchievements();
            gameWrapper.style.display='none';
            document.body.classList.remove('touch-mode');
            if(gameLoop){cancelAnimationFrame(gameLoop);gameLoop=null;}
            if(isMP){
                // Go back to front page lobby (keep room connection)
                startScreen.style.display='none';
                document.getElementById('frontPage').style.display='flex';
                document.getElementById('fpRoomSection').style.display='block';
                document.getElementById('fpLobby').style.display='block';
                updateRoomPlayerList();
            }else{
                startScreen.style.display='none';
                document.getElementById('frontPage').style.display='flex';
                document.getElementById('fpRoomSection').style.display='none';
                leaveRoom();
            }
        }

        function playAgainMP(){
            if(!isMP||!mpChannel)return;
            if(isRoomHost){
                mpChannel.send({type:'broadcast',event:'mp_restart',payload:{}});
                resetGame();initEvents();lastTimestamp=0;
                if(gameLoop)cancelAnimationFrame(gameLoop);gameLoop=requestAnimationFrame(tick);
            }
        }

        // Start screen
        function startGame(mode){
            controlMode=mode;
            gameMode=document.getElementById('bossRushCheck').checked?'bossRush':'normal';
            activeMutators=[];document.querySelectorAll('#mutatorChecks input[type=checkbox]:checked').forEach(cb=>{activeMutators.push(cb.dataset.mutator);});
            let nickEl=document.getElementById('nickInput');playerNickname=(nickEl&&nickEl.value.trim())?nickEl.value.trim():'Player';
            startScreen.style.display='none';document.getElementById('frontPage').style.display='none';
            gameWrapper.style.display=mode==='touch'?'flex':'block';
            if(mode==='touch'){document.body.classList.add('touch-mode');if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{});if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{});}
            // If host starting MP, notify clients
            if(isRoomHost&&mpChannel){
                isMP=true;
                if(lobbyBroadcastInterval){clearInterval(lobbyBroadcastInterval);lobbyBroadcastInterval=null;}
                mpChannel.send({type:'broadcast',event:'game_start',payload:{roomCode:roomCode}});
            }
            resetGame();initEvents();lastTimestamp=0;if(gameLoop)cancelAnimationFrame(gameLoop);gameLoop=requestAnimationFrame(tick);
        }
        document.getElementById('keyboardModeBtn').addEventListener('click',()=>startGame('keyboard'));
        document.getElementById('touchModeBtn').addEventListener('click',()=>startGame('touch'));
        // Front page buttons
        document.getElementById('fpSoloBtn').addEventListener('click',()=>{
            isMP=false;document.getElementById('frontPage').style.display='none';
            document.getElementById('startScreen').style.display='flex';
        });
        document.getElementById('fpMultiBtn').addEventListener('click',()=>{
            document.getElementById('fpRoomSection').style.display='block';
        });
        document.getElementById('fpCreateBtn').addEventListener('click',()=>{
            createRoom();
            document.getElementById('fpLobby').style.display='block';
        });
        document.getElementById('fpJoinBtn').addEventListener('click',()=>{
            // Override input source for front page
            let oldInput=document.getElementById('joinCodeInput');
            let fpInput=document.getElementById('fpJoinInput');
            if(oldInput)oldInput.value=fpInput.value;
            joinRoom();
            document.getElementById('fpLobby').style.display='block';
        });
        document.getElementById('fpLeaveBtn').addEventListener('click',()=>{
            leaveRoom();
            document.getElementById('fpLobby').style.display='none';
        });
        document.getElementById('fpStartBtn').addEventListener('click',()=>{
            // Host tells everyone to go to character select
            if(mpChannel){mpChannel.send({type:'broadcast',event:'go_to_select',payload:{}});}
            if(lobbyBroadcastInterval){clearInterval(lobbyBroadcastInterval);lobbyBroadcastInterval=null;}
            document.getElementById('frontPage').style.display='none';
            document.getElementById('startScreen').style.display='flex';
        });
    })();</script>
</body>
</html>
