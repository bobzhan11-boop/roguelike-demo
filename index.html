<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dot · Roguelike</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#0b0e14; min-height:100vh; display:flex; justify-content:center; align-items:center; font-family:'Courier New',Courier,monospace; touch-action:manipulation; }

        /* Start Screen */
        #startScreen { position:fixed; top:0;left:0;right:0;bottom:0; background:#0b0e14; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:200; color:#fadf9e; }
        #startScreen h1 { font-size:3rem; margin-bottom:8px; text-shadow:0 0 20px #aa8b6e; }
        #startScreen h2 { font-size:1.2rem; color:#7e8a9a; margin-bottom:40px; }
        .mode-buttons { display:flex; gap:30px; flex-wrap:wrap; justify-content:center; }
        .mode-btn { background:#1a1f2b; border:3px solid #6b4f3a; border-radius:20px; padding:30px 40px; color:#fadf9e; font-family:inherit; font-size:1.3rem; font-weight:bold; cursor:pointer; transition:0.15s; min-width:220px; text-align:center; }
        .mode-btn:hover { background:#262d3a; border-color:#aa8b6e; transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,0.5); }
        .mode-btn small { display:block; color:#7e8a9a; font-size:0.85rem; margin-top:8px; font-weight:normal; }
        .nick-row { margin-bottom:30px; display:flex; align-items:center; gap:12px; }
        .nick-row label { color:#cbad8e; font-size:1.1rem; }
        #nickInput { background:#10131f; border:2px solid #6b4f3a; border-radius:12px; padding:8px 16px; color:#fadf9e; font-family:inherit; font-size:1.1rem; width:180px; text-align:center; outline:none; }
        #nickInput:focus { border-color:#aa8b6e; }

        /* Game */
        .game-wrapper { width:100%; max-width:min(1200px,95vw,calc((100vh - 150px)/0.6)); padding:10px; display:none; }
        .game-container { background:#1a1f2b; border-radius:28px; padding:20px; box-shadow:0 20px 30px rgba(0,0,0,0.7); }
        .canvas-wrapper { position:relative; width:100%; padding-top:60%; background:#10131f; border-radius:20px; overflow:hidden; border:2px solid #4e3b2e; }
        canvas { position:absolute; top:0;left:0; width:100%;height:100%; display:block; cursor:crosshair; touch-action:none; }
        .info-panel { display:flex; flex-wrap:wrap; justify-content:space-between; margin-top:16px; color:#cbad8e; font-weight:bold; font-size:1.2rem; text-shadow:2px 2px 0 #2d241c; background:#262d3a; padding:12px 16px; border-radius:60px; border:2px solid #6b4f3a; gap:8px; }
        .info-item { display:flex; align-items:center; gap:4px; }
        .badge { background:#3f2f23; padding:4px 12px; border-radius:40px; color:#fadf9e; border:1px solid #aa8b6e; min-width:80px; text-align:center; font-size:1rem; }
        button { background:#6d4f3a; border:none; color:#faeac6; font-weight:bold; font-size:1.1rem; padding:8px 16px; border-radius:50px; cursor:pointer; border-bottom:4px solid #3a2c1e; font-family:inherit; transition:0.08s linear; touch-action:manipulation; }
        button:active { border-bottom-width:2px; transform:translateY(2px); }
        .tips { color:#7e8a9a; margin-top:12px; padding-left:12px; font-size:0.85rem; line-height:1.4; display:flex; flex-wrap:wrap; gap:15px; }
        .key-hint { background:#2a3140; padding:4px 8px; border-radius:20px; display:inline-block; }
        #settingsPanel { display:none; position:fixed; top:50%;left:50%; transform:translate(-50%,-50%); background:#1e2533; border:3px solid #aa8b6e; border-radius:30px; padding:25px; color:#fadf9e; z-index:100; width:90%; max-width:400px; box-shadow:0 10px 30px black; }
        #settingsPanel h3 { text-align:center; margin-bottom:20px; font-size:1.8rem; }
        .key-setting { display:flex; justify-content:space-between; margin:15px 0; align-items:center; }
        .key-setting button { background:#3f2f23; border-bottom:2px solid #1e1510; padding:8px 20px; min-width:80px; }
        .key-setting .key-display { background:#10131f; padding:6px 16px; border-radius:30px; border:1px solid #6b4f3a; font-size:1.3rem; min-width:70px; text-align:center; }
        #settingsClose { display:block; width:100%; margin-top:20px; }
        #fullscreenBtn { background:#4a3f33; border-bottom-color:#2d241c; }

        /* Touch mode */
        body.touch-mode { align-items:stretch; }
        body.touch-mode .game-wrapper { max-width:none; padding:0; height:100vh; display:flex; flex-direction:column; }
        body.touch-mode .game-container { border-radius:0; padding:4px; flex:1; display:flex; flex-direction:column; }
        body.touch-mode .canvas-wrapper { border-radius:8px; border:none; flex:1; padding-top:0; }
        body.touch-mode canvas { cursor:default; }
        body.touch-mode .info-panel { margin-top:4px; padding:6px 10px; font-size:0.9rem; border-radius:30px; gap:4px; }
        body.touch-mode .badge { min-width:50px; font-size:0.8rem; padding:2px 8px; }
        body.touch-mode .tips { display:none; }
        body.touch-mode #settingsPanel { display:none !important; }
        #rotateOverlay { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:#0b0e14; color:#fadf9e; font-size:1.5rem; z-index:300; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px; }
        #rotateOverlay .rotate-icon { font-size:4rem; margin-bottom:20px; }
        @media(orientation:portrait){ body.touch-mode #rotateOverlay{display:flex;} body.touch-mode .game-wrapper{display:none !important;} }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>Dot · Roguelike</h1>
        <h2>点·火柴人 · 肉鸽</h2>
        <div class="nick-row"><label>昵称:</label><input type="text" id="nickInput" placeholder="Player" maxlength="12"></div>
        <div class="mode-buttons">
            <button class="mode-btn" id="keyboardModeBtn">⌨️ 键盘 + 鼠标<small>Keyboard + Mouse</small></button>
            <button class="mode-btn" id="touchModeBtn">📱 触屏控制<small>Touch Joystick</small></button>
        </div>
    </div>
    <div id="rotateOverlay"><div class="rotate-icon">📱🔄</div><div>请横屏使用<br>Please rotate to landscape</div></div>

    <div class="game-wrapper" id="gameWrapper">
        <div class="game-container">
            <div class="canvas-wrapper" id="canvasWrapper"><canvas id="gameCanvas" width="1000" height="600"></canvas></div>
            <div class="info-panel" id="infoPanel">
                <div class="info-item">❤️ <span id="hpDisplay" class="badge">0/0</span></div>
                <div class="info-item">⚡ LV <span id="levelDisplay" class="badge">1</span></div>
                <div class="info-item">✨ EXP <span id="expDisplay" class="badge">0/100</span></div>
                <div class="info-item">💀 <span id="killDisplay" class="badge">0</span></div>
                <div class="info-item">💰 <span id="goldDisplay" class="badge">0</span></div>
                <div class="info-item">⏱️ <span id="timeDisplay" class="badge">00:00:00</span></div>
                <button id="restartBtn">↺ 重来</button>
            </div>
            <div class="tips" id="tipsBar">
                <span class="key-hint" id="moveHint">WASD 移动</span>
                <span class="key-hint" id="interactHint">E 开启宝箱</span>
                <span class="key-hint">Space 闪避</span>
                <span class="key-hint" id="pauseHint">P 暂停</span>
                <span class="key-hint" id="settingsHint">F 设置</span>
                <button id="fullscreenBtn">⛶ 全屏</button>
            </div>
        </div>
    </div>

    <div id="settingsPanel">
        <h3>⚙️ 按键设置</h3>
        <div class="key-setting"><span>向上</span><span class="key-display" id="key-up">W</span><button class="remap-btn" data-action="up">修改</button></div>
        <div class="key-setting"><span>向下</span><span class="key-display" id="key-down">S</span><button class="remap-btn" data-action="down">修改</button></div>
        <div class="key-setting"><span>向左</span><span class="key-display" id="key-left">A</span><button class="remap-btn" data-action="left">修改</button></div>
        <div class="key-setting"><span>向右</span><span class="key-display" id="key-right">D</span><button class="remap-btn" data-action="right">修改</button></div>
        <div class="key-setting"><span>互动</span><span class="key-display" id="key-interact">E</span><button class="remap-btn" data-action="interact">修改</button></div>
        <div class="key-setting"><span>暂停</span><span class="key-display" id="key-pause">P</span><button class="remap-btn" data-action="pause">修改</button></div>
        <button id="settingsClose">关闭</button>
    </div>

    <script>(function(){
        const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
        const hpSpan=document.getElementById('hpDisplay'), levelSpan=document.getElementById('levelDisplay');
        const expSpan=document.getElementById('expDisplay'), killSpan=document.getElementById('killDisplay');
        const goldSpan=document.getElementById('goldDisplay'), timeSpan=document.getElementById('timeDisplay');
        const restartBtn=document.getElementById('restartBtn'), fullscreenBtn=document.getElementById('fullscreenBtn');
        const settingsPanel=document.getElementById('settingsPanel'), settingsClose=document.getElementById('settingsClose');
        const startScreen=document.getElementById('startScreen'), gameWrapper=document.getElementById('gameWrapper');

        let controlMode='keyboard';
        let gameTime=0;
        let playerNickname='Player';
        let touchTutorialTimer=0;

        // Leaderboard (top 3 by play duration, localStorage)
        function getLeaderboard(){try{return JSON.parse(localStorage.getItem('rl_leaderboard'))||[];}catch(e){return[];}}
        function saveLeaderboard(board){localStorage.setItem('rl_leaderboard',JSON.stringify(board));}
        function updateLeaderboard(nick,duration){
            let board=getLeaderboard();board.push({nick,duration,ts:Date.now()});
            board.sort((a,b)=>b.duration-a.duration);board=board.slice(0,3);saveLeaderboard(board);
        }
        function formatDuration(s){let h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;}
        // Listen for cross-tab leaderboard updates
        window.addEventListener('storage',e=>{if(e.key==='rl_leaderboard'){/* board auto-refreshed via getLeaderboard() */}});

        // Key mapping
        let keyMap={up:'w',down:'s',left:'a',right:'d',interact:'e',pause:'p'};
        function updateKeyHints(){
            document.getElementById('moveHint').innerText=`${keyMap.up.toUpperCase()} ${keyMap.left.toUpperCase()} ${keyMap.down.toUpperCase()} ${keyMap.right.toUpperCase()} 移动`;
            document.getElementById('interactHint').innerText=`${keyMap.interact.toUpperCase()} 开启宝箱`;
            document.getElementById('pauseHint').innerText=`${keyMap.pause.toUpperCase()} 暂停`;
            ['up','down','left','right','interact','pause'].forEach(a=>{document.getElementById('key-'+a).innerText=keyMap[a].toUpperCase();});
        }
        let remapAction=null;
        document.querySelectorAll('.remap-btn').forEach(btn=>{
            btn.addEventListener('click',e=>{remapAction=e.target.dataset.action;e.target.innerText='按任意键...';e.target.disabled=true;setTimeout(()=>{if(remapAction){e.target.innerText='修改';e.target.disabled=false;remapAction=null;}},5000);});
        });
        window.addEventListener('keydown',e=>{
            if(remapAction){e.preventDefault();const key=e.key.toLowerCase();if(key.length===1||key==='escape'){keyMap[remapAction]=key;updateKeyHints();document.querySelectorAll('.remap-btn').forEach(b=>{b.innerText='修改';b.disabled=false;});remapAction=null;localStorage.setItem('keyMap',JSON.stringify(keyMap));}}
        });
        const savedMap=localStorage.getItem('keyMap');
        if(savedMap){try{keyMap={...keyMap,...JSON.parse(savedMap)};}catch(e){}}
        updateKeyHints();

        // Settings panel (F key)
        let gameStateBeforeSettings;
        document.addEventListener('keydown',e=>{
            if(controlMode!=='keyboard')return;
            if(e.key.toLowerCase()==='f'){
                if(settingsPanel.style.display==='block'){settingsPanel.style.display='none';if(gameStateBeforeSettings!==undefined){gameState=gameStateBeforeSettings;gameStateBeforeSettings=undefined;}}
                else{gameStateBeforeSettings=gameState;if(gameState!==STATE_PAUSED&&gameState!==STATE_GAMEOVER)gameState=STATE_PAUSED;settingsPanel.style.display='block';}
                e.preventDefault();
            }
        });
        settingsClose.addEventListener('click',()=>{settingsPanel.style.display='none';if(gameStateBeforeSettings!==undefined){gameState=gameStateBeforeSettings;gameStateBeforeSettings=undefined;}});
        fullscreenBtn.addEventListener('click',()=>{document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();});

        // Joystick state
        let leftJoy={active:false,id:null,bx:0,by:0,kx:0,ky:0};
        let rightJoy={active:false,id:null,bx:0,by:0,kx:0,ky:0};
        const JOY_R=60,JOY_KNOB=25,JOY_DEAD=8;

        // Persistent aim angle for touch mode (default: right)
        let touchAimAngle=0;

        function canvasTouchCoords(touch){
            const r=canvas.getBoundingClientRect();
            return{x:clamp((touch.clientX-r.left)*canvas.width/r.width,0,canvas.width),y:clamp((touch.clientY-r.top)*canvas.height/r.height,0,canvas.height)};
        }

        function handleJoyTouchStart(e){
            e.preventDefault();if(controlMode!=='touch')return;
            if(gameState===STATE_UPGRADE||gameState===STATE_SHOP||gameState===STATE_GAMEOVER||gameState===STATE_PAUSED){
                const t=e.changedTouches[0];if(t){const p=canvasTouchCoords(t);handleScreenTap(p.x,p.y);}return;
            }
            for(let i=0;i<e.changedTouches.length;i++){
                const t=e.changedTouches[i],pos=canvasTouchCoords(t);
                // Pause button
                if(pos.x>W-70&&pos.y<50&&gameState===STATE_PLAYING){gameState=STATE_PAUSED;return;}
                // Dash button
                if(pos.x>W/2-40&&pos.x<W/2+40&&pos.y>H-80&&pos.y<H-20&&gameState===STATE_PLAYING){triggerDash();return;}
                if(pos.x<W/2&&!leftJoy.active){leftJoy.active=true;leftJoy.id=t.identifier;leftJoy.bx=pos.x;leftJoy.by=pos.y;leftJoy.kx=pos.x;leftJoy.ky=pos.y;}
                else if(pos.x>=W/2&&!rightJoy.active){rightJoy.active=true;rightJoy.id=t.identifier;rightJoy.bx=pos.x;rightJoy.by=pos.y;rightJoy.kx=pos.x;rightJoy.ky=pos.y;}
            }
        }
        function handleJoyTouchMove(e){
            e.preventDefault();if(controlMode!=='touch')return;
            for(let i=0;i<e.changedTouches.length;i++){
                const t=e.changedTouches[i],pos=canvasTouchCoords(t);
                if(leftJoy.active&&t.identifier===leftJoy.id){let dx=pos.x-leftJoy.bx,dy=pos.y-leftJoy.by,d=Math.hypot(dx,dy);if(d>JOY_R){dx=dx/d*JOY_R;dy=dy/d*JOY_R;}leftJoy.kx=leftJoy.bx+dx;leftJoy.ky=leftJoy.by+dy;}
                if(rightJoy.active&&t.identifier===rightJoy.id){let dx=pos.x-rightJoy.bx,dy=pos.y-rightJoy.by,d=Math.hypot(dx,dy);if(d>JOY_R){dx=dx/d*JOY_R;dy=dy/d*JOY_R;}rightJoy.kx=rightJoy.bx+dx;rightJoy.ky=rightJoy.by+dy;}
            }
        }
        function handleJoyTouchEnd(e){
            e.preventDefault();if(controlMode!=='touch')return;
            for(let i=0;i<e.changedTouches.length;i++){
                const t=e.changedTouches[i];
                if(leftJoy.active&&t.identifier===leftJoy.id){leftJoy.active=false;leftJoy.id=null;}
                if(rightJoy.active&&t.identifier===rightJoy.id){rightJoy.active=false;rightJoy.id=null;}
            }
        }
        function handleScreenTap(tx,ty){
            const pX=200,pY=150,pW=600;
            if(gameState===STATE_UPGRADE&&upgradeOptions.length===3){for(let i=0;i<3;i++){let oy=pY+100+i*60;if(tx>=pX&&tx<=pX+pW&&ty>=oy&&ty<=oy+55){applyUpgrade(i);return;}}}
            if(gameState===STATE_SHOP){for(let i=0;i<3;i++){let oy=pY+100+i*60;if(tx>=pX&&tx<=pX+pW&&ty>=oy&&ty<=oy+55){buyShopItem(i);return;}}if(tx>=pX+60&&tx<=pX+200&&ty>=pY+280&&ty<=pY+320){refreshShop();return;}if(tx>=pX+350&&tx<=pX+500&&ty>=pY+280&&ty<=pY+320){gameState=STATE_PLAYING;return;}}
            if(gameState===STATE_GAMEOVER){resetGame();return;}
            if(gameState===STATE_PAUSED){gameState=STATE_PLAYING;return;}
        }
        canvas.addEventListener('touchstart',handleJoyTouchStart,{passive:false});
        canvas.addEventListener('touchmove',handleJoyTouchMove,{passive:false});
        canvas.addEventListener('touchend',handleJoyTouchEnd,{passive:false});
        canvas.addEventListener('touchcancel',handleJoyTouchEnd,{passive:false});

        let touchActive=false,touchTargetX=0,touchTargetY=0;

        // Game config
        const W=1000,H=600;
        let worldOffsetX=0,worldOffsetY=0;
        const PLAYER_RADIUS=12,BASE_SPEED=220,BASE_MAX_HP=20,BASE_DAMAGE=2.0,BASE_FIRE_INTERVAL=0.28;
        const BASE_BULLET_SPEED=480,BASE_BULLET_COUNT=1,BASE_CRIT_CHANCE=0.05,BASE_CRIT_DAMAGE=1.5;
        const BASE_PIERCING=0,BULLET_SIZE=5,INVINCIBLE_DURATION=0.7;
        const DODGE_DIMINISH_FACTOR=0.6,SPEED_DIMINISH_FACTOR=0.4;
        const BASE_EXP_NEXT=100,EXP_INCREASE_PER_LEVEL=70;

        // Dash constants
        const DASH_DURATION=0.2,DASH_COOLDOWN=2.5,DASH_SPEED_MULT=3;

        // Boss types
        const BOSS_TYPES={
            berserker:{name:'狂战士',color:'#cc2222',glow:'#ff4444',speedMult:1.8,healthMult:1.3,radiusMult:1.3,contactDamage:8,attackInterval:3.0},
            ranger:{name:'游侠',color:'#22aa55',glow:'#44ff88',speedMult:0.7,healthMult:1.0,radiusMult:0.9,contactDamage:3,attackInterval:1.8},
            sorcerer:{name:'巫师',color:'#7744cc',glow:'#aa66ff',speedMult:0.5,healthMult:0.9,radiusMult:1.0,contactDamage:4,attackInterval:2.5},
        };

        // Enemy type colors
        const ENEMY_COLORS={normal:null,shooter:'#4466cc',exploder:'#ff8800',tank:'#336633',splitter:'#44aaaa',mini:'#44aaaa'};

        const STATE_PLAYING='playing',STATE_UPGRADE='upgrade',STATE_SHOP='shop',STATE_GAMEOVER='gameover',STATE_PAUSED='paused';
        let gameState=STATE_PLAYING;
        let mouseX=W/2,mouseY=H/2;
        const keys={};

        let player={x:0,y:0,hp:20,maxHp:20,speed:BASE_SPEED,speedBonus:0,level:1,exp:0,nextExp:BASE_EXP_NEXT,
            damage:BASE_DAMAGE,fireInterval:BASE_FIRE_INTERVAL,bulletSpeed:BASE_BULLET_SPEED,bulletCount:BASE_BULLET_COUNT,
            critChance:BASE_CRIT_CHANCE,critDamage:BASE_CRIT_DAMAGE,piercing:BASE_PIERCING,bulletSize:BULLET_SIZE,
            dodge:0,invincibleTimer:0,radius:PLAYER_RADIUS,gold:0,damageFlash:0,
            dashCooldown:0,isDashing:false,dashTimer:0,dashDirX:0,dashDirY:0};

        let enemies=[],elites=[],bullets=[],xpOrbs=[],chests=[],bosses=[],floatingTexts=[],magicZones=[];
        let lastShotTime=0,lastSpawnTime=0,killCount=0,eliteKillCount=0,bossKillCount=0;
        let upgradeOptions=[],nearbyChest=null,shopItems=[null,null,null],shopRefreshCount=0;
        let lastTimestamp=0,gameLoop=null;
        let spawnRate=0.9,difficultyTimer=0,lastChestSpawnTime=0;
        const CHEST_SPAWN_INTERVAL=30;
        let bossCountdown=0,bossCountdownReason='',lastBossSpawnTime=0,lastBossLevel=0;
        const BOSS_SPAWN_INTERVAL=180,BOSS_COUNTDOWN_TIME=5;
        let lastEliteSpawnTime=0;

        // Screen shake
        let screenShakeTimer=0,screenShakeIntensity=0;

        // Helpers
        function clamp(v,mn,mx){return Math.min(mx,Math.max(mn,v));}
        function diminishingReturn(lv,f){return 1-1/(1+f*lv);}
        function getFinalDodge(){return diminishingReturn(player.dodge,DODGE_DIMINISH_FACTOR);}
        function getFinalSpeed(){return BASE_SPEED*(1+diminishingReturn(player.speedBonus,SPEED_DIMINISH_FACTOR));}

        function findNearestEnemy(){
            let nearest=null,minD=Infinity;
            for(let e of enemies){let d=Math.hypot(e.x-player.x,e.y-player.y);if(d<minD){minD=d;nearest=e;}}
            for(let e of elites){let d=Math.hypot(e.x-player.x,e.y-player.y);if(d<minD){minD=d;nearest=e;}}
            for(let e of bosses){let d=Math.hypot(e.x-player.x,e.y-player.y);if(d<minD){minD=d;nearest=e;}}
            return nearest;
        }

        // Dash
        function triggerDash(){
            if(player.dashCooldown>0||player.isDashing||gameState!==STATE_PLAYING)return;
            let dx=0,dy=0;
            if(controlMode==='touch'&&leftJoy.active){dx=leftJoy.kx-leftJoy.bx;dy=leftJoy.ky-leftJoy.by;}
            else{if(keys[keyMap.up])dy-=1;if(keys[keyMap.down])dy+=1;if(keys[keyMap.left])dx-=1;if(keys[keyMap.right])dx+=1;}
            let len=Math.hypot(dx,dy);
            if(len<0.001){dx=Math.cos(touchAimAngle);dy=Math.sin(touchAimAngle);}else{dx/=len;dy/=len;}
            player.isDashing=true;player.dashTimer=DASH_DURATION;player.dashCooldown=DASH_COOLDOWN;
            player.dashDirX=dx;player.dashDirY=dy;
        }

        function damagePlayer(amount){
            if(player.isDashing)return;
            player.hp-=amount;player.invincibleTimer=INVINCIBLE_DURATION;player.damageFlash=0.45;
            screenShakeTimer=0.2;screenShakeIntensity=4+Math.min(amount,8);
            if(player.hp<=0){gameState=STATE_GAMEOVER;screenShakeTimer=0.5;screenShakeIntensity=15;updateLeaderboard(playerNickname,gameTime);}
        }
        function tryDodgeOrDamage(amount){
            if(player.invincibleTimer>0||player.isDashing)return;
            if(Math.random()<getFinalDodge()){addFloatingText("闪避!",player.x,player.y-40,"#aaffaa");player.invincibleTimer=INVINCIBLE_DURATION*0.3;}
            else damagePlayer(amount);
        }

        function resetGame(){
            gameState=STATE_PLAYING;
            player={x:0,y:0,hp:BASE_MAX_HP,maxHp:BASE_MAX_HP,speed:BASE_SPEED,speedBonus:0,level:1,exp:0,nextExp:BASE_EXP_NEXT,
                damage:BASE_DAMAGE,fireInterval:BASE_FIRE_INTERVAL,bulletSpeed:BASE_BULLET_SPEED,bulletCount:BASE_BULLET_COUNT,

                dodge:0,invincibleTimer:0,radius:PLAYER_RADIUS,gold:0,damageFlash:0,
                dashCooldown:0,isDashing:false,dashTimer:0,dashDirX:0,dashDirY:0};
            enemies=[];elites=[];bullets=[];xpOrbs=[];chests=[];bosses=[];floatingTexts=[];magicZones=[];
            killCount=0;eliteKillCount=0;bossKillCount=0;lastShotTime=0;lastSpawnTime=0;lastChestSpawnTime=0;
            lastBossSpawnTime=0;lastBossLevel=0;lastEliteSpawnTime=0;difficultyTimer=0;gameTime=0;bossCountdown=0;
            spawnRate=0.9;upgradeOptions=[];nearbyChest=null;shopItems=[null,null,null];shopRefreshCount=0;

        function updateUI(){
            hpSpan.textContent=`${Math.max(0,player.hp)}/${player.maxHp}`;levelSpan.textContent=player.level;
            expSpan.textContent=`${Math.floor(player.exp)}/${player.nextExp}`;killSpan.textContent=killCount;goldSpan.textContent=player.gold;
            let h=Math.floor(gameTime/3600),m=Math.floor((gameTime%3600)/60),s=Math.floor(gameTime%60);
            timeSpan.textContent=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

        function addFloatingText(text,x,y,color="#ffd966"){floatingTexts.push({text,x,y,life:1.0,color});}
        function getMonsterStatsByLevel(){return{healthMult:1+player.level*0.12,speedMult:Math.min(2.2,1+player.level*0.08)};}

        // Spawn enemy with type variety
        function spawnEnemy(now){
            let baseDelay=Math.max(0.15,0.9-player.level*0.02);
            if(now-lastSpawnTime<baseDelay)return;lastSpawnTime=now;
            let stats=getMonsterStatsByLevel();
            let sizeVar=Math.random()*0.8+0.5,baseR=5+Math.floor(difficultyTimer*0.15);
            let radius=clamp(baseR*sizeVar,4,22);
            let health=Math.max(1,Math.floor(radius/3.2)*stats.healthMult+(player.level*0.3));
            let speed=(18+Math.random()*35)*stats.speedMult;

            // Choose enemy type
            let typePool=['normal'];
            if(player.level>=3)typePool.push('shooter');
            if(player.level>=5)typePool.push('exploder');
            if(player.level>=7)typePool.push('tank');
            if(player.level>=10)typePool.push('splitter');
            let type=Math.random()<0.7?'normal':typePool[Math.floor(Math.random()*typePool.length)];

            // Type-specific stat adjustments
            if(type==='shooter'){radius=clamp(radius*0.7,4,12);health*=0.6;speed*=0.6;}
            else if(type==='exploder'){radius=clamp(radius*0.5,4,9);health*=0.4;speed*=2.0;}
            else if(type==='tank'){radius=clamp(radius*1.6,12,28);health*=3;speed*=0.4;}
            else if(type==='splitter'){radius=clamp(radius*1.1,10,18);health*=1.5;speed*=0.9;}

            let angle=Math.random()*Math.PI*2,distance=450+Math.random()*300;
            enemies.push({x:player.x+Math.cos(angle)*distance,y:player.y+Math.sin(angle)*distance,
                radius,health,maxHealth:health,speed,isBoss:false,isElite:false,type:type,attackTimer:0});
        }

        function spawnElite(now){

            let t=now-lastBossSpawnTime;if(t>=BOSS_SPAWN_INTERVAL-BOSS_COUNTDOWN_TIME&&lastBossSpawnTime>0){bossCountdown=BOSS_COUNTDOWN_TIME;addFloatingText(`⚠️ Boss ${BOSS_COUNTDOWN_TIME}秒后出现`,player.x,player.y-80,"#ff5555");}
        }
        function spawnBoss(now){
            const tks=['berserker','ranger','sorcerer'],tk=tks[Math.floor(Math.random()*tks.length)],bt=BOSS_TYPES[tk];
            let r=(35+Math.random()*15)*bt.radiusMult,hp=Math.floor((80+player.level*30+difficultyTimer*2)*bt.healthMult);
            let spd=(30+player.level*1.5)*bt.speedMult,a=Math.random()*Math.PI*2;

            bosses.push({x,y,radius:r,health:hp,maxHealth:hp,speed:spd,isBoss:true,bossType:tk,

        // Boss attacks
        function rangerBossShoot(boss){
            let dx=player.x-boss.x,dy=player.y-boss.y,ba=Math.atan2(dy,dx);
            for(let i=0;i<5;i++){let a=ba+(i/4-0.5)*0.7;bullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*220,vy:Math.sin(a)*220,radius:6,damage:2,piercing:0,hitEnemies:new Set(),isCrit:false,life:3.5,fromBoss:true});}
        }
        function sorcererBossAttack(boss){
            boss.attackPhase=(boss.attackPhase||0)+1;
            if(boss.attackPhase%2===1){magicZones.push({x:player.x,y:player.y,radius:70,warningTime:1.2,activeTime:0.6,damage:4,phase:'warning',timer:0});addFloatingText("✨ 魔法区域!",player.x,player.y-30,"#aa66ff");}
            else{for(let i=0;i<8;i++){let a=(i/8)*Math.PI*2;bullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*160,vy:Math.sin(a)*160,radius:7,damage:3,piercing:0,hitEnemies:new Set(),isCrit:false,life:3.5,fromBoss:true});}}
        }

        function spawnXpFromEnemy(ex,ey,er,isBoss=false,isElite=false){
            let v=Math.floor(er/2)+2+Math.floor(player.level*0.8);if(isBoss)v*=5;if(isElite)v*=2;
            xpOrbs.push({x:ex,y:ey,radius:isBoss?12:(isElite?8:4+v*0.5),value:v});
            if(isBoss){let g=30+player.level*10;player.gold+=g;addFloatingText(`+${g}💰`,ex,ey-30,"#ffd966");}
            if(isElite){let g=5+player.level*2;player.gold+=g;addFloatingText(`+${g}💰`,ex,ey-30,"#ffd966");}
        }
        function spawnChest(now){if(now-lastChestSpawnTime<CHEST_SPAWN_INTERVAL)return;lastChestSpawnTime=now;let a=Math.random()*Math.PI*2,d=300+Math.random()*400;chests.push({x:player.x+Math.cos(a)*d,y:player.y+Math.sin(a)*d,radius:18,isOpen:false});}

        function openChest(ci){
            if(ci<0||ci>=chests.length)return;let ch=chests[ci];if(ch.isOpen)return;ch.isOpen=true;
            const items=[
                {n:'❤️ 回血30%',f:()=>{let h=Math.floor(player.maxHp*0.3);player.hp=Math.min(player.maxHp,player.hp+h);addFloatingText(`+${h} HP`,player.x,player.y-30,"#ff8888");}},
                {n:'💪 攻击力+1',f:()=>{player.damage+=1;addFloatingText("攻击+1",player.x,player.y-30,"#ffaa66");}},
                {n:'🏹 子弹+1',f:()=>{player.bulletCount=Math.min(10,player.bulletCount+1);addFloatingText("子弹+1",player.x,player.y-30,"#66ccff");}},
                {n:'⚡ 攻速提升',f:()=>{player.fireInterval=Math.max(0.08,player.fireInterval-0.03);addFloatingText("攻速提升",player.x,player.y-30,"#aadd66");}},
                {n:'🔫 子弹大小+2',f:()=>{player.bulletSize+=2;addFloatingText("子弹大小+2",player.x,player.y-30,"#ffaa88");}},
                {n:'💥 暴击率+3%',f:()=>{player.critChance=Math.min(0.8,player.critChance+0.03);addFloatingText("暴击+3%",player.x,player.y-30,"#ffdd44");}},
                {n:'🗡️ 暴击伤害+20%',f:()=>{player.critDamage+=0.2;addFloatingText("爆伤+20%",player.x,player.y-30,"#ffaa00");}},
                {n:'🎯 穿透+1',f:()=>{player.piercing+=1;addFloatingText("穿透+1",player.x,player.y-30,"#aaccff");}},
                {n:'💰 50金币',f:()=>{player.gold+=50;addFloatingText("+50金币",player.x,player.y-30,"#ffd966");}},
                {n:'💖 最大生命+10',f:()=>{player.maxHp+=10;player.hp+=10;addFloatingText("生命上限+10",player.x,player.y-30,"#ff8888");}},
                {n:'👟 速度+1',f:()=>{player.speedBonus+=1;addFloatingText("速度提升",player.x,player.y-30,"#88ff88");}},
                {n:'🌀 闪避+1',f:()=>{player.dodge+=1;addFloatingText("闪避提升",player.x,player.y-30,"#88aaff");}},
            ];
            items[Math.floor(Math.random()*items.length)].f();
            setTimeout(()=>{let idx=chests.findIndex(c=>c===ch);if(idx!==-1)chests.splice(idx,1);},500);
        }

        function shootBullet(now){
            if(gameState!==STATE_PLAYING||now-lastShotTime<player.fireInterval)return;lastShotTime=now;
            let aimDx,aimDy;
            if(controlMode==='touch'){
                // Update aim angle if right joystick is active
                if(rightJoy.active){let jdx=rightJoy.kx-rightJoy.bx,jdy=rightJoy.ky-rightJoy.by;if(Math.hypot(jdx,jdy)>JOY_DEAD)touchAimAngle=Math.atan2(jdy,jdx);}
                // Always shoot in current aim angle
                aimDx=Math.cos(touchAimAngle);aimDy=Math.sin(touchAimAngle);
            }else{
                aimDx=mouseX-(player.x-worldOffsetX);aimDy=mouseY-(player.y-worldOffsetY);
                let d=Math.hypot(aimDx,aimDy);if(d<0.001){aimDx=0;aimDy=-1;}else{aimDx/=d;aimDy/=d;}
            }
            let bc=player.bulletCount,ba=Math.atan2(aimDy,aimDx),sp=0.35;
            for(let i=0;i<bc;i++){
                let a=bc===1?ba:ba+(i/(bc-1)-0.5)*sp,bx=Math.cos(a),by=Math.sin(a);
                let crit=Math.random()<player.critChance,dm=crit?player.critDamage:1.0;
                bullets.push({x:player.x+bx*(player.radius+3),y:player.y+by*(player.radius+3),vx:bx*player.bulletSpeed,vy:by*player.bulletSpeed,
                    radius:player.bulletSize,damage:player.damage*dm,piercing:player.piercing,hitEnemies:new Set(),isCrit:crit,life:3.0,fromBoss:false});
            }
        }

        // Upgrade system
        function generateUpgradeOptions(){
            const pool=[
                {name:'❤️ 最大生命 +8',apply:p=>{p.maxHp+=8;p.hp+=8;}},{name:'⚡ 伤害 +1.0',apply:p=>{p.damage+=1.0;}},
                {name:'🏹 子弹数 +1',apply:p=>{p.bulletCount=Math.min(10,p.bulletCount+1);}},{name:'📈 射速 -0.03s',apply:p=>{p.fireInterval=Math.max(0.08,p.fireInterval-0.03);}},
                {name:'👟 速度+1',apply:p=>{p.speedBonus+=1;}},{name:'🌀 闪避+1',apply:p=>{p.dodge+=1;}},
                {name:'💥 暴击率 +4%',apply:p=>{p.critChance=Math.min(0.8,p.critChance+0.04);}},{name:'🗡️ 暴击伤害 +30%',apply:p=>{p.critDamage+=0.3;}},
                {name:'🎯 穿透 +1',apply:p=>{p.piercing+=1;}},{name:'🔫 子弹大小 +3',apply:p=>{p.bulletSize+=3;}},
            ];return[...pool].sort(()=>Math.random()-0.5).slice(0,3);
        }
        function applyUpgrade(i){
            if(i<0||i>=upgradeOptions.length)return;const old=player.nextExp;upgradeOptions[i].apply(player);
            player.level++;player.exp-=old;player.nextExp=Math.floor(BASE_EXP_NEXT+player.level*EXP_INCREASE_PER_LEVEL);upgradeOptions=[];
            if(player.exp>=player.nextExp){gameState=STATE_UPGRADE;upgradeOptions=generateUpgradeOptions();}else gameState=STATE_PLAYING;updateUI();
        }
        function checkLevelUp(){if(player.exp>=player.nextExp&&gameState===STATE_PLAYING){gameState=STATE_UPGRADE;upgradeOptions=generateUpgradeOptions();}}

        // Shop
        function generateShopItems(){
            return[{name:'❤️ 回血50%',price:30,effect:()=>{player.hp=Math.min(player.maxHp,player.hp+player.maxHp*0.5);}},
                {name:'💪 攻击力+2',price:40,effect:()=>{player.damage+=2;}},{name:'🏹 子弹数+1',price:50,effect:()=>{player.bulletCount=Math.min(10,player.bulletCount+1);}},
                {name:'⚡ 攻速提升',price:45,effect:()=>{player.fireInterval=Math.max(0.08,player.fireInterval-0.04);}},
                {name:'💥 暴击率+5%',price:40,effect:()=>{player.critChance=Math.min(0.8,player.critChance+0.05);}},
                {name:'🗡️ 暴击伤害+30%',price:50,effect:()=>{player.critDamage+=0.3;}},
                {name:'🎯 穿透+1',price:35,effect:()=>{player.piercing+=1;}},
                {name:'💖 最大生命+15',price:40,effect:()=>{player.maxHp+=15;player.hp+=15;}}
            ].sort(()=>Math.random()-0.5).slice(0,3);
        }
        function refreshShop(){if(gameState!==STATE_SHOP)return;let c=10+shopRefreshCount*10;if(player.gold<c){addFloatingText("金币不足",player.x,player.y-40,"#ff5555");return;}player.gold-=c;shopRefreshCount++;let ni=generateShopItems();shopItems=[ni[0]||null,ni[1]||null,ni[2]||null];addFloatingText("商店已刷新",player.x,player.y-30,"#aaffaa");}
        function buyShopItem(i){if(i<0||i>=3)return;let it=shopItems[i];if(!it){addFloatingText("已售罄",player.x,player.y-40,"#aaaaaa");return;}if(player.gold<it.price){addFloatingText("金币不足",player.x,player.y-40,"#ff5555");return;}player.gold-=it.price;it.effect();addFloatingText("已购买 "+it.name,player.x,player.y-30,"#aaffaa");shopItems[i]=null;updateUI();}

        // ---------- UPDATE ----------
        function updateGame(dt,nowS){
            if(gameState!==STATE_PLAYING)return;
            gameTime+=dt;
            if(player.invincibleTimer>0)player.invincibleTimer-=dt;
            if(player.damageFlash>0)player.damageFlash-=dt;
            if(player.dashCooldown>0)player.dashCooldown-=dt;
            if(screenShakeTimer>0)screenShakeTimer-=dt;
            if(touchTutorialTimer>0)touchTutorialTimer-=dt;

            // Dash movement
            if(player.isDashing){
                player.dashTimer-=dt;
                let ds=getFinalSpeed()*DASH_SPEED_MULT;
                player.x+=player.dashDirX*ds*dt;player.y+=player.dashDirY*ds*dt;
                if(player.dashTimer<=0)player.isDashing=false;
            }else{
                // Normal movement
                if(controlMode==='touch'){
                    if(leftJoy.active){let jdx=leftJoy.kx-leftJoy.bx,jdy=leftJoy.ky-leftJoy.by,jd=Math.hypot(jdx,jdy);
                        if(jd>JOY_DEAD){let sp=getFinalSpeed()*Math.min(1,jd/JOY_R);player.x+=(jdx/jd)*sp*dt;player.y+=(jdy/jd)*sp*dt;}}
                }else{
                    let mx=0,my=0;if(keys[keyMap.up])my-=1;if(keys[keyMap.down])my+=1;if(keys[keyMap.left])mx-=1;if(keys[keyMap.right])mx+=1;
                    if(mx||my){let l=Math.hypot(mx,my),sp=getFinalSpeed();player.x+=mx/l*sp*dt;player.y+=my/l*sp*dt;}
                    else if(touchActive){let dx=touchTargetX-player.x,dy=touchTargetY-player.y,d=Math.hypot(dx,dy);if(d>10){let sp=getFinalSpeed(),mv=Math.min(sp*dt,d*0.9);player.x+=(dx/d)*mv;player.y+=(dy/d)*mv;}}
                }
            }
            worldOffsetX=player.x-W/2;worldOffsetY=player.y-H/2;

            shootBullet(nowS);difficultyTimer+=dt;spawnEnemy(nowS);spawnChest(nowS);spawnElite(nowS);
            checkBossCountdown(nowS);
            if(bossCountdown>0){bossCountdown-=dt;if(bossCountdown<=0){bossCountdown=0;spawnBoss(nowS);}}

            // Enemy movement (type-specific)
            for(let e of enemies){
                let dx=player.x-e.x,dy=player.y-e.y,dist=Math.hypot(dx,dy);
                if(e.type==='shooter'){
                    let pref=220;
                    if(dist>pref+30&&dist>0.01){let mv=e.speed*dt;e.x+=(dx/dist)*mv;e.y+=(dy/dist)*mv;}
                    else if(dist<pref-30&&dist>0.01){let mv=e.speed*dt*0.5;e.x-=(dx/dist)*mv;e.y-=(dy/dist)*mv;}
                    e.attackTimer=(e.attackTimer||0)+dt;
                    if(e.attackTimer>=2.0&&dist>0.01){e.attackTimer=0;bullets.push({x:e.x,y:e.y,vx:(dx/dist)*150,vy:(dy/dist)*150,radius:4,damage:1,piercing:0,hitEnemies:new Set(),isCrit:false,life:3.0,fromBoss:true});}
                }else{
                    if(dist>0.01){let mv=e.speed*dt;e.x+=(dx/dist)*mv;e.y+=(dy/dist)*mv;}
                }
            }
            // Elite movement
            for(let e of elites){let dx=player.x-e.x,dy=player.y-e.y,d=Math.hypot(dx,dy);if(d>0.01){let mv=e.speed*dt;e.x+=(dx/d)*mv;e.y+=(dy/d)*mv;}}

            // Boss AI
            for(let boss of bosses){
                let dx=player.x-boss.x,dy=player.y-boss.y,dist=Math.hypot(dx,dy);
                if(boss.bossType==='berserker'){
                    if(!boss.isCharging){if(dist>0.01){let mv=boss.speed*dt;boss.x+=(dx/dist)*mv;boss.y+=(dy/dist)*mv;}boss.chargeTimer+=dt;
                        if(boss.chargeTimer>=boss.attackInterval&&dist<400){boss.isCharging=true;boss.chargeTimer=0;boss.chargeDuration=0.6;if(dist>0.01){boss.chargeDx=dx/dist;boss.chargeDy=dy/dist;}addFloatingText("💨",boss.x,boss.y-30,"#ff4444");}}
                    else{boss.chargeDuration-=dt;boss.x+=boss.chargeDx*boss.chargeSpeed*dt;boss.y+=boss.chargeDy*boss.chargeSpeed*dt;if(boss.chargeDuration<=0)boss.isCharging=false;}
                }else if(boss.bossType==='ranger'){
                    let pref=280;if(dist>pref+50&&dist>0.01){let mv=boss.speed*dt;boss.x+=(dx/dist)*mv;boss.y+=(dy/dist)*mv;}else if(dist<pref-50&&dist>0.01){let mv=boss.speed*dt*0.7;boss.x-=(dx/dist)*mv;boss.y-=(dy/dist)*mv;}
                    boss.attackTimer+=dt;if(boss.attackTimer>=boss.attackInterval){boss.attackTimer=0;rangerBossShoot(boss);}
                }else if(boss.bossType==='sorcerer'){
                    if(dist>300&&dist>0.01){let mv=boss.speed*dt;boss.x+=(dx/dist)*mv;boss.y+=(dy/dist)*mv;}
                    boss.teleportCooldown-=dt;if(dist<120&&boss.teleportCooldown<=0){let ta=Math.random()*Math.PI*2,td=300+Math.random()*150;boss.x=player.x+Math.cos(ta)*td;boss.y=player.y+Math.sin(ta)*td;boss.teleportCooldown=5;addFloatingText("✨",boss.x,boss.y-30,"#aa66ff");}
                    boss.attackTimer+=dt;if(boss.attackTimer>=boss.attackInterval){boss.attackTimer=0;sorcererBossAttack(boss);}
                }
            }

            // Magic zones
            for(let i=magicZones.length-1;i>=0;i--){
                let z=magicZones[i];z.timer+=dt;
                if(z.phase==='warning'&&z.timer>=z.warningTime){z.phase='active';z.timer=0;}
                else if(z.phase==='active'){if(Math.hypot(player.x-z.x,player.y-z.y)<z.radius+player.radius)tryDodgeOrDamage(z.damage);if(z.timer>=z.activeTime)magicZones.splice(i,1);}
            }

            // Bullets
            for(let i=bullets.length-1;i>=0;i--){
                let b=bullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;if(b.life<=0){bullets.splice(i,1);continue;}
                if(!b.fromBoss){
                    let hit=false;
                    for(let j=enemies.length-1;j>=0;j--){let e=enemies[j];if(b.hitEnemies.has(e))continue;if(Math.hypot(b.x-e.x,b.y-e.y)<b.radius+e.radius){
                        e.health-=b.damage;b.hitEnemies.add(e);
                        if(e.health<=0){
                            if(e.type==='splitter'){for(let s=0;s<3;s++){let sa=Math.random()*Math.PI*2;enemies.push({x:e.x+Math.cos(sa)*15,y:e.y+Math.sin(sa)*15,radius:5,health:2,maxHealth:2,speed:e.speed*1.5,isBoss:false,isElite:false,type:'mini',attackTimer:0});}}
                            spawnXpFromEnemy(e.x,e.y,e.radius);enemies.splice(j,1);killCount++;
                        }if(b.piercing<=0){hit=true;break;}else b.piercing--;}}
                    if(!hit)for(let j=elites.length-1;j>=0;j--){let e=elites[j];if(b.hitEnemies.has(e))continue;if(Math.hypot(b.x-e.x,b.y-e.y)<b.radius+e.radius){
                        e.health-=b.damage;b.hitEnemies.add(e);if(e.health<=0){spawnXpFromEnemy(e.x,e.y,e.radius,false,true);elites.splice(j,1);killCount++;}if(b.piercing<=0){hit=true;break;}else b.piercing--;}}
                    if(!hit)for(let j=bosses.length-1;j>=0;j--){let bs=bosses[j];if(b.hitEnemies.has(bs))continue;if(Math.hypot(b.x-bs.x,b.y-bs.y)<b.radius+bs.radius){
                        bs.health-=b.damage;b.hitEnemies.add(bs);if(bs.health<=0){spawnXpFromEnemy(bs.x,bs.y,bs.radius,true);bosses.splice(j,1);killCount++;bossKillCount++;
                            let ni=generateShopItems();shopItems=[ni[0]||null,ni[1]||null,ni[2]||null];shopRefreshCount=0;gameState=STATE_SHOP;}if(b.piercing<=0){hit=true;break;}else b.piercing--;}}
                    if(hit){bullets.splice(i,1);continue;}
                }else{if(Math.hypot(b.x-player.x,b.y-player.y)<b.radius+player.radius){tryDodgeOrDamage(b.damage);bullets.splice(i,1);continue;}}
            }

            // XP orbs
            for(let i=xpOrbs.length-1;i>=0;i--){let o=xpOrbs[i];if(Math.hypot(player.x-o.x,player.y-o.y)<player.radius+o.radius){player.exp+=o.value;xpOrbs.splice(i,1);}}

            // Chests
            nearbyChest=null;
            for(let i=0;i<chests.length;i++){let c=chests[i];if(c.isOpen)continue;let d=Math.hypot(player.x-c.x,player.y-c.y);
                if(d<player.radius+c.radius+20){nearbyChest=c;if(controlMode==='touch'){openChest(i);break;}if(keys[keyMap.interact]){openChest(i);keys[keyMap.interact]=false;}break;}}

            // Player vs enemies collision
            for(let j=enemies.length-1;j>=0;j--){
                let e=enemies[j],dx=player.x-e.x,dy=player.y-e.y,dist=Math.hypot(dx,dy),md=player.radius+e.radius;
                if(dist<md){
                    if(dist>0.001){let ov=md-dist,a=Math.atan2(dy,dx);player.x+=Math.cos(a)*ov*0.6;player.y+=Math.sin(a)*ov*0.6;}
                    if(e.type==='exploder'){
                        tryDodgeOrDamage(Math.max(3,Math.floor(e.radius)));
                        addFloatingText("💥",e.x,e.y,"#ff8800");screenShakeTimer=0.15;screenShakeIntensity=6;
                        spawnXpFromEnemy(e.x,e.y,e.radius);enemies.splice(j,1);killCount++;
                    }else{tryDodgeOrDamage(Math.max(1,Math.floor(e.radius/5)));}
                }
            }
            // Player vs elites
            for(let e of elites){let dx=player.x-e.x,dy=player.y-e.y,dist=Math.hypot(dx,dy),md=player.radius+e.radius;
                if(dist<md){if(dist>0.001){let ov=md-dist,a=Math.atan2(dy,dx);player.x+=Math.cos(a)*ov*0.6;player.y+=Math.sin(a)*ov*0.6;}tryDodgeOrDamage(Math.max(2,Math.floor(e.radius/4)));}}
            // Player vs bosses
            for(let bs of bosses){let dx=player.x-bs.x,dy=player.y-bs.y,dist=Math.hypot(dx,dy),md=player.radius+bs.radius;
                if(dist<md){if(dist>0.001){let ov=md-dist,a=Math.atan2(dy,dx);player.x+=Math.cos(a)*ov*0.4;player.y+=Math.sin(a)*ov*0.4;}tryDodgeOrDamage(bs.contactDamage);}}

            // Floating texts
            for(let i=floatingTexts.length-1;i>=0;i--){floatingTexts[i].life-=dt;if(floatingTexts[i].life<=0)floatingTexts.splice(i,1);}
            checkLevelUp();updateUI();
        }

        // ---------- DRAW ----------
        function draw(){
            ctx.clearRect(0,0,W,H);
            // Screen shake offset
            let shX=0,shY=0;
            if(screenShakeTimer>0){shX=(Math.random()-0.5)*screenShakeIntensity*2;shY=(Math.random()-0.5)*screenShakeIntensity*2;}
            ctx.save();ctx.translate(shX,shY);

            // Grid
            ctx.strokeStyle="#202a33";ctx.lineWidth=1;
            let sx=Math.floor(worldOffsetX/40)*40-worldOffsetX,sy=Math.floor(worldOffsetY/40)*40-worldOffsetY;
            for(let i=sx;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
            for(let i=sy;i<H;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}

            const w2s=(wx,wy)=>({x:wx-worldOffsetX,y:wy-worldOffsetY});

            // Magic zones
            for(let z of magicZones){let{x,y}=w2s(z.x,z.y);
                if(z.phase==='warning'){let p=0.3+0.3*Math.sin(z.timer*8);ctx.beginPath();ctx.arc(x,y,z.radius,0,Math.PI*2);ctx.fillStyle=`rgba(170,100,255,${p*0.2})`;ctx.fill();ctx.strokeStyle=`rgba(170,100,255,${p})`;ctx.lineWidth=3;ctx.stroke();}
                else if(z.phase==='active'){ctx.beginPath();ctx.arc(x,y,z.radius,0,Math.PI*2);ctx.fillStyle='rgba(170,50,255,0.45)';ctx.shadowColor='#aa00ff';ctx.shadowBlur=20;ctx.fill();ctx.shadowBlur=0;}}

            // XP orbs
            for(let o of xpOrbs){let{x,y}=w2s(o.x,o.y);ctx.beginPath();ctx.arc(x,y,o.radius,0,Math.PI*2);ctx.fillStyle="#f7d44a";ctx.shadowColor="#ffb347";ctx.shadowBlur=12;ctx.fill();}

            // Bullets
            for(let b of bullets){let{x,y}=w2s(b.x,b.y);ctx.beginPath();ctx.arc(x,y,b.radius-1,0,Math.PI*2);
                if(b.fromBoss){ctx.fillStyle="#ff6666";ctx.shadowColor="#ff0000";}else if(b.isCrit){ctx.fillStyle="#ffaa66";ctx.shadowColor="#ff8800";}else{ctx.fillStyle="#6dd5ff";ctx.shadowColor="#00a6ff";}
                ctx.shadowBlur=12;ctx.fill();}

            // Chests (cyan)
            for(let c of chests){if(c.isOpen)continue;let{x,y}=w2s(c.x,c.y);ctx.beginPath();ctx.arc(x,y,c.radius,0,Math.PI*2);ctx.fillStyle="#00ccaa";ctx.shadowColor="#00ffcc";ctx.shadowBlur=20;ctx.fill();
                ctx.shadowBlur=0;ctx.fillStyle="#000";ctx.font="20px monospace";ctx.fillText("?",x-7,y+7);
                if(nearbyChest===c&&controlMode==='keyboard'){ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,y,c.radius+5,0,Math.PI*2);ctx.stroke();ctx.fillStyle="#fff";ctx.font="14px monospace";ctx.fillText(`按 ${keyMap.interact.toUpperCase()} 开启`,x-45,y-25);}}

            // Normal enemies (type-specific colors)
            ctx.shadowBlur=0;
            for(let e of enemies){let{x,y}=w2s(e.x,e.y);ctx.beginPath();ctx.arc(x,y,e.radius,0,Math.PI*2);
                let col=ENEMY_COLORS[e.type];
                if(col){
                    ctx.fillStyle=col;
                    if(e.type==='exploder'){let pulse=0.7+0.3*Math.sin(Date.now()/100);ctx.fillStyle=`rgba(255,${Math.floor(136*pulse)},0,1)`;}
                    ctx.shadowColor=col;
                }else{let hp=e.health/e.maxHealth;ctx.fillStyle=`hsl(0,80%,${40+20*hp}%)`;ctx.shadowColor="#ff4444";}
                ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
                // Type indicator for special enemies
                if(e.type==='shooter'){ctx.fillStyle="#fff";ctx.font="10px monospace";ctx.textAlign="center";ctx.fillText("🔫",x,y+4);ctx.textAlign="left";}
                if(e.type==='tank'){ctx.fillStyle="#aaffaa";ctx.font="10px monospace";ctx.textAlign="center";ctx.fillText("🛡",x,y+4);ctx.textAlign="left";}
            }

            // Elites
            for(let e of elites){let{x,y}=w2s(e.x,e.y);ctx.beginPath();ctx.arc(x,y,e.radius,0,Math.PI*2);ctx.fillStyle="#ff9933";ctx.shadowColor="#ff7700";ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;
                ctx.fillStyle="#fff";ctx.font="12px monospace";ctx.textAlign="center";ctx.fillText("精英",x,y-e.radius-14);
                let bw=e.radius*2.5,bh=4,bx=x-bw/2,by=y-e.radius-10;ctx.fillStyle="#333";ctx.fillRect(bx,by,bw,bh);let hp=e.health/e.maxHealth;ctx.fillStyle=hp>0.5?"#ff9933":hp>0.25?"#ff6600":"#ff3300";ctx.fillRect(bx,by,bw*hp,bh);ctx.textAlign="left";}

            // Bosses
            for(let bs of bosses){let{x,y}=w2s(bs.x,bs.y),bt=BOSS_TYPES[bs.bossType];ctx.beginPath();ctx.arc(x,y,bs.radius,0,Math.PI*2);ctx.fillStyle=bt.color;ctx.shadowColor=bt.glow;ctx.shadowBlur=25;ctx.fill();ctx.shadowBlur=0;
                if(bs.bossType==='berserker'&&bs.isCharging){ctx.beginPath();ctx.arc(x,y,bs.radius+8,0,Math.PI*2);ctx.strokeStyle='rgba(255,100,50,0.7)';ctx.lineWidth=4;ctx.stroke();}
                ctx.fillStyle="#fff";ctx.font="bold 14px monospace";ctx.textAlign="center";ctx.fillText(bt.name,x,y-bs.radius-20);
                let bw=bs.radius*2.5,bh=6,bx=x-bw/2,by=y-bs.radius-14;ctx.fillStyle="#333";ctx.fillRect(bx,by,bw,bh);ctx.fillStyle=bt.color;ctx.fillRect(bx,by,bw*(bs.health/bs.maxHealth),bh);ctx.strokeStyle="#666";ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);ctx.textAlign="left";}

            // Player
            ctx.shadowBlur=25;ctx.shadowColor="#ffffff";
            if(player.invincibleTimer>0&&(Math.floor(Date.now()/200)%2===0))ctx.fillStyle="#fffbe3";else ctx.fillStyle="#f0f0ff";
            if(player.isDashing)ctx.fillStyle="#aaddff";
            let sp=w2s(player.x,player.y);
            // Dash trail
            if(player.isDashing){for(let t=1;t<=3;t++){ctx.beginPath();ctx.arc(sp.x-player.dashDirX*t*14,sp.y-player.dashDirY*t*14,player.radius*(1-t*0.15),0,Math.PI*2);ctx.fillStyle=`rgba(170,220,255,${0.4-t*0.1})`;ctx.fill();}}
            ctx.beginPath();ctx.arc(sp.x,sp.y,player.radius,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
            // Damage flash
            if(player.damageFlash>0){let al=Math.min(1,player.damageFlash/0.3);ctx.beginPath();ctx.arc(sp.x,sp.y,player.radius+5,0,Math.PI*2);ctx.strokeStyle=`rgba(255,40,40,${al*0.8})`;ctx.lineWidth=3;ctx.stroke();ctx.beginPath();ctx.arc(sp.x,sp.y,player.radius,0,Math.PI*2);ctx.fillStyle=`rgba(255,0,0,${al*0.35})`;ctx.fill();}
            // Aim line (keyboard only)
            if(controlMode==='keyboard'){ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.lineTo(mouseX,mouseY);ctx.strokeStyle="#b3a1a155";ctx.lineWidth=1;ctx.stroke();}

            // Dash cooldown indicator (near player)
            if(player.dashCooldown>0){
                let pct=1-player.dashCooldown/DASH_COOLDOWN;
                ctx.beginPath();ctx.arc(sp.x,sp.y,player.radius+10,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);
                ctx.strokeStyle='rgba(100,200,255,0.5)';ctx.lineWidth=2;ctx.stroke();
            }

            // Stats
            ctx.fillStyle="#ffffffcc";ctx.font="14px monospace";
            ctx.fillText(`暴击:${Math.round(player.critChance*100)}% 爆伤:${Math.round(player.critDamage*100)}% 穿透:${player.piercing}`,20,30);
            ctx.fillText(`速度:${Math.round(getFinalSpeed())} 闪避:${Math.round(getFinalDodge()*100)}%`,20,50);

            // Leaderboard (top-left, below stats)
            let lb=getLeaderboard();
            if(lb.length>0){
                ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(12,58,200,18+lb.length*18);
                ctx.font='12px monospace';ctx.fillStyle='#ffd966';ctx.fillText('🏆 排行榜',18,73);
                for(let i=0;i<lb.length;i++){
                    let medal=i===0?'🥇':i===1?'🥈':'🥉';
                    ctx.fillStyle='#cbad8e';ctx.fillText(`${medal} ${lb[i].nick.slice(0,8)} ${formatDuration(lb[i].duration)}`,18,91+i*18);
                }
            }

            // Floating texts
            for(let ft of floatingTexts){let{x,y}=w2s(ft.x,ft.y);ctx.globalAlpha=ft.life;ctx.font="bold 20px 'Courier New'";ctx.fillStyle=ft.color;ctx.fillText(ft.text,x-30,y-40-(1-ft.life)*20);ctx.globalAlpha=1.0;}

            const pnX=200,pnY=150,pnW=600,pnH=320;
            // Upgrade screen
            if(gameState===STATE_UPGRADE&&upgradeOptions.length===3){
                ctx.fillStyle="#0f172ad9";ctx.shadowBlur=0;ctx.fillRect(pnX,pnY,pnW,pnH);ctx.strokeStyle="#c79a6e";ctx.lineWidth=6;ctx.strokeRect(pnX,pnY,pnW,pnH);
                ctx.font="bold 34px 'Courier New'";ctx.fillStyle="#f7e3b2";ctx.fillText("⚡ 升级选择",pnX+160,pnY+70);
                ctx.font="26px 'Courier New'";ctx.textBaseline="middle";
                ctx.textAlign="right";for(let i=0;i<3;i++){ctx.fillStyle="#c7b087";ctx.fillText(`[${i+1}]`,pnX+90,pnY+130+i*60);}
                ctx.textAlign="left";for(let i=0;i<3;i++){ctx.fillStyle="#f0dbb4";ctx.fillText(upgradeOptions[i].name,pnX+110,pnY+130+i*60);}
                ctx.textAlign="left";ctx.textBaseline="alphabetic";ctx.font="18px monospace";ctx.fillStyle="#b5c9b0";
                ctx.fillText(controlMode==='touch'?"点击选项进行选择":"按数字键 1/2/3 选择",pnX+110,pnY+300);
            }
            // Shop screen
            if(gameState===STATE_SHOP){
                ctx.fillStyle="#1e2a3ad9";ctx.shadowBlur=0;ctx.fillRect(pnX,pnY,pnW,pnH);ctx.strokeStyle="#ffd966";ctx.lineWidth=6;ctx.strokeRect(pnX,pnY,pnW,pnH);
                ctx.font="bold 34px 'Courier New'";ctx.fillStyle="#f7e3b2";ctx.fillText("🏪 神秘商店",pnX+160,pnY+70);ctx.font="20px monospace";ctx.fillStyle="#ffd966";ctx.fillText(`金币: ${player.gold}`,pnX+400,pnY+70);
                ctx.font="26px 'Courier New'";ctx.textBaseline="middle";
                ctx.textAlign="right";for(let i=0;i<3;i++){ctx.fillStyle="#c7b087";ctx.fillText(`[${i+1}]`,pnX+90,pnY+130+i*60);}
                ctx.textAlign="left";for(let i=0;i<3;i++){let it=shopItems[i];if(it){ctx.fillStyle="#f0dbb4";ctx.fillText(`${it.name}  - ${it.price}💰`,pnX+110,pnY+130+i*60);}else{ctx.fillStyle="#888888";ctx.fillText("已售罄",pnX+110,pnY+130+i*60);}}
                ctx.textAlign="left";ctx.textBaseline="alphabetic";ctx.font="18px monospace";ctx.fillStyle="#b5c9b0";let rc=10+shopRefreshCount*10;
                if(controlMode==='touch'){ctx.fillStyle="#3a4a5acc";ctx.fillRect(pnX+60,pnY+280,140,30);ctx.fillRect(pnX+350,pnY+280,140,30);ctx.fillStyle="#b5c9b0";ctx.fillText(`刷新(${rc}💰)`,pnX+75,pnY+300);ctx.fillText("离开商店",pnX+375,pnY+300);}
                else ctx.fillText(`1/2/3购买 [R]刷新(${rc}💰) [${keyMap.pause.toUpperCase()}]离开`,pnX+60,pnY+300);
            }
            // Paused
            if(gameState===STATE_PAUSED){ctx.fillStyle="#000000aa";ctx.fillRect(0,0,W,H);ctx.font="56px 'Courier New'";ctx.fillStyle="#dddddd";ctx.textAlign="center";ctx.fillText("⏸ 暂停",W/2,280);ctx.font="24px monospace";ctx.fillStyle="#b5a87d";ctx.fillText(controlMode==='touch'?"点击屏幕继续":`按 ${keyMap.pause.toUpperCase()} 继续`,W/2,360);ctx.textAlign="left";}
            // Game over
            if(gameState===STATE_GAMEOVER){ctx.fillStyle="#000000cc";ctx.fillRect(0,0,W,H);ctx.font="56px 'Courier New'";ctx.fillStyle="#e05a5a";ctx.textAlign="center";ctx.fillText("💔 熄灭了",W/2,280);ctx.font="28px monospace";ctx.fillStyle="#b5a87d";ctx.fillText(controlMode==='touch'?"点击屏幕重新开始":"点击 [重来] 再试一次",W/2,380);ctx.textAlign="left";}

            ctx.restore(); // End screen shake

            // --- HUD elements drawn WITHOUT shake ---

            // Minimap (top-right)
            const mmW=150,mmH=100,mmX=W-mmW-15,mmY=15,mmRange=800;
            const mmScale=mmW/(mmRange*2);
            ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(mmX,mmY,mmW,mmH);ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;ctx.strokeRect(mmX,mmY,mmW,mmH);
            // Enemies on minimap
            for(let e of enemies){let mx=mmX+mmW/2+(e.x-player.x)*mmScale,my=mmY+mmH/2+(e.y-player.y)*mmScale;if(mx>=mmX&&mx<=mmX+mmW&&my>=mmY&&my<=mmY+mmH){ctx.fillStyle=ENEMY_COLORS[e.type]||'#ff4444';ctx.fillRect(mx-1,my-1,2,2);}}
            for(let e of elites){let mx=mmX+mmW/2+(e.x-player.x)*mmScale,my=mmY+mmH/2+(e.y-player.y)*mmScale;if(mx>=mmX&&mx<=mmX+mmW&&my>=mmY&&my<=mmY+mmH){ctx.fillStyle='#ff9933';ctx.fillRect(mx-2,my-2,4,4);}}
            for(let bs of bosses){let mx=mmX+mmW/2+(bs.x-player.x)*mmScale,my=mmY+mmH/2+(bs.y-player.y)*mmScale;if(mx>=mmX&&mx<=mmX+mmW&&my>=mmY&&my<=mmY+mmH){ctx.fillStyle=BOSS_TYPES[bs.bossType].color;ctx.beginPath();ctx.arc(mx,my,4,0,Math.PI*2);ctx.fill();}}
            for(let c of chests){if(c.isOpen)continue;let mx=mmX+mmW/2+(c.x-player.x)*mmScale,my=mmY+mmH/2+(c.y-player.y)*mmScale;if(mx>=mmX&&mx<=mmX+mmW&&my>=mmY&&my<=mmY+mmH){ctx.fillStyle='#00ccaa';ctx.fillRect(mx-2,my-2,4,4);}}
            // Player dot on minimap
            ctx.fillStyle='#ffffff';ctx.fillRect(mmX+mmW/2-2,mmY+mmH/2-2,4,4);

            // Touch mode HUD
            if(controlMode==='touch'&&gameState===STATE_PLAYING){
                // Pause button (no background)
                ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='20px monospace';ctx.textAlign='center';ctx.fillText('⏸',W-38,32);ctx.textAlign='left';
                // Dash button
                let dbX=W/2,dbY=H-50,dbR=28;ctx.beginPath();ctx.arc(dbX,dbY,dbR,0,Math.PI*2);
                if(player.dashCooldown>0){ctx.fillStyle='rgba(100,100,100,0.35)';ctx.fill();let pct=1-player.dashCooldown/DASH_COOLDOWN;ctx.beginPath();ctx.moveTo(dbX,dbY);ctx.arc(dbX,dbY,dbR,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);ctx.closePath();ctx.fillStyle='rgba(100,200,255,0.3)';ctx.fill();}
                else{ctx.fillStyle='rgba(100,200,255,0.4)';ctx.fill();}
                ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(dbX,dbY,dbR,0,Math.PI*2);ctx.stroke();
                ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='13px monospace';ctx.textAlign='center';ctx.fillText('闪避',dbX,dbY+5);ctx.textAlign='left';
                // Joystick hints
                if(!leftJoy.active){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='16px monospace';ctx.fillText('移动',40,H-30);}
                if(!rightJoy.active){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='16px monospace';ctx.textAlign='right';ctx.fillText('瞄准',W-40,H-30);ctx.textAlign='left';}
                // Joysticks
                if(leftJoy.active){ctx.beginPath();ctx.arc(leftJoy.bx,leftJoy.by,JOY_R,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.arc(leftJoy.kx,leftJoy.ky,JOY_KNOB,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();}
                if(rightJoy.active){ctx.beginPath();ctx.arc(rightJoy.bx,rightJoy.by,JOY_R,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.arc(rightJoy.kx,rightJoy.ky,JOY_KNOB,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();}
            }
            // Touch tutorial overlay
            if(controlMode==='touch'&&touchTutorialTimer>0){
                let ta=Math.min(1,touchTutorialTimer/0.5);
                ctx.fillStyle=`rgba(0,0,0,${0.6*ta})`;ctx.fillRect(0,0,W,H);
                ctx.globalAlpha=ta;
                // Left joystick hint
                ctx.beginPath();ctx.arc(W*0.25,H*0.55,50,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=3;ctx.stroke();
                ctx.beginPath();ctx.arc(W*0.25,H*0.55,18,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
                ctx.font='bold 22px monospace';ctx.fillStyle='#fadf9e';ctx.textAlign='center';ctx.fillText('← 左: 移动 →',W*0.25,H*0.35);
                // Right joystick hint
                ctx.beginPath();ctx.arc(W*0.75,H*0.55,50,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=3;ctx.stroke();
                ctx.beginPath();ctx.arc(W*0.75,H*0.55,18,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
                ctx.font='bold 22px monospace';ctx.fillStyle='#fadf9e';ctx.fillText('← 右: 攻击方向 →',W*0.75,H*0.35);
                // Center tip
                ctx.font='18px monospace';ctx.fillStyle='#aaaaaa';ctx.fillText('自动射击 · 右摇杆改变方向',W*0.5,H*0.85);
                ctx.textAlign='left';ctx.globalAlpha=1.0;
            }
            ctx.shadowBlur=0;
        }

        // Animation loop
        function tick(now){
            if(!lastTimestamp){lastTimestamp=now;requestAnimationFrame(tick);return;}
            const dt=Math.min(0.05,(now-lastTimestamp)/1000);lastTimestamp=now;
            if(gameState!==STATE_PAUSED)updateGame(dt,now/1000);
            draw();requestAnimationFrame(tick);
        }

        // Events
        function initEvents(){
            canvas.addEventListener('mousemove',e=>{if(controlMode!=='keyboard')return;const r=canvas.getBoundingClientRect();mouseX=clamp((e.clientX-r.left)*canvas.width/r.width,0,canvas.width);mouseY=clamp((e.clientY-r.top)*canvas.height/r.height,0,canvas.height);});
            window.addEventListener('keydown',e=>{
                if(controlMode!=='keyboard')return;const k=e.key.toLowerCase();if(remapAction)return;
                if(k===keyMap.pause){if(gameState===STATE_PLAYING)gameState=STATE_PAUSED;else if(gameState===STATE_PAUSED)gameState=STATE_PLAYING;else if(gameState===STATE_SHOP)gameState=STATE_PLAYING;e.preventDefault();}
                else if(k===' '&&gameState===STATE_PLAYING){triggerDash();e.preventDefault();}
                else if(gameState===STATE_UPGRADE){if(k==='1')applyUpgrade(0);if(k==='2')applyUpgrade(1);if(k==='3')applyUpgrade(2);e.preventDefault();}
                else if(gameState===STATE_SHOP){if(k==='1')buyShopItem(0);if(k==='2')buyShopItem(1);if(k==='3')buyShopItem(2);if(k==='r')refreshShop();e.preventDefault();}
                else{keys[k]=true;e.preventDefault();}
            });
            window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
            restartBtn.addEventListener('click',resetGame);
        }

        // Start screen
        function startGame(mode){
            controlMode=mode;
            let nickEl=document.getElementById('nickInput');playerNickname=(nickEl&&nickEl.value.trim())?nickEl.value.trim():'Player';
            startScreen.style.display='none';gameWrapper.style.display=mode==='touch'?'flex':'block';
            if(mode==='touch'){document.body.classList.add('touch-mode');if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{});if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{});}
            resetGame();initEvents();lastTimestamp=0;if(gameLoop)cancelAnimationFrame(gameLoop);gameLoop=requestAnimationFrame(tick);
        }
        document.getElementById('keyboardModeBtn').addEventListener('click',()=>startGame('keyboard'));
        document.getElementById('touchModeBtn').addEventListener('click',()=>startGame('touch'));
    })();</script>
</body>
</html>
