<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dot · Roguelike</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#0b0e14; min-height:100vh; display:flex; justify-content:center; align-items:center; font-family:'Courier New',Courier,monospace; touch-action:manipulation; }

        /* Start Screen */
        #startScreen { position:fixed; top:0;left:0;right:0;bottom:0; background:#0b0e14; display:flex; flex-direction:column; align-items:center; z-index:200; color:#fadf9e; overflow-y:auto; padding:20px 10px; }
        #startScreen h1 { font-size:2.5rem; margin-bottom:4px; text-shadow:0 0 20px #aa8b6e; }
        #startScreen h2 { font-size:1rem; color:#7e8a9a; margin-bottom:15px; }
        .mode-buttons { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
        .mode-btn { background:#1a1f2b; border:3px solid #6b4f3a; border-radius:16px; padding:16px 30px; color:#fadf9e; font-family:inherit; font-size:1.1rem; font-weight:bold; cursor:pointer; transition:0.15s; min-width:200px; text-align:center; }
        .mode-btn:hover { background:#262d3a; border-color:#aa8b6e; transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,0.5); }
        .mode-btn small { display:block; color:#7e8a9a; font-size:0.85rem; margin-top:8px; font-weight:normal; }
        .nick-row { margin-bottom:12px; display:flex; align-items:center; gap:12px; }
        .nick-row label { color:#cbad8e; font-size:1.1rem; }
        #nickInput { background:#10131f; border:2px solid #6b4f3a; border-radius:12px; padding:8px 16px; color:#fadf9e; font-family:inherit; font-size:1.1rem; width:180px; text-align:center; outline:none; }
        #nickInput:focus { border-color:#aa8b6e; }
        .role-select { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:12px; max-width:850px; }
        .role-card { background:#1a1f2b; border:3px solid #3a3025; border-radius:14px; padding:8px 6px; width:120px; text-align:center; cursor:pointer; transition:0.15s; }
        .role-card:hover:not(.locked) { border-color:#aa8b6e; transform:translateY(-2px); }
        .role-card.selected { border-color:#ffd966; box-shadow:0 0 12px rgba(255,217,102,0.3); }
        .role-card.locked { opacity:0.4; cursor:not-allowed; }
        .role-card .dot { width:20px; height:20px; border-radius:50%; margin:0 auto 4px; }
        .role-card .rname { color:#fadf9e; font-size:0.85rem; font-weight:bold; }
        .role-card .rdesc { color:#7e8a9a; font-size:0.65rem; margin-top:2px; }
        .role-card .rskill { color:#aaddff; font-size:0.65rem; margin-top:2px; }
        .role-card .rlock { color:#ff6655; font-size:0.6rem; margin-top:3px; line-height:1.2; }

        /* Game */
        .game-wrapper { width:100%; max-width:min(1200px,95vw,calc((100vh - 150px)/0.6)); padding:10px; display:none; }
        .game-container { background:#1a1f2b; border-radius:28px; padding:20px; box-shadow:0 20px 30px rgba(0,0,0,0.7); }
        .canvas-wrapper { position:relative; width:100%; padding-top:60%; background:#10131f; border-radius:20px; overflow:hidden; border:2px solid #4e3b2e; }
        canvas { position:absolute; top:0;left:0; width:100%;height:100%; display:block; cursor:crosshair; touch-action:none; }
        .info-panel { display:flex; flex-wrap:wrap; justify-content:space-between; margin-top:16px; color:#cbad8e; font-weight:bold; font-size:1.2rem; text-shadow:2px 2px 0 #2d241c; background:#262d3a; padding:12px 16px; border-radius:60px; border:2px solid #6b4f3a; gap:8px; }
        .info-item { display:flex; align-items:center; gap:4px; }
        .badge { background:#3f2f23; padding:4px 12px; border-radius:40px; color:#fadf9e; border:1px solid #aa8b6e; min-width:80px; text-align:center; font-size:1rem; }
        button { background:#6d4f3a; border:none; color:#faeac6; font-weight:bold; font-size:1.1rem; padding:8px 16px; border-radius:50px; cursor:pointer; border-bottom:4px solid #3a2c1e; font-family:inherit; transition:0.08s linear; touch-action:manipulation; }
        button:active { border-bottom-width:2px; transform:translateY(2px); }
        .tips { color:#7e8a9a; margin-top:12px; padding-left:12px; font-size:0.85rem; line-height:1.4; display:flex; flex-wrap:wrap; gap:15px; }
        .key-hint { background:#2a3140; padding:4px 8px; border-radius:20px; display:inline-block; }
        #settingsPanel { display:none; position:fixed; top:50%;left:50%; transform:translate(-50%,-50%); background:#1e2533; border:3px solid #aa8b6e; border-radius:30px; padding:25px; color:#fadf9e; z-index:100; width:90%; max-width:400px; box-shadow:0 10px 30px black; }
        #settingsPanel h3 { text-align:center; margin-bottom:20px; font-size:1.8rem; }
        .key-setting { display:flex; justify-content:space-between; margin:15px 0; align-items:center; }
        .key-setting button { background:#3f2f23; border-bottom:2px solid #1e1510; padding:8px 20px; min-width:80px; }
        .key-setting .key-display { background:#10131f; padding:6px 16px; border-radius:30px; border:1px solid #6b4f3a; font-size:1.3rem; min-width:70px; text-align:center; }
        #settingsClose { display:block; width:100%; margin-top:20px; }
        #fullscreenBtn { background:#4a3f33; border-bottom-color:#2d241c; }

        /* Touch mode */
        body.touch-mode { align-items:stretch; }
        body.touch-mode .game-wrapper { max-width:none; padding:0; height:100vh; display:flex; flex-direction:column; }
        body.touch-mode .game-container { border-radius:0; padding:4px; flex:1; display:flex; flex-direction:column; }
        body.touch-mode .canvas-wrapper { border-radius:8px; border:none; flex:1; padding-top:0; }
        body.touch-mode canvas { cursor:default; }
        body.touch-mode .info-panel { margin-top:4px; padding:6px 10px; font-size:0.9rem; border-radius:30px; gap:4px; }
        body.touch-mode .badge { min-width:50px; font-size:0.8rem; padding:2px 8px; }
        body.touch-mode .tips { display:none; }
        body.touch-mode #settingsPanel { display:none !important; }
        #rotateOverlay { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:#0b0e14; color:#fadf9e; font-size:1.5rem; z-index:300; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px; }
        #rotateOverlay .rotate-icon { font-size:4rem; margin-bottom:20px; }
        @media(orientation:portrait){ body.touch-mode #rotateOverlay{display:flex;} body.touch-mode .game-wrapper{display:none !important;} }
        #achievePopup{position:fixed;bottom:20px;right:20px;background:#1a1f2b;border:2px solid #ffd966;border-radius:12px;padding:12px 20px;color:#fadf9e;font-family:'Courier New',monospace;z-index:250;transform:translateX(120%);transition:transform 0.4s;font-size:0.9rem;max-width:280px;box-shadow:0 4px 15px rgba(0,0,0,0.6);}
        #achievePopup.show{transform:translateX(0);}
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>Dot · Roguelike</h1>
        <h2>点·火柴人 · 肉鸽</h2>
        <div class="nick-row"><label>昵称:</label><input type="text" id="nickInput" placeholder="Player" maxlength="12"></div>
        <div class="role-select" id="roleSelect"></div>
        <div id="menuTabs" style="display:flex;gap:8px;margin-bottom:12px;justify-content:center">
            <button onclick="switchTab('upgrades')" id="tabUpgrades" style="background:#262d3a;border:2px solid #aa8b6e;border-radius:8px;padding:6px 16px;color:#fadf9e;font-family:inherit;font-size:0.85rem;cursor:pointer">🔮 强化</button>
            <button onclick="switchTab('history')" id="tabHistory" style="background:#1a1f2b;border:2px solid #3a3025;border-radius:8px;padding:6px 16px;color:#7e8a9a;font-family:inherit;font-size:0.85rem;cursor:pointer">📜 历史</button>
            <button onclick="switchTab('achievements')" id="tabAchievements" style="background:#1a1f2b;border:2px solid #3a3025;border-radius:8px;padding:6px 16px;color:#7e8a9a;font-family:inherit;font-size:0.85rem;cursor:pointer">🏅 成就</button>
        </div>
        <div id="permUpgradeSection" style="margin:6px 0;max-width:780px;width:100%">
            <div style="color:#b366ff;font-size:14px;margin-bottom:6px">🔮 灵魂石强化 <span id="permGoldDisplay" style="color:#b366ff"></span></div>
            <div id="permUpgradeList" style="display:flex;flex-wrap:nowrap;gap:4px;justify-content:center"></div>
            <div id="prestigeSlot"></div>
        </div>
        <div id="historySection" style="display:none;margin:10px 0;max-width:700px;width:100%">
            <div style="color:#cbad8e;font-size:16px;margin-bottom:8px">📜 最近记录</div>
            <div id="historyList" style="font-size:12px;color:#7e8a9a;max-height:200px;overflow-y:auto"></div>
            <div style="color:#cbad8e;font-size:14px;margin-top:10px">🏆 角色最佳</div>
            <div id="bestsList" style="font-size:12px;color:#7e8a9a"></div>
        </div>
        <div id="achieveSection" style="display:none;margin:10px 0;max-width:700px;width:100%">
            <div style="color:#ffd966;font-size:16px;margin-bottom:8px">🏅 成就</div>
            <div id="achieveList" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center"></div>
        </div>
        <div class="mode-buttons">
<div style="width:100%;text-align:center;margin-bottom:10px"><label style="color:#cbad8e;cursor:pointer;font-size:0.9rem"><input type="checkbox" id="bossRushCheck" style="margin-right:6px">🏆 Boss Rush 模式 <small style="color:#7e8a9a">(每60秒一个Boss)</small></label></div>
<div style="width:100%;text-align:center;margin-bottom:8px"><div style="color:#cbad8e;font-size:0.85rem;margin-bottom:4px">⚙️ 挑战变体</div><div id="mutatorChecks" style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center"></div></div>
            <button class="mode-btn" id="keyboardModeBtn">⌨️ 键盘 + 鼠标<small>Keyboard + Mouse</small></button>
            <button class="mode-btn" id="touchModeBtn">📱 触屏控制<small>Touch Joystick</small></button>
        </div>
    </div>
    <div id="achievePopup"><span id="achieveText"></span></div>
    <div id="rotateOverlay"><div class="rotate-icon">📱🔄</div><div>请横屏使用<br>Please rotate to landscape</div></div>

    <div class="game-wrapper" id="gameWrapper">
        <div class="game-container">
            <div class="canvas-wrapper" id="canvasWrapper"><canvas id="gameCanvas" width="1000" height="600"></canvas></div>
            <div class="info-panel" id="infoPanel">
                <div class="info-item">❤️ <span id="hpDisplay" class="badge">0/0</span></div>
                <div class="info-item">⚡ LV <span id="levelDisplay" class="badge">1</span></div>
                <div class="info-item">✨ EXP <span id="expDisplay" class="badge">0/100</span></div>
                <div class="info-item">💀 <span id="killDisplay" class="badge">0</span></div>
                <div class="info-item">💰 <span id="goldDisplay" class="badge">0</span></div>
                <div class="info-item">⏱️ <span id="timeDisplay" class="badge">00:00:00</span></div>
                <button id="restartBtn">↺ 重来</button>
            </div>
            <div class="tips" id="tipsBar">
                <span class="key-hint" id="moveHint">WASD 移动</span>
                <span class="key-hint" id="interactHint">E 开启宝箱</span>
                <span class="key-hint">Space 闪避</span>
                <span class="key-hint">Q 技能</span>
                <span class="key-hint" id="pauseHint">P 暂停</span>
                <span class="key-hint" id="settingsHint">F 设置</span>
                <button id="fullscreenBtn">⛶ 全屏</button>
            </div>
        </div>
    </div>

    <div id="settingsPanel">
        <h3>⚙️ 按键设置</h3>
        <div class="key-setting"><span>向上</span><span class="key-display" id="key-up">W</span><button class="remap-btn" data-action="up">修改</button></div>
        <div class="key-setting"><span>向下</span><span class="key-display" id="key-down">S</span><button class="remap-btn" data-action="down">修改</button></div>
        <div class="key-setting"><span>向左</span><span class="key-display" id="key-left">A</span><button class="remap-btn" data-action="left">修改</button></div>
        <div class="key-setting"><span>向右</span><span class="key-display" id="key-right">D</span><button class="remap-btn" data-action="right">修改</button></div>
        <div class="key-setting"><span>互动</span><span class="key-display" id="key-interact">E</span><button class="remap-btn" data-action="interact">修改</button></div>
        <div class="key-setting"><span>暂停</span><span class="key-display" id="key-pause">P</span><button class="remap-btn" data-action="pause">修改</button></div>
        <div style="border-top:1px solid #3a3025;margin:15px 0;padding-top:15px">
            <div class="key-setting"><span>屏幕震动</span><select id="shakeSelect" style="background:#10131f;color:#fadf9e;border:1px solid #6b4f3a;border-radius:8px;padding:4px 8px;font-family:inherit"><option value="off">关闭</option><option value="low">低</option><option value="med">中</option><option value="high">高</option></select></div>
            <div class="key-setting"><span>伤害数字</span><button id="dmgNumToggle" style="background:#3f2f23;border-bottom:2px solid #1e1510;padding:8px 20px">开</button></div>
            <div class="key-setting"><span>小地图</span><button id="minimapToggle" style="background:#3f2f23;border-bottom:2px solid #1e1510;padding:8px 20px">开</button></div>
        </div>
        <button id="settingsClose">关闭</button>
    </div>

    <script>(function(){
        const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
        const hpSpan=document.getElementById('hpDisplay'), levelSpan=document.getElementById('levelDisplay');
        const expSpan=document.getElementById('expDisplay'), killSpan=document.getElementById('killDisplay');
        const goldSpan=document.getElementById('goldDisplay'), timeSpan=document.getElementById('timeDisplay');
        const restartBtn=document.getElementById('restartBtn'), fullscreenBtn=document.getElementById('fullscreenBtn');
        const settingsPanel=document.getElementById('settingsPanel'), settingsClose=document.getElementById('settingsClose');
        const startScreen=document.getElementById('startScreen'), gameWrapper=document.getElementById('gameWrapper');

        let controlMode='keyboard';
        let gameSettings={screenShake:'med',damageNumbers:true,minimap:true};
        let gameMode='normal';
        let activeMutators=[];
        const MUTATORS=[
            {id:'glassCannon',name:'玻璃大炮',desc:'-50% HP, +30% 伤害',soulBonus:5},
            {id:'bulletHell',name:'弹幕地狱',desc:'敌人2x射击速度',soulBonus:5},
            {id:'speedRun',name:'极速挑战',desc:'+30% 全速度',soulBonus:3},
            {id:'noShop',name:'无商店',desc:'击杀Boss无商店',soulBonus:8},
            {id:'pacifist',name:'限时猎杀',desc:'每4分钟必须杀Boss',soulBonus:10},
        ];
        let voidMode=false;
        function loadSettings(){try{let s=localStorage.getItem('rl_settings');if(s)gameSettings={...gameSettings,...JSON.parse(s)};}catch(e){}}
        function saveSettings(){localStorage.setItem('rl_settings',JSON.stringify(gameSettings));}
        loadSettings();
        let gameTime=0;
        let playerNickname='Player';
        let showTouchTutorial=false;

        // Live session-based leaderboard via Supabase
        const sessionId=Date.now()+'_'+Math.random().toString(36).slice(2,8);
        const SB_URL='https://ljlsruiydrsxetamtptm.supabase.co/rest/v1';
        const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqbHNydWl5ZHJzeGV0YW10cHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMjkzMjgsImV4cCI6MjA4ODcwNTMyOH0.3jofw4NPGiKgoVq6WZNQsU9o8Xv1n_nd07ZKYX-O3dU';
        let lastLBSync=0,cachedLeaderboard=[];
        function formatDuration(s){let m=Math.floor(s/60),sec=Math.floor(s%60);return `${m}:${sec.toString().padStart(2,'0')}`;}
        function syncLeaderboard(){
            let now=Date.now();if(now-lastLBSync<2000)return;lastLBSync=now;
            // Upsert current session
            fetch(SB_URL+'/live_sessions',{method:'POST',
                headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
                body:JSON.stringify({session_id:sessionId,nick:playerNickname,duration:Math.round(gameTime*10)/10,updated_at:new Date().toISOString()})
            }).catch(()=>{});
            // Fetch top 3 active sessions (updated within last 10s)
            let cutoff=new Date(now-10000).toISOString();
            fetch(SB_URL+'/live_sessions?select=session_id,nick,duration&updated_at=gte.'+encodeURIComponent(cutoff)+'&order=duration.desc&limit=3',
                {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}
            ).then(r=>r.json()).then(data=>{if(Array.isArray(data))cachedLeaderboard=data;}).catch(()=>{});
        }
        function getLiveLeaderboard(){
            // Overlay live gameTime for current session
            let lb=cachedLeaderboard.map(e=>e.session_id===sessionId?{...e,duration:gameTime}:e);
            // Ensure current session is included
            if(!lb.find(e=>e.session_id===sessionId)){lb.push({session_id:sessionId,nick:playerNickname,duration:gameTime});}
            lb.sort((a,b)=>b.duration-a.duration);return lb.slice(0,3);
        }
        function removeLiveSession(){
            fetch(SB_URL+'/live_sessions?session_id=eq.'+sessionId,{method:'DELETE',
                headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY},keepalive:true}).catch(()=>{});
        }
        window.addEventListener('beforeunload',removeLiveSession);

        // Roles & Characters
        const ROLES={
            dot:{name:'白点',color:'#f0f0ff',glow:'#ffffff',hpMult:1,dmgMult:1,spdMult:1,fireRateMult:1,dodgeBase:0,piercingBase:0,skill:null,skillName:null,skillCD:0,desc:'平衡型 · 无技能',weapon:'dot',locked:false},
            warrior:{name:'战士',color:'#804808',glow:'#a06010',hpMult:1.4,dmgMult:1.1,spdMult:0.8,fireRateMult:0.7,dodgeBase:0,piercingBase:0,skill:'whirlwind',skillName:'旋风斩',skillCD:8,desc:'高血量 · 近战AOE',weapon:'sword',locked:true,unlockKey:'totalKills',unlockVal:500,unlockDesc:'累计击杀500敌人'},
            ranger:{name:'游侠',color:'#44dd66',glow:'#22ff44',hpMult:0.7,dmgMult:1.3,spdMult:1.0,fireRateMult:1.0,dodgeBase:0,piercingBase:0,skill:'arrowRain',skillName:'箭雨',skillCD:10,desc:'高伤害 · 远程AOE',weapon:'arrow',locked:true,unlockKey:'bestTime',unlockVal:600,unlockDesc:'单次存活10分钟'},
            mage:{name:'法师',color:'#6688ff',glow:'#4466ff',hpMult:0.8,dmgMult:1.1,spdMult:0.8,fireRateMult:1.3,dodgeBase:0,piercingBase:1,skill:'frostNova',skillName:'冰冻新星',skillCD:12,desc:'控制型 · 自带穿透',weapon:'orb',locked:true,unlockKey:'totalBossKills',unlockVal:3,unlockDesc:'累计击杀3个Boss'},
            shadow:{name:'影刺',color:'#bb77ff',glow:'#9944ff',hpMult:0.6,dmgMult:1.1,spdMult:1.3,fireRateMult:1.0,dodgeBase:1,piercingBase:0,skill:'shadowClone',skillName:'分身',skillCD:15,desc:'高闪避 · 召唤分身',weapon:'dagger',locked:true,unlockKey:'bestTime',unlockVal:900,unlockDesc:'单次存活15分钟'},
            necromancer:{name:'死灵',color:'#44cc88',glow:'#22ff66',hpMult:0.8,dmgMult:1.0,spdMult:1.0,fireRateMult:1.2,dodgeBase:0,piercingBase:1,skill:'raiseDead',skillName:'亡灵复苏',skillCD:20,desc:'穿透+标记·召唤亡灵',weapon:'soulBolt',locked:true,unlockKey:'totalBossKills',unlockVal:10,unlockDesc:'累计击杀10个Boss'},
        };
        let selectedRole='dot';
        let playerZones=[],clones=[],friendlyGhosts=[],recentDeaths=[];

        // Meta stats (persisted in localStorage for unlock tracking)
        let metaStats={totalKills:0,totalBossKills:0,bestTime:0,soulStones:0,prestigeLevel:0};
        function loadMeta(){try{let s=localStorage.getItem('rl_meta');if(s)metaStats={...metaStats,...JSON.parse(s)};}catch(e){}}
        function saveMeta(){localStorage.setItem('rl_meta',JSON.stringify(metaStats));}
        function checkUnlocks(){for(let k in ROLES){let r=ROLES[k];if(r.locked&&r.unlockKey&&metaStats[r.unlockKey]>=r.unlockVal)r.locked=false;}}

        // Permanent upgrades (meta-progression)
        const PERM_UPGRADES=[
            {key:'permHp',name:'❤️ 生命',desc:'+3% 最大生命',max:10,cost:i=>20+i*15},
            {key:'permDmg',name:'⚡ 攻击',desc:'+2% 伤害',max:10,cost:i=>25+i*20},
            {key:'permSpd',name:'👟 速度',desc:'+2% 移速',max:5,cost:i=>30+i*20},
            {key:'permCrit',name:'💥 暴击',desc:'+1% 暴击率',max:10,cost:i=>20+i*15},
            {key:'permArmor',name:'🛡 护甲',desc:'受伤-1',max:5,cost:i=>40+i*30},
            {key:'permRegen',name:'💚 再生',desc:'+0.5/s 回血',max:3,cost:i=>60+i*50},
        ];
        let permLevels={permHp:0,permDmg:0,permSpd:0,permCrit:0,permArmor:0,permRegen:0};
        function loadPerms(){try{let s=localStorage.getItem('rl_perms');if(s)permLevels={...permLevels,...JSON.parse(s)};}catch(e){}}
        function savePerms(){localStorage.setItem('rl_perms',JSON.stringify(permLevels));}
        function buyPerm(idx){
            let u=PERM_UPGRADES[idx],lv=permLevels[u.key]||0;if(lv>=u.max)return false;
            let c=u.cost(lv);if(metaStats.soulStones<c)return false;

        function canvasTouchCoords(touch){
            const r=canvas.getBoundingClientRect();

        function handleJoyTouchStart(e){
            e.preventDefault();if(controlMode!=='touch')return;

            if(gameState===STATE_UPGRADE||gameState===STATE_SHOP||gameState===STATE_GAMEOVER||gameState===STATE_PAUSED||gameState===STATE_SKILL_UP){
                const t=e.changedTouches[0];if(t){const p=canvasTouchCoords(t);handleScreenTap(p.x,p.y);}return;
            }
            for(let i=0;i<e.changedTouches.length;i++){
                const t=e.changedTouches[i],pos=canvasTouchCoords(t);
                // Pause button
                if(pos.x>W-100&&pos.y<70&&gameState===STATE_PLAYING){gameState=STATE_PAUSED;return;}
                // Dash button
                if(pos.x>W/2-40&&pos.x<W/2+40&&pos.y>H-80&&pos.y<H-20&&gameState===STATE_PLAYING){triggerDash();return;}
                // Skill button (right of dash)
                if(pos.x>W/2+45&&pos.x<W/2+105&&pos.y>H-80&&pos.y<H-20&&gameState===STATE_PLAYING){activateSkill();return;}
                if(pos.x<W/2&&!leftJoy.active){leftJoy.active=true;leftJoy.id=t.identifier;leftJoy.bx=pos.x;leftJoy.by=pos.y;leftJoy.kx=pos.x;leftJoy.ky=pos.y;}
                else if(pos.x>=W/2&&!rightJoy.active){rightJoy.active=true;rightJoy.id=t.identifier;rightJoy.bx=pos.x;rightJoy.by=pos.y;rightJoy.kx=pos.x;rightJoy.ky=pos.y;}
            }
        }
        function handleJoyTouchMove(e){
            e.preventDefault();if(controlMode!=='touch')return;
            for(let i=0;i<e.changedTouches.length;i++){
                const t=e.changedTouches[i],pos=canvasTouchCoords(t);
                if(leftJoy.active&&t.identifier===leftJoy.id){let dx=pos.x-leftJoy.bx,dy=pos.y-leftJoy.by,d=Math.hypot(dx,dy);if(d>JOY_R){dx=dx/d*JOY_R;dy=dy/d*JOY_R;}leftJoy.kx=leftJoy.bx+dx;leftJoy.ky=leftJoy.by+dy;}
                if(rightJoy.active&&t.identifier===rightJoy.id){let dx=pos.x-rightJoy.bx,dy=pos.y-rightJoy.by,d=Math.hypot(dx,dy);if(d>JOY_R){dx=dx/d*JOY_R;dy=dy/d*JOY_R;}rightJoy.kx=rightJoy.bx+dx;rightJoy.ky=rightJoy.by+dy;}

        function shootBullet(now){
            if(gameState!==STATE_PLAYING||now-lastShotTime<player.fireInterval)return;lastShotTime=now;
            let aimDx,aimDy;

                if(rightJoy.active){let jdx=rightJoy.kx-rightJoy.bx,jdy=rightJoy.ky-rightJoy.by;if(Math.hypot(jdx,jdy)>JOY_DEAD)touchAimAngle=Math.atan2(jdy,jdx);}
                // Always shoot in current aim angle
                aimDx=Math.cos(touchAimAngle);aimDy=Math.sin(touchAimAngle);
            }else{
                aimDx=mouseX-(player.x-worldOffsetX);aimDy=mouseY-(player.y-worldOffsetY);
                let d=Math.hypot(aimDx,aimDy);if(d<0.001){aimDx=0;aimDy=-1;}else{aimDx/=d;aimDy/=d;}

                    let da=Math.abs(((ea-ba+Math.PI*3)%(Math.PI*2))-Math.PI);
                    if(d<sr+e.radius&&da<0.8){e.health-=dmg;if(player.lifesteal>0)player.hp=Math.min(player.maxHp,player.hp+dmg*player.lifesteal);
                        if(e.health<=0){spawnXpFromEnemy(e.x,e.y,e.radius);enemies.splice(j,1);killCount++;player.comboCount++;player.comboTimer=2;}}}
                for(let j=elites.length-1;j>=0;j--){let e=elites[j],d=Math.hypot(e.x-player.x,e.y-player.y),ea=Math.atan2(e.y-player.y,e.x-player.x);

                player.skillActive={type:'swordSlash',timer:0.15,angle:ba,range:sr};

        function applyUpgrade(i){runStats.upgradesTaken++;

        // ---------- UPDATE ----------
        function updateGame(dt,nowS){
            if(gameState!==STATE_PLAYING)return;
            gameTime+=dt;
            runStats.noDamageTimer+=dt;
            if(gameTime>=1800&&!voidMode){voidMode=true;addFloatingText('⚠️ 虚空降临!',player.x,player.y-80,'#9944ff');screenShakeTimer=0.5;screenShakeIntensity=10;}
            // Regen
            if(player.regen>0)player.hp=Math.min(player.maxHp,player.hp+player.regen*dt);
            if(player.invincibleTimer>0)player.invincibleTimer-=dt;
            if(player.damageFlash>0)player.damageFlash-=dt;
            if(player.dashCooldown>0)player.dashCooldown-=dt;
            if(screenShakeTimer>0)screenShakeTimer-=dt;
            if(player.skillTimer>0)player.skillTimer-=dt;
            if(player.slowTimer>0)player.slowTimer-=dt;
            if(player.skillActive){player.skillActive.timer-=dt;if(player.skillActive.timer<=0)player.skillActive=null;}
            if(player.comboTimer>0){player.comboTimer-=dt;if(player.comboCount>runStats.highestCombo)runStats.highestCombo=player.comboCount;if(player.comboTimer<=0)player.comboCount=0;}
            // Sword energy projectile (warrior)
            if((ROLES[selectedRole]||ROLES.dot).weapon==='sword'){
                player.swordEnergyTimer=(player.swordEnergyTimer||0)+dt;
                if(player.swordEnergyTimer>=3.0){player.swordEnergyTimer=0;

                    if(player.skillTimer>0){ctx.fillStyle='rgba(100,100,100,0.35)';ctx.fill();let pct=1-player.skillTimer/skRole.skillCD;ctx.beginPath();ctx.moveTo(sbX,sbY);ctx.arc(sbX,sbY,sbR,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);ctx.closePath();ctx.fillStyle='rgba(255,200,100,0.3)';ctx.fill();}
                    else{ctx.fillStyle='rgba(255,200,100,0.4)';ctx.fill();}
                    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sbX,sbY,sbR,0,Math.PI*2);ctx.stroke();
                    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText(skRole.skillName,sbX,sbY+5);ctx.textAlign='left';
                }
                // Joystick hints
                if(!leftJoy.active){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='16px monospace';ctx.fillText('移动',40,H-30);}
                if(!rightJoy.active){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='16px monospace';ctx.textAlign='right';ctx.fillText('瞄准',W-40,H-30);ctx.textAlign='left';}
                // Joysticks
                if(leftJoy.active){ctx.beginPath();ctx.arc(leftJoy.bx,leftJoy.by,JOY_R,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.arc(leftJoy.kx,leftJoy.ky,JOY_KNOB,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();}
                if(rightJoy.active){ctx.beginPath();ctx.arc(rightJoy.bx,rightJoy.by,JOY_R,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.arc(rightJoy.kx,rightJoy.ky,JOY_KNOB,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();}
            }
            // Touch tutorial overlay (tap to dismiss)
            if(controlMode==='touch'&&showTouchTutorial){
                ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
                // Left joystick hint
                ctx.beginPath();ctx.arc(W*0.25,H*0.55,50,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=3;ctx.stroke();
                ctx.beginPath();ctx.arc(W*0.25,H*0.55,18,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
                ctx.font='bold 22px monospace';ctx.fillStyle='#fadf9e';ctx.textAlign='center';ctx.fillText('← 左: 移动 →',W*0.25,H*0.35);
                // Right joystick hint
                ctx.beginPath();ctx.arc(W*0.75,H*0.55,50,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=3;ctx.stroke();
                ctx.beginPath();ctx.arc(W*0.75,H*0.55,18,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
                ctx.font='bold 22px monospace';ctx.fillStyle='#fadf9e';ctx.fillText('← 右: 攻击方向 →',W*0.75,H*0.35);
                // Center tips
                ctx.font='18px monospace';ctx.fillStyle='#aaaaaa';ctx.fillText('自动射击 · 右摇杆改变方向',W*0.5,H*0.8);
                let blink=0.5+0.5*Math.sin(Date.now()/300);ctx.fillStyle=`rgba(255,223,158,${blink})`;ctx.font='bold 20px monospace';ctx.fillText('点击屏幕开始',W*0.5,H*0.92);
                ctx.textAlign='left';
            }
            ctx.shadowBlur=0;
        }

        // Animation loop
        function tick(now){
            if(!lastTimestamp){lastTimestamp=now;requestAnimationFrame(tick);return;}
            const dt=Math.min(0.05,(now-lastTimestamp)/1000);lastTimestamp=now;
            // Pause game while tutorial is showing
            if(stateInputCooldown>0)stateInputCooldown-=dt;
            if(hitPause>0){hitPause-=dt;}
            else if(gameState!==STATE_PAUSED&&!showTouchTutorial)updateGame(dt,now/1000);
            updateAchievePopup(dt);
            // Decay screen shake even outside STATE_PLAYING (so death shake stops)
            if(gameState!==STATE_PLAYING&&screenShakeTimer>0)screenShakeTimer-=dt;
            // Sync leaderboard with Supabase
            syncLeaderboard();
            draw();requestAnimationFrame(tick);
        }

        // Events
        function initEvents(){
            canvas.addEventListener('mousemove',e=>{if(controlMode!=='keyboard')return;const r=canvas.getBoundingClientRect();mouseX=clamp((e.clientX-r.left)*canvas.width/r.width,0,canvas.width);mouseY=clamp((e.clientY-r.top)*canvas.height/r.height,0,canvas.height);});
            window.addEventListener('keydown',e=>{
                if(controlMode!=='keyboard')return;const k=e.key.toLowerCase();if(remapAction)return;
                if(k===keyMap.pause){if(gameState===STATE_PLAYING)gameState=STATE_PAUSED;else if(gameState===STATE_PAUSED)gameState=STATE_PLAYING;e.preventDefault();}
                else if(k===' '&&gameState===STATE_PLAYING){triggerDash();e.preventDefault();}
                else if(k==='q'&&gameState===STATE_PLAYING){activateSkill();e.preventDefault();}
                else if(gameState===STATE_SKILL_UP){if(k==='1')applySkillUpgrade(0);if(k==='2')applySkillUpgrade(1);if(k==='3')applySkillUpgrade(2);e.preventDefault();}
                else if(gameState===STATE_UPGRADE){if(k==='1')applyUpgrade(0);if(k==='2')applyUpgrade(1);if(k==='3')applyUpgrade(2);e.preventDefault();}
                else if(gameState===STATE_SHOP){if(stateInputCooldown>0){e.preventDefault();}else{if(k==='1')buyShopItem(0);if(k==='2')buyShopItem(1);if(k==='3')buyShopItem(2);if(k==='r')refreshShop();if(k==='enter')gameState=STATE_PLAYING;e.preventDefault();}}
                else{keys[k]=true;e.preventDefault();}
            });
            window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
            restartBtn.addEventListener('click',backToMenu);
        }

        // Back to menu (keep nickname, refresh unlocks)
        function backToMenu(){
            checkUnlocks();buildRoleSelect();buildPermUpgrades();buildAchievements();
            gameWrapper.style.display='none';startScreen.style.display='flex';
            document.body.classList.remove('touch-mode');
            if(gameLoop){cancelAnimationFrame(gameLoop);gameLoop=null;}
        }

        // Start screen
        function startGame(mode){
            controlMode=mode;
            gameMode=document.getElementById('bossRushCheck').checked?'bossRush':'normal';
            activeMutators=[];document.querySelectorAll('#mutatorChecks input[type=checkbox]:checked').forEach(cb=>{activeMutators.push(cb.dataset.mutator);});
            let nickEl=document.getElementById('nickInput');playerNickname=(nickEl&&nickEl.value.trim())?nickEl.value.trim():'Player';
            startScreen.style.display='none';gameWrapper.style.display=mode==='touch'?'flex':'block';
            if(mode==='touch'){document.body.classList.add('touch-mode');if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{});if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{});}
            resetGame();initEvents();lastTimestamp=0;if(gameLoop)cancelAnimationFrame(gameLoop);gameLoop=requestAnimationFrame(tick);
        }
        document.getElementById('keyboardModeBtn').addEventListener('click',()=>startGame('keyboard'));
        document.getElementById('touchModeBtn').addEventListener('click',()=>startGame('touch'));
    })();</script>
</body>
</html>
