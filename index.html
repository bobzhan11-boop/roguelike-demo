<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dot · Roguelike</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#0b0e14; min-height:100vh; display:flex; justify-content:center; align-items:center; font-family:'Courier New',Courier,monospace; touch-action:manipulation; }

        /* Start Screen */
        #startScreen { position:fixed; top:0;left:0;right:0;bottom:0; background:#0b0e14; display:flex; flex-direction:column; align-items:center; z-index:200; color:#fadf9e; overflow-y:auto; padding:20px 10px; }
        #startScreen h1 { font-size:2.5rem; margin-bottom:4px; text-shadow:0 0 20px #aa8b6e; }
        #startScreen h2 { font-size:1rem; color:#7e8a9a; margin-bottom:15px; }
        .mode-buttons { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
        .mode-btn { background:#1a1f2b; border:3px solid #6b4f3a; border-radius:16px; padding:16px 30px; color:#fadf9e; font-family:inherit; font-size:1.1rem; font-weight:bold; cursor:pointer; transition:0.15s; min-width:200px; text-align:center; }
        .mode-btn:hover { background:#262d3a; border-color:#aa8b6e; transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,0.5); }
        .mode-btn small { display:block; color:#7e8a9a; font-size:0.85rem; margin-top:8px; font-weight:normal; }
        .nick-row { margin-bottom:12px; display:flex; align-items:center; gap:12px; }
        .nick-row label { color:#cbad8e; font-size:1.1rem; }
        #nickInput { background:#10131f; border:2px solid #6b4f3a; border-radius:12px; padding:8px 16px; color:#fadf9e; font-family:inherit; font-size:1.1rem; width:180px; text-align:center; outline:none; }
        #nickInput:focus { border-color:#aa8b6e; }
        .role-select { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:12px; max-width:850px; }
        .role-card { background:#1a1f2b; border:3px solid #3a3025; border-radius:14px; padding:8px 6px; width:120px; text-align:center; cursor:pointer; transition:0.15s; }
        .role-card:hover:not(.locked) { border-color:#aa8b6e; transform:translateY(-2px); }
        .role-card.selected { border-color:#ffd966; box-shadow:0 0 12px rgba(255,217,102,0.3); }
        .role-card.locked { opacity:0.4; cursor:not-allowed; }
        .role-card .dot { width:20px; height:20px; border-radius:50%; margin:0 auto 4px; }
        .role-card .rname { color:#fadf9e; font-size:0.85rem; font-weight:bold; }
        .role-card .rdesc { color:#7e8a9a; font-size:0.65rem; margin-top:2px; }
        .role-card .rskill { color:#aaddff; font-size:0.65rem; margin-top:2px; }
        .role-card .rlock { color:#ff6655; font-size:0.6rem; margin-top:3px; line-height:1.2; }

        /* Game */
        .game-wrapper { width:100%; max-width:min(1200px,95vw,calc((100vh - 150px)/0.6)); padding:10px; display:none; }
        .game-container { background:#1a1f2b; border-radius:28px; padding:20px; box-shadow:0 20px 30px rgba(0,0,0,0.7); }
        .canvas-wrapper { position:relative; width:100%; padding-top:60%; background:#10131f; border-radius:20px; overflow:hidden; border:2px solid #4e3b2e; }
        canvas { position:absolute; top:0;left:0; width:100%;height:100%; display:block; cursor:crosshair; touch-action:none; }
        .info-panel { display:flex; flex-wrap:wrap; justify-content:space-between; margin-top:16px; color:#cbad8e; font-weight:bold; font-size:1.2rem; text-shadow:2px 2px 0 #2d241c; background:#262d3a; padding:12px 16px; border-radius:60px; border:2px solid #6b4f3a; gap:8px; }
        .info-item { display:flex; align-items:center; gap:4px; }
        .badge { background:#3f2f23; padding:4px 12px; border-radius:40px; color:#fadf9e; border:1px solid #aa8b6e; min-width:80px; text-align:center; font-size:1rem; }
        button { background:#6d4f3a; border:none; color:#faeac6; font-weight:bold; font-size:1.1rem; padding:8px 16px; border-radius:50px; cursor:pointer; border-bottom:4px solid #3a2c1e; font-family:inherit; transition:0.08s linear; touch-action:manipulation; }
        button:active { border-bottom-width:2px; transform:translateY(2px); }
        .tips { color:#7e8a9a; margin-top:12px; padding-left:12px; font-size:0.85rem; line-height:1.4; display:flex; flex-wrap:wrap; gap:15px; }
        .key-hint { background:#2a3140; padding:4px 8px; border-radius:20px; display:inline-block; }
        #settingsPanel { display:none; position:fixed; top:50%;left:50%; transform:translate(-50%,-50%); background:#1e2533; border:3px solid #aa8b6e; border-radius:30px; padding:25px; color:#fadf9e; z-index:100; width:90%; max-width:400px; box-shadow:0 10px 30px black; }
        #settingsPanel h3 { text-align:center; margin-bottom:20px; font-size:1.8rem; }
        .key-setting { display:flex; justify-content:space-between; margin:15px 0; align-items:center; }
        .key-setting button { background:#3f2f23; border-bottom:2px solid #1e1510; padding:8px 20px; min-width:80px; }
        .key-setting .key-display { background:#10131f; padding:6px 16px; border-radius:30px; border:1px solid #6b4f3a; font-size:1.3rem; min-width:70px; text-align:center; }
        #settingsClose { display:block; width:100%; margin-top:20px; }
        #fullscreenBtn { background:#4a3f33; border-bottom-color:#2d241c; }

        /* Touch mode */
        body.touch-mode { align-items:stretch; }
        body.touch-mode .game-wrapper { max-width:none; padding:0; height:100vh; display:flex; flex-direction:column; }
        body.touch-mode .game-container { border-radius:0; padding:4px; flex:1; display:flex; flex-direction:column; }
        body.touch-mode .canvas-wrapper { border-radius:8px; border:none; flex:1; padding-top:0; }
        body.touch-mode canvas { cursor:default; }
        body.touch-mode .info-panel { margin-top:4px; padding:6px 10px; font-size:0.9rem; border-radius:30px; gap:4px; }
        body.touch-mode .badge { min-width:50px; font-size:0.8rem; padding:2px 8px; }
        body.touch-mode .tips { display:none; }
        body.touch-mode #settingsPanel { display:none !important; }
        #rotateOverlay { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:#0b0e14; color:#fadf9e; font-size:1.5rem; z-index:300; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px; }
        #rotateOverlay .rotate-icon { font-size:4rem; margin-bottom:20px; }
        @media(orientation:portrait){ body.touch-mode #rotateOverlay{display:flex;} body.touch-mode .game-wrapper{display:none !important;} }
        #achievePopup{position:fixed;bottom:20px;right:20px;background:#1a1f2b;border:2px solid #ffd966;border-radius:12px;padding:12px 20px;color:#fadf9e;font-family:'Courier New',monospace;z-index:250;transform:translateX(120%);transition:transform 0.4s;font-size:0.9rem;max-width:280px;box-shadow:0 4px 15px rgba(0,0,0,0.6);}
        #achievePopup.show{transform:translateX(0);}
    </style>
</head>
<body>
    <!-- Front Page: Solo / Multiplayer -->
    <div id="frontPage" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#0b0e14;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:250;color:#fadf9e;font-family:'Courier New',monospace;padding:20px">
        <h1 style="font-size:3rem;text-shadow:0 0 30px #aa8b6e;margin-bottom:8px">Dot · Roguelike</h1>
        <h2 style="font-size:1.1rem;color:#7e8a9a;margin-bottom:30px">点·火柴人 · 肉鸽</h2>
        <div style="display:flex;flex-direction:column;gap:16px;width:100%;max-width:350px">
            <button id="fpSoloBtn" class="mode-btn" style="width:100%;padding:20px;font-size:1.2rem">🎮 单人模式<small style="display:block;color:#7e8a9a;font-size:0.85rem;margin-top:6px">Solo Play</small></button>
            <button id="fpMultiBtn" class="mode-btn" style="width:100%;padding:20px;font-size:1.2rem">👥 多人模式<small style="display:block;color:#7e8a9a;font-size:0.85rem;margin-top:6px">2-4 Players Online</small></button>
        </div>
        <div id="fpRoomSection" style="display:none;margin-top:20px;width:100%;max-width:400px">
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:10px">
                <button class="mode-btn" id="fpCreateBtn" style="min-width:150px">🏠 创建房间<small>Create Room</small></button>
                <div style="display:flex;align-items:center;gap:6px">
                    <input type="text" id="fpJoinInput" placeholder="房间号" maxlength="4" style="background:#10131f;border:2px solid #6b4f3a;border-radius:12px;padding:8px 12px;color:#fadf9e;font-family:inherit;font-size:1rem;width:100px;text-align:center;outline:none;text-transform:uppercase">
                    <button class="mode-btn" id="fpJoinBtn" style="min-width:80px">🚪 加入<small>Join</small></button>
                </div>
            </div>
            <div id="fpLobby" style="display:none;background:#1a1f2b;border:2px solid #6b4f3a;border-radius:12px;padding:12px;text-align:center">
                <div style="color:#ffd966;font-size:1.2rem;margin-bottom:6px">房间: <span id="fpRoomCode" style="letter-spacing:4px;font-size:1.5rem"></span></div>
                <div id="fpPlayerList" style="color:#cbad8e;font-size:0.9rem;margin-bottom:8px"></div>
                <div style="display:flex;gap:8px;justify-content:center">
                    <button class="mode-btn" id="fpStartBtn" style="display:none;min-width:140px">▶️ 开始<small>Start</small></button>
                    <button class="mode-btn" id="fpLeaveBtn" style="min-width:100px;background:#5a3a3a">❌ 离开</button>
                </div>
            </div>
        </div>
    </div>

    <div id="startScreen" style="display:none">
        <h1>Dot · Roguelike</h1>
        <h2>点·火柴人 · 肉鸽</h2>
        <div class="nick-row"><label>昵称:</label><input type="text" id="nickInput" placeholder="Player" maxlength="12"></div>
        <div class="role-select" id="roleSelect"></div>
        <div id="menuTabs" style="display:flex;gap:8px;margin-bottom:12px;justify-content:center">
            <button onclick="switchTab('upgrades')" id="tabUpgrades" style="background:#262d3a;border:2px solid #aa8b6e;border-radius:8px;padding:6px 16px;color:#fadf9e;font-family:inherit;font-size:0.85rem;cursor:pointer">🔮 强化</button>
            <button onclick="switchTab('history')" id="tabHistory" style="background:#1a1f2b;border:2px solid #3a3025;border-radius:8px;padding:6px 16px;color:#7e8a9a;font-family:inherit;font-size:0.85rem;cursor:pointer">📜 历史</button>
            <button onclick="switchTab('achievements')" id="tabAchievements" style="background:#1a1f2b;border:2px solid #3a3025;border-radius:8px;padding:6px 16px;color:#7e8a9a;font-family:inherit;font-size:0.85rem;cursor:pointer">🏅 成就</button>
        </div>
        <div id="permUpgradeSection" style="margin:6px 0;max-width:780px;width:100%">
            <div style="color:#b366ff;font-size:14px;margin-bottom:6px">🔮 灵魂石强化 <span id="permGoldDisplay" style="color:#b366ff"></span></div>
            <div id="permUpgradeList" style="display:flex;flex-wrap:nowrap;gap:4px;justify-content:center"></div>
            <div id="prestigeSlot"></div>
        </div>
        <div id="historySection" style="display:none;margin:10px 0;max-width:700px;width:100%">
            <div style="color:#cbad8e;font-size:16px;margin-bottom:8px">📜 最近记录</div>
            <div id="historyList" style="font-size:12px;color:#7e8a9a;max-height:200px;overflow-y:auto"></div>
            <div style="color:#cbad8e;font-size:14px;margin-top:10px">🏆 角色最佳</div>
            <div id="bestsList" style="font-size:12px;color:#7e8a9a"></div>
        </div>
        <div id="achieveSection" style="display:none;margin:10px 0;max-width:700px;width:100%">
            <div style="color:#ffd966;font-size:16px;margin-bottom:8px">🏅 成就</div>
            <div id="achieveList" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center"></div>
        </div>
        <div class="mode-buttons">
<div style="width:100%;text-align:center;margin-bottom:10px"><label style="color:#cbad8e;cursor:pointer;font-size:0.9rem"><input type="checkbox" id="bossRushCheck" style="margin-right:6px">🏆 Boss Rush 模式 <small style="color:#7e8a9a">(每60秒一个Boss)</small></label></div>
<div style="width:100%;text-align:center;margin-bottom:8px"><div style="color:#cbad8e;font-size:0.85rem;margin-bottom:4px">⚙️ 挑战变体</div><div id="mutatorChecks" style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center"></div></div>
            <button class="mode-btn" id="keyboardModeBtn">⌨️ 键盘 + 鼠标<small>Keyboard + Mouse</small></button>
            <button class="mode-btn" id="touchModeBtn">📱 触屏控制<small>Touch Joystick</small></button>
        </div>
        <!-- Multiplayer room UI moved to front page -->
    </div>
    <div id="achievePopup"><span id="achieveText"></span></div>
    <div id="rotateOverlay"><div class="rotate-icon">📱🔄</div><div>请横屏使用<br>Please rotate to landscape</div></div>

    <div class="game-wrapper" id="gameWrapper">
        <div class="game-container">
            <div class="canvas-wrapper" id="canvasWrapper"><canvas id="gameCanvas" width="1000" height="600"></canvas></div>
            <div class="info-panel" id="infoPanel">
                <div class="info-item">❤️ <span id="hpDisplay" class="badge">0/0</span></div>
                <div class="info-item">⚡ LV <span id="levelDisplay" class="badge">1</span></div>
                <div class="info-item">✨ EXP <span id="expDisplay" class="badge">0/100</span></div>
                <div class="info-item">💀 <span id="killDisplay" class="badge">0</span></div>
                <div class="info-item">💰 <span id="goldDisplay" class="badge">0</span></div>
                <div class="info-item">⏱️ <span id="timeDisplay" class="badge">00:00:00</span></div>
                <button id="restartBtn">↺ 重来</button>
            </div>
            <div class="tips" id="tipsBar">
                <span class="key-hint" id="moveHint">WASD 移动</span>
                <span class="key-hint" id="interactHint">E 开启宝箱</span>
                <span class="key-hint">Space 闪避</span>
                <span class="key-hint">Q 技能</span>
                <span class="key-hint" id="resHint" style="display:none">R 复活队友</span>
                <span class="key-hint" id="pauseHint">P 暂停</span>
                <span class="key-hint" id="settingsHint">F 设置</span>
                <button id="fullscreenBtn">⛶ 全屏</button>
            </div>
        </div>
    </div>

    <div id="settingsPanel">
        <h3>⚙️ 按键设置</h3>
        <div class="key-setting"><span>向上</span><span class="key-display" id="key-up">W</span><button class="remap-btn" data-action="up">修改</button></div>
        <div class="key-setting"><span>向下</span><span class="key-display" id="key-down">S</span><button class="remap-btn" data-action="down">修改</button></div>
        <div class="key-setting"><span>向左</span><span class="key-display" id="key-left">A</span><button class="remap-btn" data-action="left">修改</button></div>
        <div class="key-setting"><span>向右</span><span class="key-display" id="key-right">D</span><button class="remap-btn" data-action="right">修改</button></div>
        <div class="key-setting"><span>互动</span><span class="key-display" id="key-interact">E</span><button class="remap-btn" data-action="interact">修改</button></div>
        <div class="key-setting"><span>暂停</span><span class="key-display" id="key-pause">P</span><button class="remap-btn" data-action="pause">修改</button></div>
        <div style="border-top:1px solid #3a3025;margin:15px 0;padding-top:15px">
            <div class="key-setting"><span>屏幕震动</span><select id="shakeSelect" style="background:#10131f;color:#fadf9e;border:1px solid #6b4f3a;border-radius:8px;padding:4px 8px;font-family:inherit"><option value="off">关闭</option><option value="low">低</option><option value="med">中</option><option value="high">高</option></select></div>
            <div class="key-setting"><span>伤害数字</span><button id="dmgNumToggle" style="background:#3f2f23;border-bottom:2px solid #1e1510;padding:8px 20px">开</button></div>
            <div class="key-setting"><span>小地图</span><button id="minimapToggle" style="background:#3f2f23;border-bottom:2px solid #1e1510;padding:8px 20px">开</button></div>
        </div>
        <button id="settingsClose">关闭</button>
    </div>

    <script>(function(){
        const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
        const hpSpan=document.getElementById('hpDisplay'), levelSpan=document.getElementById('levelDisplay');
        const expSpan=document.getElementById('expDisplay'), killSpan=document.getElementById('killDisplay');
        const goldSpan=document.getElementById('goldDisplay'), timeSpan=document.getElementById('timeDisplay');
        const restartBtn=document.getElementById('restartBtn'), fullscreenBtn=document.getElementById('fullscreenBtn');
        const settingsPanel=document.getElementById('settingsPanel'), settingsClose=document.getElementById('settingsClose');
        const startScreen=document.getElementById('startScreen'), gameWrapper=document.getElementById('gameWrapper');

        let controlMode='keyboard';
        let gameSettings={screenShake:'med',damageNumbers:true,minimap:true};
        let gameMode='normal';
        let activeMutators=[];
        const MUTATORS=[
            {id:'glassCannon',name:'玻璃大炮',desc:'-50% HP, +30% 伤害',soulBonus:5},

            {id:'speedRun',name:'极速挑战',desc:'+30% 全速度',soulBonus:3},

            {id:'pacifist',name:'限时猎杀',desc:'每4分钟必须杀Boss',soulBonus:10},

        const STATE_RELIC='relic';
        const ALL_RELICS=[
            {id:'boomerang',name:'Boomerang',icon:'\u{1FA83}',desc:'Bullets reverse direction at 60% life'},
            {id:'chainLightning',name:'Chain Lightning',icon:'\u26A1',desc:'Kill damage chains 30% to nearest enemy'},
            {id:'bloodPact',name:'Blood Pact',icon:'\u{1FA78}',desc:'-1 HP/15s, +40% damage'},
            {id:'freezeOnCrit',name:'Freeze on Crit',icon:'\u2744\uFE0F',desc:'Crits freeze enemies 0.8s'},
            {id:'goldRain',name:'Gold Rain',icon:'\u{1F327}\uFE0F',desc:'Enemies drop 2+level gold'},
            {id:'vampiricAura',name:'Vampiric Aura',icon:'\u{1F9DB}',desc:'+1.5% lifesteal'},
            {id:'missileLock',name:'Missile Lock',icon:'\u{1F3AF}',desc:'Bullets gently home toward enemies'},
            {id:'secondWind',name:'Second Wind',icon:'\u{1F4A8}',desc:'Below 20% HP: invincible 3s + heal 25% (once)'},

            {id:'xpFeast',name:'XP Feast',icon:'\u{1F4DA}',desc:'+30% XP from all sources'},

        const ELITE_AFFIXES=[

            {id:'shielded',name:'Shielded',icon:'\u{1F6E1}\uFE0F'},
            {id:'haste',name:'Haste',icon:'\u26A1'},
            {id:'thorny',name:'Thorny',icon:'\u{1F335}'},
        ];
        const WEAPON_EVOLUTIONS={
            dot:{stat:'piercing',threshold:4,name:'Laser Beam',announce:'\u{1F4A0} Laser Beam!'},

            arrow:{stat:'critChance',threshold:0.35,name:'Explosive Arrows',announce:'\u{1F4A5} Explosive Arrows!'},

            orb:{stat:'piercing',threshold:3,name:'Arcane Barrage',announce:'\u{1F52E} Arcane Barrage!'},
            soulBolt:{stat:'lifesteal',threshold:0.02,name:'Soul Reaper',announce:'\u{1F480} Soul Reaper!'},
        };
        let voidMode=false;

        // ====== MULTIPLAYER SYSTEM ======
        let isMP=false, mpChannel=null, myMPId='', roomCode='', isRoomHost=false;

        const MP_COLORS=['#f0f0ff','#ff6666','#66ff66','#ffcc44'];
        const MP_SB_URL='https://mvzbnhabisoswihbqifh.supabase.co';
        const MP_SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12emJuaGFiaXNvc3dpaGJxaWZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1OTc0MDgsImV4cCI6MjA5MDE3MzQwOH0.4ze5U_R-w8ZnvwSO-Uum6ej8k9CY6Iw5avxs8L3sq3E';
        let sbClient=null;
        let lastMPBroadcast=0;
        const MP_SYNC_RATE=100; // ms between state broadcasts

        function initSBClient(){
            if(sbClient)return true;
            if(!window.supabase||!window.supabase.createClient){
                alert('Supabase SDK not loaded. Check your internet connection and refresh.');
                return false;
            }
            try{
                sbClient=window.supabase.createClient(MP_SB_URL,MP_SB_KEY,{realtime:{params:{eventsPerSecond:20}}});
                console.log('[MP] Supabase client initialized');
                return true;
            }catch(e){alert('Failed to init Supabase: '+e.message);return false;}
        }

        function genRoomCode(){return Math.random().toString(36).substring(2,6).toUpperCase();}

        function createRoom(){
            if(!initSBClient())return;
            if(mpChannel){try{mpChannel.send({type:'broadcast',event:'leave_room',payload:{id:myMPId}});}catch(e){}}
            if(lobbyBroadcastInterval){clearInterval(lobbyBroadcastInterval);lobbyBroadcastInterval=null;}
            lobbyPlayers={};
            roomCode=genRoomCode();myMPId=Date.now()+'_'+Math.random().toString(36).slice(2,6);isRoomHost=true;
            joinChannel();
            // Update both old and new UI elements
            let rc1=document.getElementById('roomCodeDisplay');if(rc1)rc1.textContent=roomCode;
            let rc2=document.getElementById('fpRoomCode');if(rc2)rc2.textContent=roomCode;
            let pl=document.getElementById('roomPlayerList');if(pl)pl.innerHTML='<div style="color:#aaa">连接中...</div>';
            let pl2=document.getElementById('fpPlayerList');if(pl2)pl2.innerHTML='<div style="color:#aaa">连接中...</div>';
        }

        function joinRoom(){
            if(!initSBClient())return;
            // Check both input sources
            let fpInput=document.getElementById('fpJoinInput');
            let oldInput=document.getElementById('joinCodeInput');
            let code=(fpInput&&fpInput.value.trim()?fpInput.value:oldInput?oldInput.value:'').trim().toUpperCase();
            if(code.length<3||code.length>6){alert('请输入房间号 (3-6位)');return;}
            if(mpChannel){try{mpChannel.send({type:'broadcast',event:'leave_room',payload:{id:myMPId}});}catch(e){}}
            if(lobbyBroadcastInterval){clearInterval(lobbyBroadcastInterval);lobbyBroadcastInterval=null;}
            lobbyPlayers={};
            roomCode=code;myMPId=Date.now()+'_'+Math.random().toString(36).slice(2,6);isRoomHost=false;
            joinChannel();
            document.getElementById('roomCodeDisplay').textContent=roomCode;
            document.getElementById('roomLobby').style.display='block';
            document.getElementById('startMPBtn').style.display='none';
            document.getElementById('roomPlayerList').innerHTML='<div style="color:#aaa">连接中...</div>';
        }

        // Lobby player list managed via broadcast (no Presence needed)
        let lobbyPlayers={};
        let lobbyBroadcastInterval=null;

        function joinChannel(){
            if(mpChannel){try{mpChannel.unsubscribe();}catch(e){}mpChannel=null;}
            if(lobbyBroadcastInterval){clearInterval(lobbyBroadcastInterval);lobbyBroadcastInterval=null;}
            console.log('[MP] Joining channel room-'+roomCode);

            mpChannel=sbClient.channel('room-'+roomCode,{config:{broadcast:{self:true}}});

            mpChannel.on('broadcast',{event:'lobby'},({payload})=>{
                if(payload&&payload.id){
                    lobbyPlayers[payload.id]={nick:payload.nick,role:payload.role,ts:Date.now()};
                    updateRoomPlayerList();
                }
            });
            mpChannel.on('broadcast',{event:'state'},({payload})=>{if(payload&&payload.id!==myMPId)handleRemoteState(payload);});
            mpChannel.on('broadcast',{event:'entities'},({payload})=>{if(payload)receiveEntities(payload);});
            mpChannel.on('broadcast',{event:'remote_damage'},({payload})=>{if(payload)processRemoteDamage(payload);});
            mpChannel.on('broadcast',{event:'mp_levelup'},({payload})=>{if(payload)handleMPLevelUp(payload);});
            mpChannel.on('broadcast',{event:'mp_upgrade_pick'},({payload})=>{if(payload)handleUpgradePick(payload);});
            mpChannel.on('broadcast',{event:'mp_upgrade_done'},({payload})=>{if(payload)handleUpgradeDone(payload);});
            mpChannel.on('broadcast',{event:'mp_shared_xp'},({payload})=>{if(payload&&isHostMP()){mpSharedExp+=(payload.v||0);mpCheckLevelUp();}});
            mpChannel.on('broadcast',{event:'mp_restart'},()=>{
                if(!isRoomHost){resetGame();initEvents();lastTimestamp=0;if(gameLoop)cancelAnimationFrame(gameLoop);gameLoop=requestAnimationFrame(tick);}
            });
            mpChannel.on('broadcast',{event:'shared_xp'},({payload})=>{if(payload&&payload.id!==myMPId&&gameState===STATE_PLAYING){player.exp+=payload.value;}});
            mpChannel.on('broadcast',{event:'resurrect'},({payload})=>{handleResurrection(payload);});
            mpChannel.on('broadcast',{event:'go_to_select'},()=>{
                if(!isRoomHost){
                    console.log('[MP] Go to character select');
                    document.getElementById('frontPage').style.display='none';
                    document.getElementById('startScreen').style.display='flex';
                }
            });
            mpChannel.on('broadcast',{event:'game_start'},({payload})=>{
                if(!isRoomHost){
                    console.log('[MP] Game start received');
                    isMP=true;
                    let isMobile='ontouchstart' in window||navigator.maxTouchPoints>0;
                    startGame(isMobile?'touch':'keyboard');
                }
            });
            mpChannel.on('broadcast',{event:'leave_room'},({payload})=>{
                if(payload&&payload.id){delete lobbyPlayers[payload.id];updateRoomPlayerList();}
            });

            mpChannel.subscribe((status)=>{
                console.log('[MP] Subscribe status:',status);
                if(status==='SUBSCRIBED'){
                    console.log('[MP] Connected OK!');
                    // Announce ourselves to the lobby
                    let nickEl=document.getElementById('nickInput');
                    let nick=(nickEl&&nickEl.value.trim())?nickEl.value.trim():'Player';
                    lobbyPlayers[myMPId]={nick:nick,role:selectedRole,ts:Date.now()};
                    mpChannel.send({type:'broadcast',event:'lobby',payload:{id:myMPId,nick:nick,role:selectedRole}});
                    // Keep announcing every 2s so others see us
                    lobbyBroadcastInterval=setInterval(()=>{
                        if(!mpChannel)return;
                        mpChannel.send({type:'broadcast',event:'lobby',payload:{id:myMPId,nick:nick,role:selectedRole}});
                        // Clean up stale players (not seen in 6s)
                        let now=Date.now();
                        for(let id in lobbyPlayers){if(now-lobbyPlayers[id].ts>6000)delete lobbyPlayers[id];}
                        updateRoomPlayerList();
                    },2000);
                    updateRoomPlayerList();
                }else if(status==='TIMED_OUT'||status==='CHANNEL_ERROR'||status==='CLOSED'){
                    console.error('[MP] Connection failed:',status);
                    document.getElementById('roomPlayerList').innerHTML='<div style="color:#ff5555">连接失败 ('+status+')! 请刷新页面重试</div>';
                }
            });
        }

        function updateRoomPlayerList(){
            let ids=Object.keys(lobbyPlayers);
            let html;
            if(ids.length===0){html='<div style="color:#aaa">等待玩家加入... (分享房间号给朋友)</div>';}
            else{
                html=`<div style="color:#ffd966;margin-bottom:6px">${ids.length}/4 玩家已连接 ✅</div>`;
                html+=ids.map((id,i)=>{
                    let p=lobbyPlayers[id];let color=MP_COLORS[i%MP_COLORS.length];let isMe=id===myMPId;
                    return `<div style="color:${color};margin:4px 0">${isMe?'👤':'👥'} ${p.nick||'Player'}${isMe?' (你)':''} - ${ROLES[p.role]?ROLES[p.role].name:'白点'}</div>`;
                }).join('');
            }
            // Update both UI locations
            let el1=document.getElementById('roomPlayerList');if(el1)el1.innerHTML=html;
            let el2=document.getElementById('fpPlayerList');if(el2)el2.innerHTML=html;
            let rc2=document.getElementById('fpRoomCode');if(rc2)rc2.textContent=roomCode;
            // Show start button when host + 1+ players
            if(isRoomHost){
                let show=ids.length>=1?'inline-block':'none';
                let sb1=document.getElementById('startMPBtn');if(sb1)sb1.style.display=show;
                let sb2=document.getElementById('fpStartBtn');if(sb2)sb2.style.display=show;
            }
        }

        function leaveRoom(){
            if(lobbyBroadcastInterval){clearInterval(lobbyBroadcastInterval);lobbyBroadcastInterval=null;}
            if(mpChannel){
                try{mpChannel.send({type:'broadcast',event:'leave_room',payload:{id:myMPId}});}catch(e){}
                try{mpChannel.unsubscribe();}catch(e){}
                mpChannel=null;
            }
            isMP=false;isRoomHost=false;roomCode='';otherPlayers={};lobbyPlayers={};
            let rl=document.getElementById('roomLobby');if(rl)rl.style.display='none';
            let fl=document.getElementById('fpLobby');if(fl)fl.style.display='none';
        }

        function startMPGame(){
            if(!isRoomHost||!mpChannel)return;
            isMP=true;
            if(lobbyBroadcastInterval){clearInterval(lobbyBroadcastInterval);lobbyBroadcastInterval=null;}
            mpChannel.send({type:'broadcast',event:'game_start',payload:{roomCode:roomCode}});
            startGame(controlMode||'keyboard');
        }

        function broadcastMyState(){
            if(!isMP||!mpChannel)return;
            let now=Date.now();if(now-lastMPBroadcast<MP_SYNC_RATE)return;lastMPBroadcast=now;
            let roleData=ROLES[selectedRole]||ROLES.dot;
            let amAlive=gameState!==STATE_GAMEOVER;
            mpChannel.send({type:'broadcast',event:'state',payload:{
                id:myMPId,nick:playerNickname,role:selectedRole,
                x:Math.round(amAlive?player.x:mpGhostX),y:Math.round(amAlive?player.y:mpGhostY),
                hp:Math.floor(player.hp),maxHp:player.maxHp,
                alive:amAlive,
                ghostX:Math.round(mpGhostX),ghostY:Math.round(mpGhostY),
                level:player.level,color:roleData.color,
                isDashing:player.isDashing,invincible:player.invincibleTimer>0
            }});
        }

        function handleRemoteState(data){
            if(!data||data.id===myMPId)return;
            // Count current players, reject if already 4
            let count=Object.keys(otherPlayers).length+1;
            if(!otherPlayers[data.id]&&count>=4)return;
            otherPlayers[data.id]=data;
            otherPlayers[data.id]._lastSeen=Date.now();
        }

        function cleanupDisconnected(){
            let now=Date.now();
            for(let id in otherPlayers){if(now-otherPlayers[id]._lastSeen>5000)delete otherPlayers[id];}
        }

        // Resurrection channeling state
        let resChanneling=false, resChannelTarget=null, resChannelProgress=0;
        const RES_CHANNEL_TIME=3.5; // seconds to stand in circle
        const RES_CIRCLE_RADIUS=100; // circle size around ghost
        // Ghost state for dead player in MP
        let mpGhostX=0, mpGhostY=0, mpIsDead=false;
        // Shared enemies: host broadcasts, clients receive
        let mpEntityIdCounter=0;
        let lastEntitySync=0;
        const ENTITY_SYNC_RATE=150; // ms

        function updateResurrection(dt){
            if(!isMP||resCooldown>0||gameState===STATE_GAMEOVER||gameState!==STATE_PLAYING){
                resChanneling=false;resChannelTarget=null;return;
            }
            // Find nearest dead teammate in range
            let foundTarget=null;
            for(let id in otherPlayers){
                let op=otherPlayers[id];
                if(!op.alive){
                    let dist=Math.hypot(player.x-op.ghostX,player.y-op.ghostY);
                    if(dist<RES_CIRCLE_RADIUS){foundTarget=id;break;}
                }
            }
            if(foundTarget){
                if(resChannelTarget!==foundTarget){resChannelTarget=foundTarget;resChannelProgress=0;}
                resChanneling=true;
                resChannelProgress=Math.min(RES_CHANNEL_TIME,resChannelProgress+dt);
                // Channeling complete
                if(resChannelProgress>=RES_CHANNEL_TIME){
                    let op=otherPlayers[foundTarget];
                    resCooldown=30;
                    resChanneling=false;resChannelTarget=null;resChannelProgress=0;
                    mpChannel.send({type:'broadcast',event:'resurrect',payload:{targetId:foundTarget,byId:myMPId,byNick:playerNickname}});
                    addFloatingText('\u{1F4AB} 复活了 '+(op?op.nick:'队友')+'!',player.x,player.y-50,'#44ff44');
                    screenShakeTimer=0.3;screenShakeIntensity=6;
                    // AOE damage to enemies around resurrection area
                    let resAoeDmg=player.damage*3;let resAoeR=RES_CIRCLE_RADIUS*1.5;
                    let gx2=op?op.ghostX:player.x,gy2=op?op.ghostY:player.y;
                    for(let ei=enemies.length-1;ei>=0;ei--){let e=enemies[ei];if(Math.hypot(e.x-gx2,e.y-gy2)<resAoeR+e.radius){e.health-=resAoeDmg;if(e.health<=0){spawnXpFromEnemy(e.x,e.y,e.radius);enemies.splice(ei,1);killCount++;player.comboCount++;player.comboTimer=2;}}}
                    for(let ei=elites.length-1;ei>=0;ei--){let e=elites[ei];if(Math.hypot(e.x-gx2,e.y-gy2)<resAoeR+e.radius){e.health-=resAoeDmg;if(e.health<=0){spawnXpFromEnemy(e.x,e.y,e.radius,false,true);elites.splice(ei,1);killCount++;player.comboCount++;player.comboTimer=2;}}}
                    for(let bs of bosses){if(Math.hypot(bs.x-gx2,bs.y-gy2)<resAoeR+bs.radius){bs.health-=resAoeDmg;}}
                    spawnDeathParticles(gx2,gy2,RES_CIRCLE_RADIUS,'#44ff44',25);
                }
            }else{
                // Left the circle — progress slowly drains, but keep target so re-entering continues
                resChanneling=false;
                if(resChannelProgress>0)resChannelProgress=Math.max(0,resChannelProgress-dt*0.3);
            }
        }

        function getResChannelDodgeBonus(){return 0;}

        // Host keeps running enemy AI even when not in STATE_PLAYING
        function updateHostEntities(dt,nowS){
            if(!isHostMP())return;
            gameTime+=dt;difficultyTimer+=dt;
            if(gameMode!=='bossRush')spawnEnemy(nowS);
            spawnChest(nowS);
            if(gameMode!=='bossRush')spawnElite(nowS);
            if(gameMode==='bossRush'){if(gameTime-lastBossSpawnTime>=55&&bossCountdown<=0){bossCountdown=BOSS_COUNTDOWN_TIME;}}
            else{checkBossCountdown(nowS);}
            if(bossCountdown>0){bossCountdown-=dt;if(bossCountdown<=0){bossCountdown=0;spawnBoss(nowS);}}
            // Enemy movement
            for(let e of enemies){
                if((e.frozen||0)>0){e.frozen-=dt;continue;}
                let tgt=getNearestPlayerPos(e.x,e.y);
                let dx=tgt.x-e.x,dy=tgt.y-e.y,dist=Math.hypot(dx,dy);
                if(dist>0.01){let mv=e.speed*dt;e.x+=(dx/dist)*mv;e.y+=(dy/dist)*mv;}
            }
            for(let e of elites){if((e.frozen||0)>0){e.frozen-=dt;continue;}let tgt=getNearestPlayerPos(e.x,e.y);let dx=tgt.x-e.x,dy=tgt.y-e.y,d=Math.hypot(dx,dy);if(d>0.01){let mv=e.speed*dt;e.x+=(dx/d)*mv;e.y+=(dy/d)*mv;}}
            // Simplified boss movement (just chase)
            for(let boss of bosses){if((boss.frozen||0)>0){boss.frozen-=dt;continue;}let tgt=getNearestPlayerPos(boss.x,boss.y);let dx=tgt.x-boss.x,dy=tgt.y-boss.y,d=Math.hypot(dx,dy);if(d>60){let mv=boss.speed*dt;boss.x+=(dx/d)*mv;boss.y+=(dy/d)*mv;}}
            // Floating texts + particles decay
            for(let i=floatingTexts.length-1;i>=0;i--){floatingTexts[i].life-=dt;if(floatingTexts[i].life<=0)floatingTexts.splice(i,1);}
            for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.vx*=0.95;p.vy*=0.95;if(p.life<=0)particles.splice(i,1);}
            broadcastEntities();
            updateUI();
        }

        // ====== SHARED LEVEL & SYNC UPGRADE ======
        let mpSharedExp=0, mpSharedLevel=1, mpSharedNextExp=100;
        let mpUpgradeChoices={}; // {playerId: choiceIndex}
        let mpUpgradeOptions=[]; // the 3 options for current level up
        let mpUpgradeTimer=0; // 30s countdown
        let mpWaitingForUpgrade=false; // true when waiting for others
        let myUpgradeChosen=false;
        const MP_UPGRADE_TIMEOUT=30;

        function mpCheckLevelUp(){
            if(!isHostMP())return;
            if(mpSharedExp>=mpSharedNextExp&&gameState===STATE_PLAYING){
                // Trigger level up for all players
                mpSharedLevel++;mpSharedExp-=mpSharedNextExp;
                mpSharedNextExp=Math.floor(100+mpSharedLevel*70);
                let opts=generateUpgradeOptions();
                mpUpgradeOptions=opts;mpUpgradeChoices={};mpUpgradeTimer=MP_UPGRADE_TIMEOUT;
                mpWaitingForUpgrade=true;myUpgradeChosen=false;
                gameState=STATE_UPGRADE;upgradeOptions=opts;
                player.level=mpSharedLevel;player.nextExp=mpSharedNextExp;player.exp=mpSharedExp;
                // Broadcast to clients
                mpChannel.send({type:'broadcast',event:'mp_levelup',payload:{
                    level:mpSharedLevel,exp:mpSharedExp,nextExp:mpSharedNextExp,
                    opts:opts.map(o=>o.name)
                }});
            }
        }

        function handleMPLevelUp(data){
            if(isHostMP())return;
            mpSharedLevel=data.level;mpSharedExp=data.exp;mpSharedNextExp=data.nextExp;
            player.level=data.level;player.exp=data.exp;player.nextExp=data.nextExp;
            // Rebuild options from names (match against pool)
            upgradeOptions=generateUpgradeOptions();
            // Override with host's option names for consistency
            mpUpgradeOptions=upgradeOptions;mpUpgradeChoices={};
            mpUpgradeTimer=MP_UPGRADE_TIMEOUT;mpWaitingForUpgrade=true;myUpgradeChosen=false;
            if(gameState===STATE_PLAYING||gameState===STATE_GAMEOVER){
                gameState=STATE_UPGRADE;
            }
        }

        function mpSendUpgradeChoice(index){
            if(!isMP||!mpChannel)return;
            myUpgradeChosen=true;
            mpChannel.send({type:'broadcast',event:'mp_upgrade_pick',payload:{pid:myMPId,choice:index}});
            if(isHostMP()){mpUpgradeChoices[myMPId]=index;checkAllUpgradesPicked();}
        }

        function handleUpgradePick(data){
            if(!isHostMP())return;
            mpUpgradeChoices[data.pid]=data.choice;
            checkAllUpgradesPicked();
        }

        function checkAllUpgradesPicked(){
            if(!isHostMP())return;
            // Check if all alive players have picked
            let allPicked=true;
            if(!mpUpgradeChoices[myMPId]&&mpUpgradeChoices[myMPId]!==0)allPicked=false;
            for(let id in otherPlayers){
                if(otherPlayers[id].alive&&!mpUpgradeChoices[id]&&mpUpgradeChoices[id]!==0)allPicked=false;
            }
            if(allPicked){finishUpgrade();}
        }

        function autoPickUpgrade(){
            if(!myUpgradeChosen&&upgradeOptions.length>0){
                let pick=Math.floor(Math.random()*upgradeOptions.length);
                if(isMP){mpSendUpgradeChoice(pick);}
                applyUpgrade(pick);
            }
            // Force finish if host
            if(isHostMP()){finishUpgrade();}
        }

        function finishUpgrade(){
            mpWaitingForUpgrade=false;
            // Host applies its own upgrade if not yet
            if(!myUpgradeChosen&&upgradeOptions.length>0){
                applyUpgrade(Math.floor(Math.random()*upgradeOptions.length));
            }
            // Tell everyone to resume
            mpChannel.send({type:'broadcast',event:'mp_upgrade_done',payload:{level:mpSharedLevel}});
            if(gameState===STATE_UPGRADE){gameState=STATE_PLAYING;}
            myUpgradeChosen=false;
        }

        function handleUpgradeDone(data){
            if(isHostMP())return;
            mpWaitingForUpgrade=false;myUpgradeChosen=false;
            player.level=data.level||mpSharedLevel;
            if(gameState===STATE_UPGRADE){
                // Apply own upgrade if chosen, or auto-pick
                if(!myUpgradeChosen&&upgradeOptions.length>0){
                    applyUpgrade(Math.floor(Math.random()*upgradeOptions.length));
                }
                gameState=mpIsDead?STATE_GAMEOVER:STATE_PLAYING;
            }
        }

        // ====== SHARED ENEMIES SYSTEM ======
        function isHostMP(){return isMP&&isRoomHost;}
        function isClientMP(){return isMP&&!isRoomHost;}

        function broadcastEntities(){
            if(!isHostMP()||!mpChannel)return;
            let now=Date.now();if(now-lastEntitySync<ENTITY_SYNC_RATE)return;lastEntitySync=now;
            // Compress entity data
            let eData=enemies.slice(0,50).map(e=>({eid:e.eid,x:Math.round(e.x),y:Math.round(e.y),r:Math.round(e.radius*10)/10,hp:Math.round(e.health*10)/10,mhp:Math.round(e.maxHealth*10)/10,spd:Math.round(e.speed),t:e.type,fr:e.frozen||0}));
            let elData=elites.map(e=>({eid:e.eid,x:Math.round(e.x),y:Math.round(e.y),r:Math.round(e.radius*10)/10,hp:Math.round(e.health*10)/10,mhp:Math.round(e.maxHealth*10)/10,spd:Math.round(e.speed),af:e.affixes?e.affixes.map(a=>a.id):[],ash:Math.round((e.affixShield||0)*10)/10}));
            let bData=bosses.map(b=>({eid:b.eid,x:Math.round(b.x),y:Math.round(b.y),r:Math.round(b.radius*10)/10,hp:Math.round(b.health*10)/10,mhp:Math.round(b.maxHealth*10)/10,bt:b.bossType,fr:b.frozen||0}));
            let xpData=xpOrbs.slice(0,30).map(o=>({x:Math.round(o.x),y:Math.round(o.y),r:Math.round(o.radius*10)/10,v:o.value}));
            let cData=chests.map(c=>({x:Math.round(c.x),y:Math.round(c.y),op:c.isOpen}));
            mpChannel.send({type:'broadcast',event:'entities',payload:{e:eData,el:elData,b:bData,xp:xpData,ch:cData,kc:killCount,gt:Math.round(gameTime*10)/10}});
        }

        function receiveEntities(data){
            if(!isClientMP())return;
            // Replace local entity arrays with host data
            enemies=data.e.map(e=>({eid:e.eid,x:e.x,y:e.y,radius:e.r,health:e.hp,maxHealth:e.mhp,speed:e.spd,type:e.t,isBoss:false,isElite:false,frozen:e.fr||0,attackTimer:0,shieldAngle:0,healTimer:0}));
            elites=data.el.map(e=>{let afxObjs=(e.af||[]).map(aid=>ELITE_AFFIXES.find(a=>a.id===aid)).filter(Boolean);return{eid:e.eid,x:e.x,y:e.y,radius:e.r,health:e.hp,maxHealth:e.mhp,speed:e.spd,isElite:true,isBoss:false,affixes:afxObjs,affixShield:e.ash||0};});
            bosses=data.b.map(b=>({eid:b.eid,x:b.x,y:b.y,radius:b.r,health:b.hp,maxHealth:b.mhp,isBoss:true,bossType:b.bt,frozen:b.fr||0,attackTimer:0,attackInterval:2,contactDamage:5,speed:30,chargeTimer:0,isCharging:false,chargeDuration:0,chargeDx:0,chargeDy:0,chargeSpeed:0,teleportCooldown:0,attackPhase:0,summonCount:0,hasAbsorbed:false,armor:0,enraged:false,twinAlive:true,fireTrailTimer:0}));
            xpOrbs=data.xp.map(o=>({x:o.x,y:o.y,radius:o.r,value:o.v}));
            chests=data.ch.map(c=>({x:c.x,y:c.y,radius:18,isOpen:c.op}));
            killCount=data.kc||killCount;
        }

        function sendDamageToHost(eid,damage,isCrit,isElite,isBoss){
            if(!isClientMP()||!mpChannel)return;
            mpChannel.send({type:'broadcast',event:'remote_damage',payload:{eid:eid,dmg:damage,crit:isCrit,el:isElite,boss:isBoss,pid:myMPId}});
        }

        function processRemoteDamage(data){
            if(!isHostMP())return;
            // Find entity by eid and apply damage
            if(data.boss){for(let i=bosses.length-1;i>=0;i--){let b=bosses[i];if(b.eid===data.eid){b.health-=data.dmg;if(data.crit&&hasRelic('freezeOnCrit'))b.frozen=Math.max(b.frozen||0,0.8);if(b.health<=0){spawnXpFromEnemy(b.x,b.y,b.radius,true);bosses.splice(i,1);killCount++;bossKillCount++;let ni=generateShopItems();shopItems=[ni[0]||null,ni[1]||null,ni[2]||null];shopRefreshCount=0;let role=ROLES[selectedRole];if(role&&role.skill&&skillLevel<MAX_SKILL_LEVEL){skillUpOptions=generateSkillUpOptions();gameState=STATE_SKILL_UP;}else{gameState=activeMutators.includes('noShop')?STATE_PLAYING:STATE_SHOP;}}break;}}}

        function drawOtherPlayers(w2s){
            for(let id in otherPlayers){
                let op=otherPlayers[id];
                let{x,y}=w2s(op.x,op.y);
                // Only draw if on screen
                if(x<-50||x>W+50||y<-50||y>H+50)continue;
                ctx.shadowBlur=20;
                if(op.alive){
                    // Alive player
                    ctx.shadowColor=op.color||'#ffffff';
                    if(op.isDashing){ctx.fillStyle='#aaddff';}
                    else if(op.invincible&&(Math.floor(Date.now()/200)%2===0)){ctx.fillStyle='#fffbe3';}
                    else{ctx.fillStyle=op.color||'#f0f0ff';}
                    ctx.beginPath();ctx.arc(x,y,PLAYER_RADIUS,0,Math.PI*2);ctx.fill();
                    // Name tag
                    ctx.shadowBlur=0;ctx.fillStyle='#ffffffcc';ctx.font='11px monospace';ctx.textAlign='center';
                    ctx.fillText(op.nick||'Player',x,y-PLAYER_RADIUS-8);
                    ctx.fillText('Lv'+op.level,x,y-PLAYER_RADIUS-20);
                    // HP bar
                    let bw=24,bh=3,bx=x-bw/2,by=y+PLAYER_RADIUS+4;
                    ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
                    ctx.fillStyle=op.hp/op.maxHp>0.5?'#44ff44':'#ff4444';
                    ctx.fillRect(bx,by,bw*(op.hp/op.maxHp),bh);
                    ctx.textAlign='left';
                }else{
                    // Dead player ghost with resurrection circle
                    let{x:gx,y:gy}=w2s(op.ghostX,op.ghostY);
                    let pulse=0.3+0.3*Math.sin(Date.now()/300);
                    let isChannelingThis=resChanneling&&resChannelTarget===id;
                    let dist=Math.hypot(player.x-op.ghostX,player.y-op.ghostY);
                    let inRange=dist<RES_CIRCLE_RADIUS&&myCanResurrect&&resCooldown<=0&&gameState!==STATE_GAMEOVER;

                    let pct=resChannelProgress/RES_CHANNEL_TIME;

                    // Resurrection zone — dim circle (always visible)
                    ctx.beginPath();ctx.arc(gx,gy,RES_CIRCLE_RADIUS,0,Math.PI*2);
                    ctx.fillStyle=isChannelingThis?'rgba(68,255,68,0.06)':'rgba(136,136,255,0.04)';ctx.fill();
                    // Dashed background circle
                    ctx.strokeStyle='rgba(136,136,255,0.2)';ctx.lineWidth=2;ctx.setLineDash([6,8]);
                    ctx.beginPath();ctx.arc(gx,gy,RES_CIRCLE_RADIUS,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);

                    // Progress arc — draws the circle like filling it in
                    if(pct>0){
                        let startAngle=-Math.PI/2;
                        let endAngle=startAngle+pct*Math.PI*2;
                        ctx.beginPath();ctx.arc(gx,gy,RES_CIRCLE_RADIUS,startAngle,endAngle);
                        ctx.strokeStyle='rgba(68,255,68,0.9)';ctx.lineWidth=4;ctx.shadowColor='#44ff44';ctx.shadowBlur=12;ctx.stroke();ctx.shadowBlur=0;
                        // Inner glow fills as progress goes up
                        ctx.beginPath();ctx.moveTo(gx,gy);ctx.arc(gx,gy,RES_CIRCLE_RADIUS,startAngle,endAngle);ctx.closePath();
                        ctx.fillStyle=`rgba(68,255,68,${0.03+pct*0.08})`;ctx.fill();
                    }

                    // Ghost body
                    ctx.shadowColor='#8888ff';ctx.globalAlpha=pulse;
                    ctx.beginPath();ctx.arc(gx,gy,PLAYER_RADIUS+4,0,Math.PI*2);
                    ctx.fillStyle='rgba(136,136,255,0.3)';ctx.fill();
                    ctx.strokeStyle='rgba(136,136,255,0.6)';ctx.lineWidth=2;ctx.stroke();
                    ctx.globalAlpha=1;ctx.shadowBlur=0;
                    ctx.fillStyle='#8888ff';ctx.font='16px monospace';ctx.textAlign='center';
                    ctx.fillText('\u{1F47B}',gx,gy+5);
                    ctx.font='11px monospace';ctx.fillStyle='#aaaaff';
                    ctx.fillText(op.nick||'Player',gx,gy-PLAYER_RADIUS-18);

                    // Status text & particles
                    if(isChannelingThis){
                        ctx.fillStyle='#44ff44';ctx.font='bold 12px monospace';
                        ctx.fillText(Math.round(pct*100)+'%',gx,gy+PLAYER_RADIUS+20);
                        // Spinning particles on the arc edge
                        let headAngle=-Math.PI/2+pct*Math.PI*2;
                        let hx=gx+Math.cos(headAngle)*RES_CIRCLE_RADIUS,hy=gy+Math.sin(headAngle)*RES_CIRCLE_RADIUS;
                        ctx.fillStyle='#88ff88';ctx.shadowColor='#44ff44';ctx.shadowBlur=10;
                        ctx.beginPath();ctx.arc(hx,hy,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
                    }else if(pct>0){
                        // Draining — show fading percentage
                        ctx.fillStyle='#aaaaff';ctx.font='11px monospace';
                        ctx.fillText(Math.round(pct*100)+'%',gx,gy+PLAYER_RADIUS+20);
                    }else if(inRange){
                        ctx.fillStyle='#88ffaa';ctx.font='bold 11px monospace';
                        ctx.fillText('\u2b50 站在圈内复活',gx,gy+RES_CIRCLE_RADIUS+16);
                    }else if(resCooldown<=0){
                        ctx.fillStyle='#888';ctx.font='10px monospace';
                        ctx.fillText('走近复活',gx,gy+RES_CIRCLE_RADIUS+16);
                    }
                    ctx.textAlign='left';
                }
                ctx.shadowBlur=0;
            }
        }

        function handleJoyTouchStart(e){
            e.preventDefault();if(controlMode!=='touch')return;

            }
            for(let i=0;i<e.changedTouches.length;i++){
                const t=e.changedTouches[i],pos=canvasTouchCoords(t);
                // Pause button
                if(pos.x>W-100&&pos.y<70&&gameState===STATE_PLAYING){gameState=STATE_PAUSED;return;}

                if(pos.x>W/2-40&&pos.x<W/2+40&&pos.y>H-80&&pos.y<H-20&&gameState===STATE_PLAYING){triggerDash();return;}

        function handleJoyTouchMove(e){
            e.preventDefault();if(controlMode!=='touch')return;
            for(let i=0;i<e.changedTouches.length;i++){
                const t=e.changedTouches[i],pos=canvasTouchCoords(t);
                if(leftJoy.active&&t.identifier===leftJoy.id){let dx=pos.x-leftJoy.bx,dy=pos.y-leftJoy.by,d=Math.hypot(dx,dy);if(d>JOY_R){dx=dx/d*JOY_R;dy=dy/d*JOY_R;}leftJoy.kx=leftJoy.bx+dx;leftJoy.ky=leftJoy.by+dy;}

                    if(d<sr+e.radius){e.health-=dmg;if(d>0.01){let a=Math.atan2(e.y-player.y,e.x-player.x);e.x+=Math.cos(a)*kb;e.y+=Math.sin(a)*kb;}

        function shootBullet(now){
            if(gameState!==STATE_PLAYING||now-lastShotTime<player.fireInterval)return;lastShotTime=now;
            let aimDx,aimDy;
            if(controlMode==='touch'){
                // Update aim angle if right joystick is active
                if(rightJoy.active){let jdx=rightJoy.kx-rightJoy.bx,jdy=rightJoy.ky-rightJoy.by;if(Math.hypot(jdx,jdy)>JOY_DEAD)touchAimAngle=Math.atan2(jdy,jdx);}
                // Always shoot in current aim angle
                aimDx=Math.cos(touchAimAngle);aimDy=Math.sin(touchAimAngle);
            }else{
                aimDx=mouseX-(player.x-worldOffsetX);aimDy=mouseY-(player.y-worldOffsetY);
                let d=Math.hypot(aimDx,aimDy);if(d<0.001){aimDx=0;aimDy=-1;}else{aimDx/=d;aimDy/=d;}
            }

        // --- WEAPON EVOLUTION ---
        function checkWeaponEvolution(){
            if(player.evolved)return;
            let wep=(ROLES[selectedRole]||ROLES.dot).weapon||'dot';
            let evo=WEAPON_EVOLUTIONS[wep];if(!evo)return;
            let val=0;
            if(evo.stat==='piercing')val=player.piercing;
            else if(evo.stat==='speed')val=getFinalSpeed();
            else if(evo.stat==='critChance')val=player.critChance;
            else if(evo.stat==='bulletCount')val=player.bulletCount;
            else if(evo.stat==='lifesteal')val=player.lifesteal;
            if(val>=evo.threshold){
                player.evolved=true;player.evolvedWeapon=evo.name;
                addFloatingText(evo.announce,player.x,player.y-70,'#ffd966');
                screenShakeTimer=0.5;screenShakeIntensity=10;
                // Apply evolution bonuses
                if(evo.name==='Laser Beam'){player.piercing+=3;player.fireInterval=Math.max(0.04,player.fireInterval*0.4);player.bulletSize=Math.max(2,player.bulletSize-2);}
                if(evo.name==='Blade Storm'){/* passive aura handled in updateGame */}
                if(evo.name==='Explosive Arrows'){/* explosion on hit handled in bullet code */}
                if(evo.name==='Blade Vortex'){for(let i=0;i<4;i++)orbitingDaggers.push({angle:i*Math.PI/2,dist:50,dmg:player.damage*0.8});}
                if(evo.name==='Arcane Barrage'){player.bulletCount=Math.max(player.bulletCount,3);}
                if(evo.name==='Soul Reaper'){/* auto ghost spawn on kill handled in death code */}
            }
        }

                    lavaPools.push({x:player.x+Math.cos(a)*d,y:player.y+Math.sin(a)*d,radius:80,life:20,dmgTimer:0});}}
            // Speed portals every 120s
            if(envPortalTimer>=120){envPortalTimer=0;

        function updateEnvironmentalEvents(dt){
            // Healing shrines
            for(let i=healingShrines.length-1;i>=0;i--){let s=healingShrines[i];if(!s.active)continue;
                if(Math.hypot(player.x-s.x,player.y-s.y)<player.radius+s.radius){
                    let heal=Math.floor(player.maxHp*0.3);player.hp=Math.min(player.maxHp,player.hp+heal);
                    addFloatingText(`+${heal} HP`,player.x,player.y-30,'#44ff44');healingShrines.splice(i,1);}}
            // Lava pools
            for(let i=lavaPools.length-1;i>=0;i--){let lp=lavaPools[i];lp.life-=dt;lp.dmgTimer+=dt;
                if(lp.life<=0){lavaPools.splice(i,1);continue;}
                if(lp.dmgTimer>=0.5){lp.dmgTimer=0;
                    // Damage player
                    if(Math.hypot(player.x-lp.x,player.y-lp.y)<player.radius+lp.radius){damagePlayer(1);}
                    // Damage enemies
                    for(let j=enemies.length-1;j>=0;j--){let e=enemies[j];if(Math.hypot(e.x-lp.x,e.y-lp.y)<e.radius+lp.radius){e.health-=1;if(e.health<=0){spawnXpFromEnemy(e.x,e.y,e.radius);enemies.splice(j,1);killCount++;}}}
                    for(let j=elites.length-1;j>=0;j--){let e=elites[j];if(Math.hypot(e.x-lp.x,e.y-lp.y)<e.radius+lp.radius){e.health-=1;if(e.health<=0){spawnXpFromEnemy(e.x,e.y,e.radius,false,true);elites.splice(j,1);killCount++;}}}
                    for(let bs of bosses){if(Math.hypot(bs.x-lp.x,bs.y-lp.y)<bs.radius+lp.radius){bs.health-=1;}}
                }}
            // Speed portals
            for(let i=speedPortals.length-1;i>=0;i--){let p=speedPortals[i];p.life-=dt;if(p.cooldown>0)p.cooldown-=dt;
                if(p.life<=0){speedPortals.splice(i,1);continue;}
                if(p.cooldown<=0){
                    if(Math.hypot(player.x-p.x1,player.y-p.y1)<player.radius+p.radius){player.x=p.x2;player.y=p.y2;p.cooldown=2;addFloatingText('\u{1F300} Teleport!',player.x,player.y-30,'#4488ff');}
                    else if(Math.hypot(player.x-p.x2,player.y-p.y2)<player.radius+p.radius){player.x=p.x1;player.y=p.y1;p.cooldown=2;addFloatingText('\u{1F300} Teleport!',player.x,player.y-30,'#4488ff');}
                }}
            // Toxic fog
            if(toxicFog.active){toxicFog.radius=Math.max(200,toxicFog.radius-30*dt);
                let dist=Math.hypot(player.x-toxicFog.x,player.y-toxicFog.y);
                if(dist>toxicFog.radius){damagePlayer(Math.ceil(3*dt));}}
        }
        // Chain lightning helper
        function chainLightningEffect(deadX,deadY,killDamage){
            let nearest=null,minD=Infinity;
            for(let e of enemies){let d=Math.hypot(e.x-deadX,e.y-deadY);if(d<120&&d<minD){minD=d;nearest=e;}}
            for(let e of elites){let d=Math.hypot(e.x-deadX,e.y-deadY);if(d<120&&d<minD){minD=d;nearest=e;}}
            for(let bs of bosses){let d=Math.hypot(bs.x-deadX,bs.y-deadY);if(d<120&&d<minD){minD=d;nearest=bs;}}
            if(nearest){let chainDmg=killDamage*0.3;nearest.health-=chainDmg;addFloatingText('\u26A1'+Math.round(chainDmg),nearest.x,nearest.y-20,'#ffff44');}
        }

                            if(hasRelic('goldRain')){let gr=2+player.level;player.gold+=gr;runStats.goldEarned+=gr;}
                            // Soul Reaper evolution
                            if(player.evolved&&player.evolvedWeapon==='Soul Reaper'){friendlyGhosts.push({x:bs.x,y:bs.y,timer:6,shootTimer:0});}
                            // Relic drop from boss (100%)
                            tryRelicDrop(false,true);
                            if(bs.bossType==='twins_fire'||bs.bossType==='twins_ice'){
                                for(let ob of bosses){if((ob.bossType==='twins_fire'||ob.bossType==='twins_ice')&&ob!==bs){
                                    ob.speed*=1.5;ob.attackInterval*=0.5;ob.health=ob.maxHealth;ob.enraged=true;
                                    addFloatingText('💢 双子暴怒!',ob.x,ob.y-50,'#ff4444');screenShakeTimer=0.3;screenShakeIntensity=10;}}}
                            player.comboCount++;player.comboTimer=2;
                            let ni=generateShopItems();shopItems=[ni[0]||null,ni[1]||null,ni[2]||null];shopRefreshCount=0;
                            let role=ROLES[selectedRole];
                            if(role&&role.skill&&skillLevel<MAX_SKILL_LEVEL){skillUpOptions=generateSkillUpOptions();gameState=STATE_SKILL_UP;}
                            else if(relicDropPending){triggerRelicSelection();}
                            else{gameState=activeMutators.includes('noShop')?STATE_PLAYING:STATE_SHOP;}}if(b.piercing<=0){hit=true;break;}else b.piercing--;}}
                    if(hit){bullets.splice(i,1);continue;}
                    } // end host/solo else block
                }else{if(Math.hypot(b.x-player.x,b.y-player.y)<b.radius+player.radius){tryDodgeOrDamage(b.damage);if(b.slows)player.slowTimer=2.0;bullets.splice(i,1);continue;}}
            }

            // XP orbs (magnet/vacuum attraction + combo multiplier)
            let effMagnet=player.magnetRange;
            for(let i=xpOrbs.length-1;i>=0;i--){let o=xpOrbs[i],dx=player.x-o.x,dy=player.y-o.y,d=Math.hypot(dx,dy);
                if(d<player.radius+o.radius){
                    let mult=player.comboCount>=10?2:player.comboCount>=5?1.5:1;
                    if(hasRelic('xpFeast'))mult*=1.3;
                    let xpVal=Math.floor(o.value*mult);xpOrbs.splice(i,1);
                    if(isMP){
                        // Shared level: send XP to host pool
                        if(isHostMP()){mpSharedExp+=xpVal;player.exp=mpSharedExp;mpCheckLevelUp();}
                        else{mpChannel.send({type:'broadcast',event:'mp_shared_xp',payload:{v:xpVal}});}
                    }else{player.exp+=xpVal;}
                }else if(o.vacuumed){let spd=600*dt;o.x+=(dx/d)*spd;o.y+=(dy/d)*spd;
                }else if(effMagnet>0&&d<effMagnet){let spd=250*dt*(1+effMagnet/(d+1));o.x+=(dx/d)*spd;o.y+=(dy/d)*spd;}
            }

            // Chests
            nearbyChest=null;
            for(let i=0;i<chests.length;i++){let c=chests[i];if(c.isOpen)continue;let d=Math.hypot(player.x-c.x,player.y-c.y);
                if(d<player.radius+c.radius+20){nearbyChest=c;if(controlMode==='touch'){openChest(i);break;}if(keys[keyMap.interact]){openChest(i);keys[keyMap.interact]=false;}break;}}

            // Player vs enemies collision
            for(let j=enemies.length-1;j>=0;j--){
                let e=enemies[j],dx=player.x-e.x,dy=player.y-e.y,dist=Math.hypot(dx,dy),md=player.radius+e.radius;
                if(dist<md){
                    if(dist>0.001){let ov=md-dist,a=Math.atan2(dy,dx);player.x+=Math.cos(a)*ov*0.6;player.y+=Math.sin(a)*ov*0.6;}
                    let eDmgScale=getMonsterStatsByLevel().dmgMult;
                    if(e.type==='exploder'){
                        tryDodgeOrDamage(Math.floor(Math.max(3,Math.floor(e.radius))*eDmgScale));
                        addFloatingText("💥",e.x,e.y,"#ff8800");screenShakeTimer=0.15;screenShakeIntensity=6;
                        spawnXpFromEnemy(e.x,e.y,e.radius);enemies.splice(j,1);killCount++;player.comboCount++;player.comboTimer=2;
                    }else{let cdmg=e.type==='teleporter'?Math.floor(Math.max(3,e.radius)*eDmgScale):Math.floor(Math.max(1,Math.floor(e.radius/5))*eDmgScale);tryDodgeOrDamage(cdmg);
                        // Thorns relic: deal 5 dmg back on contact
                        if(hasRelic('thorns')&&player.invincibleTimer<=INVINCIBLE_DURATION+0.01){e.health-=5;if(e.health<=0){spawnXpFromEnemy(e.x,e.y,e.radius);enemies.splice(j,1);killCount++;}}}
                }
            }
            // Player vs elites
            for(let e of elites){let dx=player.x-e.x,dy=player.y-e.y,dist=Math.hypot(dx,dy),md=player.radius+e.radius;
                if(dist<md){if(dist>0.001){let ov=md-dist,a=Math.atan2(dy,dx);player.x+=Math.cos(a)*ov*0.6;player.y+=Math.sin(a)*ov*0.6;}
                    // Elite affix: vampiric - heal elite 10% of damage dealt
                    let elContactDmg=Math.floor(Math.max(2,Math.floor(e.radius/4))*getEliteStatScale().dmgMult);
                    tryDodgeOrDamage(elContactDmg);
                    if(e.affixes&&e.affixes.some(a2=>a2.id==='vampiric')){e.health=Math.min(e.maxHealth,e.health+elContactDmg*0.1);}
                    // Thorns relic
                    if(hasRelic('thorns')){e.health-=5;}
                }}
            // Player vs bosses
            for(let bs of bosses){let dx=player.x-bs.x,dy=player.y-bs.y,dist=Math.hypot(dx,dy),md=player.radius+bs.radius;
                if(dist<md){if(dist>0.001){let ov=md-dist,a=Math.atan2(dy,dx);player.x+=Math.cos(a)*ov*0.4;player.y+=Math.sin(a)*ov*0.4;}tryDodgeOrDamage(Math.floor(bs.contactDamage*getBossStatScale().dmgMult));}}

            // Floating texts
            for(let i=floatingTexts.length-1;i>=0;i--){floatingTexts[i].life-=dt;if(floatingTexts[i].life<=0)floatingTexts.splice(i,1);}
            // Particles
            for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.vx*=0.95;p.vy*=0.95;if(p.life<=0)particles.splice(i,1);}
            for(let[e,a]of dmgAccum){a.timer-=dt;if(a.timer<=0){let col=a.crits>0?'#ff4444':'#ffffff';let txt=Math.round(a.total).toString();if(a.crits>0)txt='💥'+txt;addFloatingText(txt,a.x,a.y-20,col);dmgAccum.delete(e);}}
            checkLevelUp();updateUI();if(Math.floor(gameTime*2)%6===0)checkAchievements();
            // Multiplayer sync
            if(isMP){broadcastMyState();if(resCooldown>0)resCooldown-=dt;cleanupDisconnected();updateResurrection(dt);}
        }

        // ---------- DRAW ----------
        function draw(){
            ctx.clearRect(0,0,W,H);

            let shX=0,shY=0;

            ctx.save();ctx.translate(shX,shY);

            // Grid
            ctx.strokeStyle=voidMode?"#301840":"#202a33";ctx.lineWidth=1;
            let sx=Math.floor(worldOffsetX/40)*40-worldOffsetX,sy=Math.floor(worldOffsetY/40)*40-worldOffsetY;
            for(let i=sx;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
            for(let i=sy;i<H;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}

            const w2s=(wx,wy)=>({x:wx-worldOffsetX,y:wy-worldOffsetY});

            // Magic zones
            for(let z of magicZones){let{x,y}=w2s(z.x,z.y);
                if(z.phase==='warning'){let p=0.3+0.3*Math.sin(z.timer*8);ctx.beginPath();ctx.arc(x,y,z.radius,0,Math.PI*2);ctx.fillStyle=`rgba(170,100,255,${p*0.2})`;ctx.fill();ctx.strokeStyle=`rgba(170,100,255,${p})`;ctx.lineWidth=3;ctx.stroke();}
                else if(z.phase==='active'){ctx.beginPath();ctx.arc(x,y,z.radius,0,Math.PI*2);ctx.fillStyle='rgba(170,50,255,0.45)';ctx.shadowColor='#aa00ff';ctx.shadowBlur=20;ctx.fill();ctx.shadowBlur=0;}}

            // Player skill zones (arrow rain)
            for(let z of playerZones){let{x,y}=w2s(z.x,z.y);let p=1-z.timer/z.duration;
                ctx.beginPath();ctx.arc(x,y,z.radius,0,Math.PI*2);ctx.fillStyle=`rgba(68,221,102,${0.2+0.15*Math.sin(z.timer*10)})`;ctx.fill();
                ctx.strokeStyle=`rgba(68,221,102,${0.5*(1-p)})`;ctx.lineWidth=2;ctx.stroke();
                // Arrow particles
                for(let a=0;a<6;a++){let ax=x+(Math.random()-0.5)*z.radius*1.6,ay=y+(Math.random()-0.5)*z.radius*1.2;ctx.fillStyle='rgba(200,255,200,0.6)';ctx.fillRect(ax,ay,2,6);}}

            // Clones
            for(let c of clones){let{x,y}=w2s(c.x,c.y);let al=Math.min(1,c.timer/0.5);
                ctx.beginPath();ctx.arc(x,y,PLAYER_RADIUS,0,Math.PI*2);ctx.fillStyle=`rgba(187,119,255,${al*0.5})`;ctx.shadowColor='#9944ff';ctx.shadowBlur=15;ctx.fill();ctx.shadowBlur=0;
                ctx.strokeStyle=`rgba(187,119,255,${al*0.7})`;ctx.lineWidth=2;ctx.stroke();}

// Friendly ghosts
for(let g of friendlyGhosts){let{x,y}=w2s(g.x,g.y);let al=Math.min(1,g.timer/1.0)*0.6;
    ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=`rgba(68,204,136,${al})`;ctx.shadowColor='#22ff66';ctx.shadowBlur=12;ctx.fill();ctx.shadowBlur=0;}

            // XP orbs
            for(let o of xpOrbs){let{x,y}=w2s(o.x,o.y);ctx.beginPath();ctx.arc(x,y,o.radius,0,Math.PI*2);ctx.fillStyle="#f7d44a";ctx.shadowColor="#ffb347";ctx.shadowBlur=12;ctx.fill();}

            // Bullets
            for(let b of bullets){let{x,y}=w2s(b.x,b.y);
                if(b.fromBoss){ctx.beginPath();ctx.arc(x,y,b.radius-1,0,Math.PI*2);ctx.fillStyle="#ff6666";ctx.shadowColor="#ff0000";ctx.shadowBlur=12;ctx.fill();}
                else if(b.weaponType==='arrow'){ctx.save();ctx.translate(x,y);ctx.rotate(Math.atan2(b.vy,b.vx));ctx.fillStyle=b.isCrit?'#ffdd44':'#88ff88';ctx.shadowColor=b.isCrit?'#ff8800':'#44ff44';ctx.shadowBlur=10;ctx.beginPath();ctx.moveTo(b.radius+4,0);ctx.lineTo(-b.radius,-3);ctx.lineTo(-b.radius,3);ctx.closePath();ctx.fill();ctx.restore();}
                else if(b.weaponType==='orb'){ctx.beginPath();ctx.arc(x,y,b.radius,0,Math.PI*2);ctx.fillStyle=b.isCrit?'#ffcc66':`rgba(100,140,255,${0.6+0.3*Math.sin(Date.now()/100)})`;ctx.shadowColor=b.isCrit?'#ff8800':'#4466ff';ctx.shadowBlur=18;ctx.fill();}
                else if(b.weaponType==='dagger'){ctx.save();ctx.translate(x,y);ctx.rotate(Math.atan2(b.vy,b.vx));ctx.fillStyle=b.isCrit?'#ffaa66':'#cc99ff';ctx.shadowColor=b.isCrit?'#ff8800':'#9944ff';ctx.shadowBlur=8;ctx.fillRect(-4,-2,8,4);ctx.restore();}
                else if(b.weaponType==='soulBolt'){ctx.beginPath();ctx.arc(x,y,b.radius,0,Math.PI*2);ctx.fillStyle=b.isCrit?'#88ffaa':'#44cc88';ctx.shadowColor='#22ff66';ctx.shadowBlur=14;ctx.fill();}

                    ctx.beginPath();ctx.moveTo(b.radius+6,0);ctx.lineTo(0,-b.radius);ctx.lineTo(-b.radius*0.5,0);ctx.lineTo(0,b.radius);ctx.closePath();ctx.fill();ctx.restore();}
                else{ctx.beginPath();ctx.arc(x,y,b.radius-1,0,Math.PI*2);if(b.isCrit){ctx.fillStyle="#ffaa66";ctx.shadowColor="#ff8800";}else{ctx.fillStyle="#6dd5ff";ctx.shadowColor="#00a6ff";}ctx.shadowBlur=12;ctx.fill();}

            // Environmental events

                ctx.beginPath();ctx.arc(x,y,s.radius,0,Math.PI*2);ctx.fillStyle='rgba(50,255,100,0.15)';ctx.shadowColor='#44ff44';ctx.shadowBlur=25;ctx.fill();ctx.shadowBlur=0;
                ctx.strokeStyle='rgba(50,255,100,0.6)';ctx.lineWidth=2;ctx.stroke();

                ctx.strokeStyle=`rgba(255,150,50,${0.5*al})`;ctx.lineWidth=2;ctx.stroke();}
            // Speed portals (blue swirl)
            for(let p of speedPortals){

                    let spin=Date.now()/200;
                    ctx.beginPath();ctx.arc(x,y,p.radius,0,Math.PI*2);ctx.fillStyle='rgba(68,136,255,0.2)';ctx.shadowColor='#4488ff';ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;
                    ctx.strokeStyle='rgba(100,180,255,0.7)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,p.radius,spin,spin+Math.PI);ctx.stroke();}}
            // Toxic fog overlay (drawn in screen space later)
            // Chests (cyan)
            for(let c of chests){if(c.isOpen)continue;let{x,y}=w2s(c.x,c.y);ctx.beginPath();ctx.arc(x,y,c.radius,0,Math.PI*2);ctx.fillStyle="#00ccaa";ctx.shadowColor="#00ffcc";ctx.shadowBlur=20;ctx.fill();
                ctx.shadowBlur=0;ctx.fillStyle="#000";ctx.font="20px monospace";ctx.fillText("?",x-7,y+7);
                if(nearbyChest===c&&controlMode==='keyboard'){ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,y,c.radius+5,0,Math.PI*2);ctx.stroke();ctx.fillStyle="#fff";ctx.font="14px monospace";ctx.fillText(`按 ${keyMap.interact.toUpperCase()} 开启`,x-45,y-25);}}

            // Normal enemies (type-specific colors)
            ctx.shadowBlur=0;
            for(let e of enemies){let{x,y}=w2s(e.x,e.y);ctx.beginPath();ctx.arc(x,y,e.radius,0,Math.PI*2);
                let col=ENEMY_COLORS[e.type];
                if(col){
                    ctx.fillStyle=col;
                    if(e.type==='exploder'){let pulse=0.7+0.3*Math.sin(Date.now()/100);ctx.fillStyle=`rgba(255,${Math.floor(136*pulse)},0,1)`;}
                    ctx.shadowColor=col;
                }else{let hp=e.health/e.maxHealth;ctx.fillStyle=`hsl(0,80%,${40+20*hp}%)`;ctx.shadowColor="#ff4444";}
                ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
                // Type indicator for special enemies
                if(e.type==='shooter'){ctx.fillStyle="#fff";ctx.font="10px monospace";ctx.textAlign="center";ctx.fillText("🔫",x,y+4);ctx.textAlign="left";}
                if(e.type==='tank'){ctx.fillStyle="#aaffaa";ctx.font="10px monospace";ctx.textAlign="center";ctx.fillText("🛡",x,y+4);ctx.textAlign="left";}
if(e.type==='shielded'){let sa=e.shieldAngle||0;ctx.save();ctx.translate(x,y);ctx.rotate(sa+Math.PI);ctx.beginPath();ctx.arc(0,0,e.radius+4,-Math.PI/4,Math.PI/4);ctx.strokeStyle='#aaaaff';ctx.lineWidth=3;ctx.stroke();ctx.restore();}
if(e.type==='healer'){ctx.fillStyle="#44ff44";ctx.font="10px monospace";ctx.textAlign="center";ctx.fillText("✚",x,y+4);ctx.textAlign="left";if((e.healTimer||0)>2.5){ctx.beginPath();ctx.arc(x,y,e.radius+8,0,Math.PI*2);ctx.strokeStyle='rgba(68,187,68,0.5)';ctx.lineWidth=2;ctx.stroke();}}
if(e.type==='swarm'){ctx.beginPath();ctx.arc(x,y,e.radius,0,Math.PI*2);ctx.fillStyle='#aacc55';ctx.shadowColor='#ccff66';ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;}
if(e.type==='teleporter'){let pulse=0.5+0.5*Math.sin(Date.now()/150);ctx.globalAlpha=0.5+pulse*0.5;ctx.beginPath();ctx.arc(x,y,e.radius,0,Math.PI*2);ctx.fillStyle='#cc44cc';ctx.shadowColor='#ff66ff';ctx.shadowBlur=16;ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1.0;}
                if((e.frozen||0)>0){ctx.beginPath();ctx.arc(x,y,e.radius+2,0,Math.PI*2);ctx.fillStyle='rgba(100,150,255,0.35)';ctx.fill();}
                if(e.marked){ctx.beginPath();ctx.arc(x,y,e.radius+3,0,Math.PI*2);ctx.strokeStyle='rgba(68,204,136,0.6)';ctx.lineWidth=1.5;ctx.stroke();}

            // Bosses

                    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(endX,endY);ctx.stroke();ctx.setLineDash([]);
                    ctx.beginPath();ctx.arc(x,y,bs.radius+6+Math.sin(Date.now()/80)*4,0,Math.PI*2);ctx.strokeStyle=`rgba(255,80,30,${0.4+wProg*0.4})`;ctx.lineWidth=3;ctx.stroke();ctx.restore();
                }
                if(bs.bossType==='berserker'&&bs.isCharging){ctx.beginPath();ctx.arc(x,y,bs.radius+8,0,Math.PI*2);ctx.strokeStyle='rgba(255,100,50,0.7)';ctx.lineWidth=4;ctx.stroke();}
                if(bs.bossType==='summoner'){let pulse=0.5+0.3*Math.sin(Date.now()/200);ctx.beginPath();ctx.arc(x,y,bs.radius+10,0,Math.PI*2);ctx.strokeStyle=`rgba(204,136,0,${pulse})`;ctx.lineWidth=2;ctx.stroke();if(!bs.hasAbsorbed&&bs.health<bs.maxHealth*0.3){ctx.fillStyle='rgba(255,0,0,0.3)';ctx.beginPath();ctx.arc(x,y,bs.radius+20,0,Math.PI*2);ctx.fill();}}
                if(bs.bossType==='juggernaut'){if(bs.enraged){let pulse=0.5+0.5*Math.sin(Date.now()/100);ctx.beginPath();ctx.arc(x,y,bs.radius+6,0,Math.PI*2);ctx.strokeStyle=`rgba(255,50,50,${pulse})`;ctx.lineWidth=4;ctx.stroke();}ctx.fillStyle='#aaffaa';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('🛡'+((bs.armor||0)),x,y+4);ctx.textAlign='left';}
                if(bs.bossType==='archmage'){let hpPct=bs.health/bs.maxHealth;if(hpPct<=0.3){let pulse=0.5+0.5*Math.sin(Date.now()/80);ctx.beginPath();ctx.arc(x,y,120,0,Math.PI*2);ctx.strokeStyle=`rgba(255,68,255,${pulse*0.3})`;ctx.lineWidth=2;ctx.stroke();}if(bs.isClone){ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(x,y,bs.radius,0,Math.PI*2);ctx.strokeStyle='#ff88ff';ctx.lineWidth=2;ctx.stroke();ctx.globalAlpha=1;}}
